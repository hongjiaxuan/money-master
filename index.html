        // --- 安全數學表達式計算（取代 new Function eval，避免安全漏洞）---
        const safeMathEval = (expr) => {
            let s = String(expr).trim().replace(/[+\-*/]\s*$/, '').trim();
            if (!s) return 0;
            if (!/^[\d+\-*/.()\s]+$/.test(s)) return parseFloat(s) || 0;
            let pos = 0;
            const skipSp = () => { while (s[pos] === ' ') pos++; };
            const num = () => {
                skipSp();
                if (s[pos] === '(') {
                    pos++;
                    const v = expr2();
                    skipSp();
                    if (s[pos] === ')') pos++;
                    return v;
                }
                let n = '';
                if (s[pos] === '-') n += s[pos++];
                while (/[\d.]/.test(s[pos])) n += s[pos++];
                return parseFloat(n) || 0;
            };
            const term = () => {
                let v = num(); skipSp();
                while (s[pos] === '*' || s[pos] === '/') {
                    const op = s[pos++]; const r = num();
                    v = op === '*' ? v * r : (r ? v / r : 0); skipSp();
                }
                return v;
            };
            const expr2 = () => {
                let v = term(); skipSp();
                while (s[pos] === '+' || s[pos] === '-') {
                    const op = s[pos++]; const r = term();
                    v = op === '+' ? v + r : v - r; skipSp();
                }
                return v;
            };
            try {
                const result = expr2() || 0;
                return Math.round(result * 1e10) / 1e10;
            } catch { return 0; }
        };

// 工具：繪製分帳圖片 (修正版：支援標示付款人)
    const drawReceipt = (items, totalAmount) => {
        return new Promise((resolve) => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const padding = 40;
            const lineHeight = 50;
            const headerHeight = 120;
            const footerHeight = 100;
            const width = 600;
            const height = headerHeight + (items.length * lineHeight) + footerHeight + padding; // 動態高度

            canvas.width = width;
            canvas.height = height;

            // 背景
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, width, height);

            // 標題
            ctx.fillStyle = '#333333';
            ctx.font = 'bold 36px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('分帳明細', width / 2, 70);
            
            ctx.fillStyle = '#999999';
            ctx.font = '24px sans-serif';
            ctx.fillText(new Date().toISOString().split('T')[0], width / 2, 110);

            // 分隔線
            ctx.beginPath();
            ctx.moveTo(padding, headerHeight);
            ctx.lineTo(width - padding, headerHeight);
            ctx.strokeStyle = '#E5E5E5';
            ctx.stroke();

            // 列表
            ctx.font = '28px sans-serif';
            let y = headerHeight + 50;
            
            items.forEach(item => {
                // 項目名稱（限寬，避免與標籤/金額衝突）
                ctx.textAlign = 'left';
                ctx.fillStyle = '#333333';
                ctx.font = '28px sans-serif';
                const maxNameW = 280;
                let displayName = item.name;
                while (ctx.measureText(displayName).width > maxNameW && displayName.length > 1) {
                    displayName = displayName.slice(0, -1);
                }
                if (displayName !== item.name) displayName += '…';
                ctx.fillText(displayName, padding, y);

                // 彩色小標籤（代購 橘色、全額 紫色）
                let badgeX = padding + ctx.measureText(displayName).width + 10;
                const drawBadge = (label, bg, fg) => {
                    ctx.font = '18px sans-serif';
                    const bw = ctx.measureText(label).width + 12;
                    const bh = 22;
                    const by = y - 18;
                    ctx.fillStyle = bg;
                    ctx.beginPath();
                    ctx.roundRect(badgeX, by, bw, bh, 4);
                    ctx.fill();
                    ctx.fillStyle = fg;
                    ctx.textAlign = 'left';
                    ctx.fillText(label, badgeX + 6, y);
                    badgeX += bw + 6;
                    ctx.font = '28px sans-serif';
                };
                if (item.isPurchased) drawBadge('代購', '#FFF7ED', '#EA580C');
                if (item.isFullAmount) drawBadge('全額', '#EDE9FE', '#7C3AED');
                // 對方墊付舊標注（保留相容）
                if (item.isOtherPaid) drawBadge('對方墊', '#FEF2F2', '#D9534F');

                // 金額
                ctx.textAlign = 'right';
                ctx.fillStyle = item.isOtherPaid ? '#D9534F' : '#333333';
                ctx.font = '28px sans-serif';
                ctx.fillText(`${item.isOtherPaid ? '-' : ''}$${item.amount}`, width - padding, y);

                y += lineHeight;
            });

            // 總結分隔線
            ctx.beginPath();
            ctx.moveTo(padding, height - footerHeight + 20);
            ctx.lineTo(width - padding, height - footerHeight + 20);
            ctx.strokeStyle = '#333333';
            ctx.lineWidth = 2;
            ctx.stroke();

            // 總結
            ctx.fillStyle = '#333333';
            ctx.textAlign = 'left';
            ctx.font = 'bold 32px sans-serif';
            ctx.fillText('總計淨額', padding, height - 30);

const useSwipe = ({ onSwipeLeft, onSwipeRight, threshold = 50 }) => {
    const [touchStart, setTouchStart] = useState(null);
    const [touchEnd, setTouchEnd] = useState(null);
    const [touchStartY, setTouchStartY] = useState(null);
    const [touchEndY, setTouchEndY] = useState(null);
    const ignoreRef = useRef(false);

    const onTouchStart = (e) => {
        // 防呆：起點若落在橫向捲動區（標籤列／聯絡人列等 .overflow-x-auto），本次手勢不換頁
        ignoreRef.current = !!(e.target.closest && e.target.closest('.overflow-x-auto'));
        setTouchEnd(null);
        setTouchStart(e.targetTouches[0].clientX);
        setTouchStartY(e.targetTouches[0].clientY);
    };

    const onTouchMove = (e) => {
        setTouchEnd(e.targetTouches[0].clientX);
        setTouchEndY(e.targetTouches[0].clientY);
    };

    const onTouchEnd = () => {
        if (ignoreRef.current) { ignoreRef.current = false; return; }
        if (!touchStart || !touchEnd) return;

        const distanceX = touchStart - touchEnd;
        const distanceY = touchStartY - touchEndY;
        const isLeftSwipe = distanceX > threshold;
        const isRightSwipe = distanceX < -threshold;
        
        // 防呆：如果是垂直捲動（Y軸移動大於X軸），則不觸發左右滑動
        if (Math.abs(distanceX) < Math.abs(distanceY)) return;

        if (isLeftSwipe && onSwipeLeft) {
            onSwipeLeft();
        }
        if (isRightSwipe && onSwipeRight) {
            onSwipeRight();
        }
    };

    return { onTouchStart, onTouchMove, onTouchEnd };
};

    // F10: 每月記錄淨資產快照
    useEffect(() => {
        // M16修：統一用 balance sign 法，與 AssetsView 即時淨值一致

    // 3. 自動備份：由下方「自動備份監聽器 (Debounce 5秒)」統一處理（含 autoBackup 開關檢查），此處重複的 useEffect 已移除
    // ==========================================
    // 常態續繳：產生續約週期項目（獨立 handler，方便維護與除錯）
    // candidates: 本輪剛達期滿且 isRecurringAnnual 為 true 的「原項目」陣列
    // nextMonthKey: 到期次月 (YYYY-MM)，作為續約項目的起扣月份
    // 回傳：要新增的續約 recurringItem 陣列（呼叫端負責併入 state）
    // ==========================================
    const handleCheckRecurringRenewal = (candidates, nextMonthKey) => {
        if (!candidates || candidates.length === 0) return [];
        return candidates.map(item => {
            const periods = item.renewalPeriods ?? 12;
            return {
                id: 'rec_' + generateId(),
                name: item.name,
                type: item.type,
                amount: item.amount,
                day: item.day,
                accountId: item.accountId,
                targetAccountId: item.targetAccountId ?? null,
                categoryId: item.categoryId,
                interest: item.interest ?? 0,
                payer: item.payer ?? 'none',
                totalPeriods: periods,
                renewalPeriods: periods,
                isRecurringAnnual: true,
                executedPeriods: 0,
                lastGeneratedMonth: null,
                startDate: nextMonthKey,
                active: true,
                createdAt: Date.now()
            };
        });
    };

    // --- 修正：週期帳單檢查邏輯 (支援多類型) ---
// ==========================================
    // 修正版：週期帳單檢查 (checkRecurring)
    // 修正點：移除「每日只執行一次」的限制，改為即時偵測
    // ==========================================
    useEffect(() => {
        const checkRecurring = () => {
            if (recurringLockedRef.current) return;
            const today = new Date();
            const currentYear = today.getFullYear();
            const currentMonth = today.getMonth() + 1;
            const currentDay = today.getDate();
            
            // 產生當月 Key (例如: "2023-10")，用來判斷該月是否已執行過
            const currentMonthKey = `${currentYear}-${String(currentMonth).padStart(2, '0')}`;

            // ❌ 移除：原本的「每日只執行一次」鎖定
            // const lastRunDate = localStorage.getItem('mm_last_recurring_run');
            // if (lastRunDate === todayStr) return; 

            let newTxList = [];
            let hasUpdates = false;
            let renewalCandidates = []; // 常態續繳：本輪剛達期滿且開啟自動續約的原項目

            // 遍歷所有週期項目
            const updatedRecurring = recurringItems.map(item => {
                // 1. 基本過濾：已暫停、尚未開始、已結束
                if (item.active === false) return item;
                if (item.startDate && item.startDate > currentMonthKey) return item;
                if (item.totalPeriods && (item.executedPeriods || 0) >= item.totalPeriods) return item;
                
                // 2. ★ 核心防呆：檢查「本月」是否已經執行過
                // 只要這各月執行過，就算沒有「每日鎖定」也不會重複記帳，安全！
                if (item.skipUntil === currentMonthKey) return item; // 使用者手動跳過本月
                if (item.lastGeneratedMonth === currentMonthKey) return item;

                // 3. 計算執行日 (處理 2/30 -> 2/28 的情況)
                const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
                const targetDay = Math.min(item.day, daysInMonth);

                // 4. 檢查帳戶是否存在 (防閃退)
                const accountExists = accounts.some(acc => acc.id === item.accountId);
                if (!accountExists) return item;
                if (item.type === 'transfer' && item.targetAccountId) {
                    const targetExists = accounts.some(acc => acc.id === item.targetAccountId);
                    if (!targetExists) return item;
                }

                // 5. 觸發記帳：如果「今天日期」 >= 「設定執行日」
                if (currentDay >= targetDay) {
                    
                    // ★ 終極修復：補回遺失的日期與期數計算變數！
                    const executedCount = (item.executedPeriods || 0) + 1; 
                    const txDate = `${currentYear}-${String(currentMonth).padStart(2, '0')}-${String(targetDay).padStart(2, '0')}`;

                    const isLastPeriod = item.totalPeriods && (executedCount === item.totalPeriods);
                    const baseAmount = (isLastPeriod && item.lastPeriodAmount != null) ? Number(item.lastPeriodAmount) : Number(item.amount);
                    const totalAmount = baseAmount + Number(item.interest || 0);                    
                    
                    // 產生新交易（含分帳資訊繼承）
                    const recurPayer = item.payer;
                    let autoTags = ['#週期'];
                    let autoSplitShare = undefined;
                    if (recurPayer === 'me' || recurPayer === 'other') {
                        autoTags.push('#分帳');
                        autoSplitShare = Math.round(totalAmount / 2);
                    } else if (recurPayer === 'advance') {
                        autoTags.push('#代購');
                        autoSplitShare = 0;
                    }

                    const newTx = {
                        id: Date.now().toString() + Math.random().toString().slice(2, 5),
                        createdAt: Date.now(),
                        date: txDate,
                        amount: totalAmount,
                        type: item.type || 'expense',
                        categoryId: item.type === 'transfer' ? 'transfer' : item.categoryId,
                        accountId: item.accountId,
                        targetAccountId: item.type === 'transfer' ? item.targetAccountId : null,
                        note: `[週期] ${item.name} (${executedCount}/${item.totalPeriods || '∞'})${item.interest ? ` (含息${item.interest})` : ''}`,
                        tags: autoTags,
                        payer: recurPayer || 'none',
                        splitMyShare: autoSplitShare,
                        recurringId: item.id
                    };

                    newTxList.push(newTx);
                    hasUpdates = true;

                    // 常態續繳：本期為最後一期且開啟自動續約 → 收集原項目作為續約候選
                    if (isLastPeriod && (item.isRecurringAnnual ?? false) === true) {
                        renewalCandidates.push(item);
                    }

                    // 更新該項目的狀態 (標記本月已執行)
                    return { 
                        ...item, 
                        lastGeneratedMonth: currentMonthKey, 
                        executedPeriods: executedCount 
                    };
                }
                return item;
            });

            // 如果有產生新交易，執行更新
            if (hasUpdates) {
                recurringLockedRef.current = true; // 啟動安全鎖
                // 防重複 ID：functional update 確保不插入已存在的交易
                setTransactions(prev => {
                    const existingIds = new Set(prev.map(t => t.id));
                    const uniqueNewTx = newTxList.filter(t => !existingIds.has(t.id));
                    if (uniqueNewTx.length === 0) return prev;
                    return [...uniqueNewTx, ...prev].sort((a, b) => new Date(b.date) - new Date(a.date));
                });

                // functional update 避免捕捉過期 closure
                setAccounts(prevAcc => {
                    let updated = [...prevAcc];
                    newTxList.forEach(tx => {
                        const amount = Number(tx.amount);
                        if (tx.type === 'transfer') {
                            updated = updated.map(a => {
                                if (a.id === tx.accountId) return { ...a, balance: a.balance - amount };
                                if (a.id === tx.targetAccountId) {
                                    const newBalance = a.balance + amount;
                                    // 貸款帳戶：月付金含利息，只能還到 0，不得轉正
                                    return { ...a, balance: a.type === 'loan' ? Math.min(0, newBalance) : newBalance };
                                }
                                return a;
                            });
                        } else {
                            const isExpense = tx.type === 'expense';
                            updated = updated.map(a =>
                                a.id === tx.accountId
                                    ? { ...a, balance: a.balance + (isExpense ? -amount : amount) }
                                    : a
                            );
                        }
                    });
                    return updated;
                });

                // 常態續繳：依本輪期滿候選產生續約項目（到期次月開始），併入週期清單
                const nextMonthDate = new Date(currentYear, currentMonth, 1); // currentMonth 為 1-based，此即「次月」1 號
                const nextMonthKey = `${nextMonthDate.getFullYear()}-${String(nextMonthDate.getMonth() + 1).padStart(2, '0')}`;
                const newRenewals = handleCheckRecurringRenewal(renewalCandidates, nextMonthKey);

                // 更新週期項目
                setRecurringItems([...updatedRecurring, ...newRenewals]);
                setTimeout(() => { recurringLockedRef.current = false; }, 2000); // 釋放鎖

                // 通知
                if (typeof showAlert === 'function') {
                    showAlert('週期入帳', `已自動執行 ${newTxList.length} 筆定期交易`);
                }
                
                // 自動備份 (如果有開啟)
                if (cloudSettings && cloudSettings.autoBackup) {
                    setTimeout(() => handleCloudBackup(true), 2000);
                }
            }
        };

        // 延遲 1 秒執行 (Debounce)
        const timer = setTimeout(checkRecurring, 1000);
        return () => clearTimeout(timer);

    }, [recurringItems, accounts]); // 移除依賴 cloudSettings/handleCloudBackup 以避免不必要的重渲染    // ==========================================
    // C. 操作邏輯 (Handlers) - 從 App 搬過來
    // ==========================================
    // 觸發震動反饋
    const triggerHaptic = (pattern = 10) => {
        try {
            // 加強防呆：確認瀏覽器支援 vibrate API 且不是在特殊環境
            if (typeof navigator !== 'undefined' && navigator.vibrate) {
                navigator.vibrate(pattern);
            }
        } catch (e) {
            // 如果報錯，靜默失敗，不要讓程式崩潰
        }
    };
// 1. 全域 UI 呼叫
    const showAlert = (title, content) => {
        setDialog({ show: true, title, content, isConfirm: false, onConfirm: () => setDialog(prev => ({...prev, show: false})) });
    };

    // ★ 修正重點：在這裡包裹 onConfirmAction，執行完動作後自動關閉視窗
    const showConfirm = (title, content, onConfirmAction) => {
        setDialog({
            show: true,
            title,
            content,
            isConfirm: true,
            onConfirm: () => {
                if (onConfirmAction) onConfirmAction(); // 1. 執行刪除動作
                setDialog(prev => ({...prev, show: false})); // 2. 關閉視窗
            }
        });
    };
        // 2. 交易存檔 (修正版：加入防迴圈參數 skipSyncPlan)
    const handleSaveTransaction = (tx, editingId = null, skipSyncPlan = false) => {
        // 轉帳防護：缺少目標帳戶時直接擋下，避免只扣轉出帳戶造成餘額飄移
        if (tx.type === 'transfer' && !tx.targetAccountId) {
            showAlert('錯誤', '請選擇目標帳戶');
            return;
        }
        // N2: 重複交易偵測（新增時才檢查，排除轉帳與系統自動記帳）
        if (!editingId && tx.type !== 'transfer' && !skipSyncPlan) {
            const dup = transactions.find(t =>
                t.date === tx.date &&
                t.amount === tx.amount &&
                t.type === tx.type &&
                t.accountId === tx.accountId
            );
            if (dup) {
                setTimeout(() => showAlert('⚠️ 疑似重複', `同一天已有相同金額的${tx.type === 'expense' ? '支出' : '收入'} $${tx.amount.toLocaleString()}，請確認是否重複記帳。`), 200);
            }
        }
        let newAcc = [...accounts];
        let newTx = [...transactions];

        // --- A. 舊交易回滾 (還原餘額) ---
        let originalCreatedAt = Date.now(); 

        if (editingId) {
            const oldTx = transactions.find(t => t.id === editingId);
            if (oldTx) {
                originalCreatedAt = oldTx.createdAt || Date.now();
                // 編輯時保留 tri-party 標記(groupId)：TransactionModal 存檔會遺失它，
                // 若不補回，下方重扣守衛(!tx.groupId)會失效導致餘額被扣
                if (oldTx.groupId && !tx.groupId) tx = { ...tx, groupId: oldTx.groupId };
                // 三方代墊(groupId)建立時不扣款，回滾時也不還原餘額，避免灌水
                if (oldTx.payer !== 'other' && !oldTx.groupId) {
                     if (oldTx.type === 'transfer') {
                        // 🔵 優化：編輯回滾時若舊目標帳戶已不存在，僅回滾來源（單邊回滾）
                        const oldTargetExists = newAcc.some(a => a.id === oldTx.targetAccountId);
                        newAcc = newAcc.map(a => {
                            if (a.id === oldTx.accountId) return { ...a, balance: a.balance + oldTx.amount };
                            if (oldTargetExists && a.id === oldTx.targetAccountId) return { ...a, balance: a.balance - oldTx.amount };
                            return a;
                        });
                    } else {
                        newAcc = newAcc.map(a => a.id === oldTx.accountId ? {...a, balance: a.balance + (oldTx.type === 'expense' ? oldTx.amount : -oldTx.amount)} : a);
                    }
                }
            }
            newTx = newTx.filter(t => t.id !== editingId);
        }
        
        // --- B. 新交易扣款 ---
        // 三方代墊(groupId)不扣款（比照建立時），餘額只在分帳結清時變動
        if (tx.payer !== 'other' && !tx.groupId) {
             if (tx.type === 'transfer') {
                newAcc = newAcc.map(a => { 
                    if (a.id === tx.accountId) return { ...a, balance: a.balance - tx.amount }; 
                    if (a.id === tx.targetAccountId) return { ...a, balance: a.balance + tx.amount }; 
                    return a; 
                });
            } else {
                newAcc = newAcc.map(a => a.id === tx.accountId ? {...a, balance: a.balance + (tx.type === 'expense' ? -tx.amount : tx.amount)} : a);
            }
        }
        
        // --- C. 組合最終物件 ---
        const finalTx = {
            ...tx,
            id: editingId || generateId(),
            createdAt: editingId ? originalCreatedAt : Date.now()
        };

        // 保留退款/沖銷欄位（TransactionModal 不持有；編輯時避免遺失，並依新金額重算統計份額）
        if (editingId) {
            const origR = transactions.find(t => t.id === editingId);
            if (origR && origR.refundedAmount) {
                finalTx.refundedAmount = origR.refundedAmount;
                finalTx.refundTxIds = origR.refundTxIds;
                finalTx.splitMyShare = Math.max(0, finalTx.amount - origR.refundedAmount);
            }
        }

        // --- C2. 三方代墊(groupId)編輯：維持配對一致 + 統計不灌水 ---
        if (editingId && finalTx.groupId) {
            // 本筆若為 #應付，強制 splitMyShare=0（TransactionModal 存檔會誤設半額 → 統計重複計入）
            if ((finalTx.tags || []).includes('#應付')) finalTx.splitMyShare = 0;
            // 同步配對另一筆的金額；已結清者不動，避免破壞結清記錄
            newTx = newTx.map(t => {
                if (t.groupId === finalTx.groupId && t.id !== finalTx.id && !(t.tags || []).includes('#已結清')) {
                    const sib = { ...t, amount: finalTx.amount };
                    if ((sib.tags || []).includes('#應付')) sib.splitMyShare = 0;         // 對方 #應付 → 0
                    else if ((sib.tags || []).includes('#分帳')) delete sib.splitMyShare;  // 對方 #分帳 → 交回公式算半額
                    return sib;
                }
                return t;
            });
        }

// ★ 新增：連動更新週期計畫金額 (雙向綁定)
        if (!skipSyncPlan && editingId && tx.recurringId) {
            const oldTx = transactions.find(t => t.id === editingId);
            const plan = recurringItems.find(r => r.id === tx.recurringId);
            if (oldTx && plan && oldTx.amount !== tx.amount) {
                setTimeout(() => {
                    showConfirm(
                        '同步更新計畫',
                        '您修改了此筆分期/週期的金額。\n\n是否要同步更新「未來所有期數」的預設扣款金額？',
                        () => {
                            setRecurringItems(prev => prev.map(r => r.id === plan.id ? { ...r, amount: tx.amount, interest: 0 } : r));
                        }
                    );
                }, 350);
            }
        }
        
        // --- D. 排序：先比日期(Date)，日期相同比建立時間(createdAt) ---
        newTx = [finalTx, ...newTx].sort((a, b) => { 
            const dateDiff = new Date(b.date) - new Date(a.date); 
            if (dateDiff !== 0) return dateDiff; 
            return (b.createdAt || 0) - (a.createdAt || 0); 
        });
        
        setAccounts(newAcc);
        setTransactions(newTx);
    };

    // 三方代墊：一次插入兩筆關聯記錄，皆不動帳戶餘額（代墊人先付現金，記帳當下自己帳戶沒動用現金）
    const handleSaveTriParty = (tx1, tx2) => {
        const finalTxs = [tx1, tx2].map(tx => ({
            ...tx,
            id: tx.id || generateId(),          // 沿用既有 ID 產生
            createdAt: tx.createdAt || Date.now()
        }));
        setTransactions(prev => [...finalTxs, ...prev].sort((a, b) => {
            const dateDiff = new Date(b.date) - new Date(a.date);
            if (dateDiff !== 0) return dateDiff;
            return (b.createdAt || 0) - (a.createdAt || 0);
        }));
        // 不呼叫 setAccounts：兩筆皆為欠/被欠追蹤，帳戶餘額不變
    };
// 3. 刪除交易
    const handleDeleteTransaction = (txId) => {
        showConfirm('刪除', '確定刪除此筆交易？', () => {
            const tx = transactions.find(t => t.id === txId);
            if (!tx) return;

            // 刪除退款 transfer 時，一併還原原交易的沖銷狀態（refundedAmount / splitMyShare / 標籤）
            if (tx.refundFor) restoreOriginalFromRefund(tx);

            let newAcc = [...accounts];

            // 三方代墊(groupId)建立時不扣款，刪除時也不回加餘額，避免灌水
            if (tx.payer !== 'other' && !tx.groupId) {
                if (tx.type === 'transfer') {
                    // 🔵 優化：轉帳刪除時若目標帳戶已不存在，僅回滾來源帳戶（單邊回滾）
                    const delTargetExists = newAcc.some(a => a.id === tx.targetAccountId);
                    newAcc = newAcc.map(a => {
                        if (a.id === tx.accountId) return { ...a, balance: a.balance + tx.amount };
                        if (delTargetExists && a.id === tx.targetAccountId) return { ...a, balance: a.balance - tx.amount };
                        return a;
                    });
                } else {
                    newAcc = newAcc.map(a => a.id === tx.accountId ? {...a, balance: a.balance + (tx.type === 'expense' ? tx.amount : -tx.amount)} : a);
                }
            }

            setTransactions(prev => prev.filter(t => t.id !== txId));
            setAccounts(newAcc);

            // F9: 儲存 Undo 資訊（含帳戶快照供還原）
            setLastDeletedTx({ tx, accountsSnapshot: accounts });
            clearTimeout(undoTimerRef.current);
            undoTimerRef.current = setTimeout(() => setLastDeletedTx(null), 5000);

            // ★ 修正：徹底移除 window.confirm，改用系統彈窗接力
            if (tx.recurringId && recurringItems.some(r => r.id === tx.recurringId)) {
                setTimeout(() => {
                    showConfirm(
                        '連動刪除週期計畫',
                        '這筆交易關聯了分期/週期計畫。\n\n是否要一併「刪除未來的自動扣款計畫」？\n(按取消則僅刪除此筆交易)',
                        () => {
                            setRecurringItems(prev => prev.filter(r => r.id !== tx.recurringId));
                        }
                    );
                }, 350);
            }
        });
    };
    // F9: 還原上一筆刪除
    const handleUndoDelete = () => {
        if (!lastDeletedTx) return;
        clearTimeout(undoTimerRef.current);
        setTransactions(prev => [...prev, lastDeletedTx.tx].sort((a,b) => new Date(b.date) - new Date(a.date)));
        setAccounts(lastDeletedTx.accountsSnapshot);
        setLastDeletedTx(null);
    };

    // F4: 儲蓄目標 handlers
    const handleSaveSavingsGoal = (goal) => {
        if (goal.id) {
            setSavingsGoals(prev => prev.map(g => g.id === goal.id ? goal : g));
        } else {
            setSavingsGoals(prev => [...prev, { ...goal, id: generateId() }]);
        }
    };
    const handleDeleteSavingsGoal = (id) => {
        setSavingsGoals(prev => prev.filter(g => g.id !== id));
    };
    // F5: 自訂標籤 handlers

    const handleDeleteCustomTag = (tag) => {
        setCustomTags(prev => prev.filter(t => t !== tag));
    };
    const handleSaveSplitContact = (name) => {

    const handleDeleteSplitContact = (name) => {

    // 借還款追蹤 handlers：流水帳（lend借出/borrow借入/collect收回/repay還款）

    const handleSaveDebtEntry = (entry) => {
        const amount = Math.round(Number(entry.amount) || 0);
        const contact = (entry.contact || '').trim();
        if (!contact || amount <= 0) { showAlert('提示', '請輸入對象與大於 0 的金額'); return false; }
        const outgoing = entry.kind === 'lend' || entry.kind === 'repay'; // 錢離開我的帳戶

            };
            const tx = {
                id: generateId(), createdAt: Date.now(),

                note: (entry.note ? entry.note + ' ' : '') + noteMap[entry.kind],

            };

            setTransactions(prev => [tx, ...prev].sort((a, b) => {

        }]);

    };
    const handleDeleteDebtEntry = (entryId) => {
        const entry = debts.find(d => d.id === entryId);

                setAccounts(prev => prev.map(a => {
                    if (a.id === tx.accountId) return { ...a, balance: a.balance + tx.amount };
                    if (a.id === tx.targetAccountId) return { ...a, balance: a.balance - tx.amount };

    // 專案/事件記帳 handlers
    const handleSaveProject = (proj) => {

        } else {

        }
    };
    const handleDeleteProject = (projId) => {
        // 刪除專案時把相關交易的 projectId 清空，避免孤兒引用
        setTransactions(prev => prev.map(t => t.projectId === projId ? { ...t, projectId: undefined } : t));
        setProjects(prev => prev.filter(p => p.id !== projId));
    };
    // 退款與作廢：退貨沖銷。以「改寫原交易 splitMyShare = amount − refundedAmount」讓所有統計自動反映（不動統計公式）；
    // 帳戶餘額靠一筆關聯 transfer（虛擬帳戶 external_refund）還原。僅適用一般支出（非分帳）。
    const handleRefundTransaction = (origTxId, refundAmount, accountId, isVoid) => {
        const orig = transactions.find(t => t.id === origTxId);
        if (!orig) return false;
        const already = orig.refundedAmount || 0;
        const remaining = orig.amount - already;
        let amt = isVoid ? remaining : Math.round(Number(refundAmount) || 0);
        if (amt <= 0 || amt > remaining) { showAlert('提示', `退款金額需介於 1 ~ ${remaining}`); return false; }
        const newRefunded = already + amt;
        const newShare = Math.max(0, orig.amount - newRefunded);
        let txId = null;
        if (accountId) {
            const tx = {
                id: generateId(), createdAt: Date.now(),
                date: getLocalDateString(), amount: amt, type: 'transfer',
                categoryId: 'reimbursement',
                accountId: 'external_refund', targetAccountId: accountId,
                note: `${isVoid ? '作廢退回' : '退款'}：${orig.note || '消費'}`,
                tags: ['#退款'], refundFor: origTxId
            };
            txId = tx.id;
            setAccounts(prev => prev.map(a => a.id === accountId ? { ...a, balance: a.balance + amt } : a));
            setTransactions(prev => [tx, ...prev.map(t => t.id === origTxId ? applyRefundState(t, newRefunded, newShare, isVoid, txId) : t)]
                .sort((a, b) => { const d = new Date(b.date) - new Date(a.date); return d !== 0 ? d : (b.createdAt || 0) - (a.createdAt || 0); }));
        } else {
            // 純沖銷（不影響帳戶）：只改寫原交易統計份額
            setTransactions(prev => prev.map(t => t.id === origTxId ? applyRefundState(t, newRefunded, newShare, isVoid, null) : t));
        }
        triggerHaptic();
        return true;
    };
    // 套用退款狀態到原交易（純函式）
    const applyRefundState = (t, newRefunded, newShare, isVoid, txId) => {
        const tags = (t.tags || []).filter(x => x !== '#退款' && x !== '#作廢');
        tags.push('#退款');
        if (isVoid) tags.push('#作廢');
        return {
            ...t,
            refundedAmount: newRefunded,
            splitMyShare: newShare,
            refundTxIds: [...(t.refundTxIds || []), ...(txId ? [txId] : [])],
            tags
        };
    };
    // 刪除退款 transfer 時，還原原交易的沖銷狀態（供 handleDeleteTransaction 呼叫）
    const restoreOriginalFromRefund = (refundTx) => {
        const orig = transactions.find(t => t.id === refundTx.refundFor);
        if (!orig) return;
        const newRefunded = Math.max(0, (orig.refundedAmount || 0) - refundTx.amount);
        const newShare = orig.amount - newRefunded;
        setTransactions(prev => prev.map(t => {
            if (t.id !== orig.id) return t;
            const refundTxIds = (t.refundTxIds || []).filter(id => id !== refundTx.id);
            if (newRefunded <= 0) {
                // 完全還原：移除退款欄位與標籤
                const { refundedAmount, splitMyShare, refundTxIds: _r, ...rest } = t;
                return { ...rest, tags: (t.tags || []).filter(x => x !== '#退款' && x !== '#作廢') };
            }
            return { ...t, refundedAmount: newRefunded, splitMyShare: newShare, refundTxIds,
                tags: (t.tags || []).filter(x => x !== '#作廢') };
        }));
    };
    // 貸款工具：等額本息月付計算 (PMT)
    const calcPMT = (principal, annualRate, months) => {
        if (!months || months <= 0) return 0;
        if (!annualRate || annualRate <= 0) return Math.round(principal / months);
        const r = annualRate / 100 / 12;
        return Math.round(principal * r * Math.pow(1 + r, months) / (Math.pow(1 + r, months) - 1));
    };

    // 帳戶存檔
    const handleSaveAccount = (accData) => {
        // 貸款帳戶：獨立邏輯，不產生餘額調整交易
        if (accData.type === 'loan') {
            const monthly = calcPMT(accData.loanAmount, accData.interestRate, accData.termMonths);
            const existing = accounts.find(a => a.id === accData.id);
            if (!existing) {
                // 新增貸款：建立帳戶 + 自動產生週期轉帳
                const loanId = generateId();
                const recurringId = generateId();
                const maxOrder = accounts.reduce((max, a) => Math.max(max, a.sortOrder || 0), 0);
                setAccounts(prev => [...prev, {
                    ...accData, id: loanId,
                    balance: -accData.loanAmount,
                    initialBalance: -accData.loanAmount,
                    monthlyPayment: monthly,
                    recurringId,
                    sortOrder: maxOrder + 1
                }]);
                setRecurringItems(prev => [...prev, {
                    id: recurringId,
                    type: 'transfer',
                    name: `${accData.name} 月付`,
                    amount: monthly,
                    interest: 0,
                    day: accData.payDay || 1,
                    accountId: accData.payAccountId,
                    targetAccountId: loanId,
                    categoryId: 'transfer',
                    startDate: accData.loanStartDate || getLocalDateString().slice(0, 7),
                    totalPeriods: accData.termMonths,
                    executedPeriods: accData.paidMonths || 0,
                    // M18修：paidMonths > 0 代表過去已還期數，lastGeneratedMonth 設為上個月
                    // 設為本月會讓 checkRecurring 跳過本月首期，需等到下個月才啟動
                    lastGeneratedMonth: (() => {
                        if (!accData.paidMonths || accData.paidMonths <= 0) return null;
                        const d = new Date(); d.setMonth(d.getMonth() - 1);
                        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
                    })(),
                    active: true
                }]);
            } else {
                // 編輯貸款：更新帳戶與週期項目（不觸發餘額調整）
                setAccounts(accounts.map(a => a.id === accData.id
                    ? { ...existing, ...accData, monthlyPayment: monthly }
                    : a
                ));
                if (existing.recurringId) {
                    setRecurringItems(prev => prev.map(r => r.id === existing.recurringId ? {
                        ...r,
                        name: `${accData.name} 月付`,
                        amount: monthly,
                        day: accData.payDay || r.day,
                        accountId: accData.payAccountId || r.accountId,
                        totalPeriods: accData.termMonths
                    } : r));
                }
            }
            return;
        }

        const existing = accounts.find(a => a.id === accData.id);
        if (existing) {
            // 編輯現有帳戶
            const diff = accData.balance - existing.balance;
            if (diff !== 0) {
                const type = diff > 0 ? 'income' : 'expense';
                const adjTx = {
                    id: generateId(),
                    createdAt: Date.now(),
                    date: getLocalDateString(),
                    amount: Math.abs(diff),
                    type: type,
                    categoryId: 'adjustment',
                    subCategoryId: null,
                    accountId: accData.id,
                    note: '餘額調整',
                    tags: ['#調整']
                };
                setTransactions(prev => [adjTx, ...prev].sort((a, b) => new Date(b.date) - new Date(a.date)));
            }
            const updatedAccount = { ...existing, ...accData, initialBalance: existing.initialBalance };
            setAccounts(accounts.map(a => a.id === accData.id ? updatedAccount : a));
        } else {
            // 新增帳戶
            const maxOrder = accounts.reduce((max, a) => Math.max(max, a.sortOrder || 0), 0);

        }
    };
    // 刪除帳戶邏輯
    const handleDeleteAccount = (accId) => {
        // 1. 檢查是否有關聯交易
        const relatedTxCount = transactions.filter(t => t.accountId === accId || t.targetAccountId === accId).length;
        const relatedRecurring = recurringItems.filter(r => r.accountId === accId || r.targetAccountId === accId).length;
        
        let warningMsg = '確定要刪除此帳戶？';
        
        if (relatedTxCount > 0 || relatedRecurring > 0) {
            warningMsg = `⚠️ 警告：此帳戶包含 ${relatedTxCount} 筆交易與 ${relatedRecurring} 個週期設定。\n\n刪除後，相關交易紀錄將保留，但帳戶名稱將顯示為未知。`;

    //  分帳結清
    const handleSettleSplit = (newTransactions, newAccounts) => { setTransactions(newTransactions.sort((a, b) => new Date(b.date) - new Date(a.date))); setAccounts(newAccounts); };            
    //  帳戶排序
    const handleReorderAccounts = (newAccounts) => { setAccounts(newAccounts); };
    //  合併並刪除分類
    const handleMergeAndDeleteCategory = (deleteId, targetId) => {
        // 1. 更新交易
        const newTransactions = transactions.map(t => t.categoryId === deleteId ? { ...t, categoryId: targetId } : t);
        setTransactions(newTransactions);

        setRecurringItems(newRecurring);

        };

    };
    //  資料匯入匯出
// 1. 修正：匯出資料 (加入偏好設定)
    const handleExportData = () => {
        const data = {
            version: '5.2', // 標記版本號
            timestamp: Date.now(),
            transactions,
            accounts,
            categories,
            recurringItems,

    };
// ==========================================
    // 修正版 3：檔案匯入 (同步更新時間)

    const handleImportData = (e) => {

        reader.onload = (event) => {
            try {

                showConfirm('還原資料', '這將覆蓋目前所有本機資料。\n\n建議先前往「設定 → 匯出備份」下載目前資料後再繼續。\n\n確定還原？', () => {

                    if(importedData.accounts) localStorage.setItem('mm_accounts', JSON.stringify(importedData.accounts));

                    if(importedData.savingsGoals) localStorage.setItem('mm_savings_goals', JSON.stringify(importedData.savingsGoals));

                    if(importedData.splitContacts) localStorage.setItem('mm_split_contacts', JSON.stringify(importedData.splitContacts));
                    if(importedData.debts) localStorage.setItem('mm_debts', JSON.stringify(importedData.debts));
                    if(importedData.projects) localStorage.setItem('mm_projects', JSON.stringify(importedData.projects));
                    if(importedData.netWorthHistory) localStorage.setItem('mm_nw_history', JSON.stringify(importedData.netWorthHistory));
                    localStorage.setItem('mm_schema_version', '1.0');

                    if (savedCloudSettings) {
                        localStorage.setItem('mm_cloud_settings', savedCloudSettings);
                    } else if (importedData.cloudSettings) {
                        localStorage.setItem('mm_cloud_settings', JSON.stringify(importedData.cloudSettings));
                    }

                    // ★ 關鍵：更新同步時間 (避免匯入舊檔後，雲端自動檢查又以為雲端比較新而跳視窗)
                    // 使用檔案內的 timestamp，若無則用現在時間
                    const importTime = importedData.timestamp || importedData.lastBackup || new Date().toISOString();
                    localStorage.setItem('mm_last_sync_time', new Date(importTime).toISOString());

                    if (importedData.preferences) {
                        const validThemes = ['t-haze','t-sage','t-blush','t-violet','t-roasted','t-cement'];
                        if (validThemes.includes(importedData.preferences.theme)) {
                            localStorage.setItem('mm_theme', importedData.preferences.theme);
                        }
                        if (importedData.preferences.privacy !== undefined) {
                            localStorage.setItem('mm_privacy', importedData.preferences.privacy ? 'true' : 'false');
                        }
                        if (importedData.preferences.fontSize) {
                            localStorage.setItem('mm_font_size', importedData.preferences.fontSize);
                        }
                    }

                console.error(err);
                showAlert('錯誤', '讀取失敗：檔案可能已損毀');
            }
        };
        reader.readAsText(file);
        e.target.value = '';
    };
    // 匯出 CSV (Excel 專用)
    const handleExportCSV = () => {
        // 1. 定義 CSV 標題
        const headers = ['ID', '日期', '類型', '金額', '分類', '細項', '帳戶', '轉入帳戶', '備註', '標籤'];
        
        // 2. 轉換資料
        const rows = transactions.map(t => {
            const catName = (t.type === 'expense' ? categories.expense : categories.income).find(c => c.id === t.categoryId)?.name || (t.categoryId === 'reimbursement' ? '分帳結清' : '其他');
            
            // 尋找細項名稱
            let subName = '';
            if (t.subCategoryId) {
                const cat = (t.type === 'expense' ? categories.expense : categories.income).find(c => c.id === t.categoryId);
                const sub = cat?.subCategories?.find(s => s.id === t.subCategoryId);
                subName = sub ? sub.name : '';
            }

            const accName = accounts.find(a => a.id === t.accountId)?.name || '未知';
            const targetAccName = t.targetAccountId ? (accounts.find(a => a.id === t.targetAccountId)?.name || '') : '';
            const tagsStr = t.tags ? t.tags.join(' ') : '';
            const typeStr = t.type === 'expense' ? '支出' : (t.type === 'income' ? '收入' : '轉帳');

            // 處理 CSV 特殊字元 (如逗號)
            const safeNote = `"${(t.note || '').replace(/"/g, '""').replace(/\r?\n/g, ' ')}"`;

            return [
                t.id,
                t.date,
                typeStr,
                t.amount,
                catName,
                subName,
                accName,
                targetAccName,
                safeNote,
                tagsStr
            ].join(',');
        });

        // 3. 組合內容 (加上 BOM \uFEFF 讓 Excel 能正確識別中文)
        const csvContent = '\uFEFF' + headers.join(',') + '\n' + rows.join('\n');

        // 4. 下載檔案
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `money_master_export_${getLocalDateString()}.csv`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    };
    // 7. 雲端備份相關
// ==========================================
    // DataProvider 修正重點：
    // 1. handleCloudBackup: 備份時寫入 lastBackup 時間
    // 2. handleManualRestore: 嚴格比對時間，防止循環
    // 3. useEffect: 實作自動備份 (Debounce)
    // ==========================================

    // 1. 雲端備份
// ==========================================
    // 修正版 4：雲端備份 (修復手機上傳問題 + 加入 Loading)
    // ==========================================
const handleCloudBackup = async (silent = false) => {
        if (!cloudSettings.url) {
            if (!silent) showAlert('提示', '請先設定 Google Apps Script URL');
            return;
        }

        const performBackup = async () => {
            if (!silent) setIsSaving(true);

            const now = new Date().toISOString();
            const payload = {
                action: 'backup',
                password: cloudSettings.password,
                data: {
                    transactions, accounts, categories, recurringItems, quickTemplates,
                    savingsGoals, customTags, splitContacts, debts, projects, netWorthHistory,
                    preferences: { theme: appTheme, privacy: isPrivacyMode, fontSize: fontSize },
                    lastBackup: now
                }
            };

            try {
                const res = await fetch(cloudSettings.url, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) });
                const result = await res.json();

                if (result.status === 'success' || result.success) {
                    localStorage.setItem('mm_last_sync_time', now);
                    if (!silent) showAlert('成功', '✅ 備份成功！');
                } else {
                    if (!silent) showAlert('備份失敗', '❌ ' + (result.message || '未知錯誤'));
                }
            } catch (e) {
                console.error(e);
                if (!silent) showAlert('連線錯誤', `❌ ${e.message}\n請檢查 URL 或網路連線。`);
            } finally {
                if (!silent) setIsSaving(false);
            }
        };

        if (silent) {
            performBackup();
        } else {
            showConfirm('雲端備份', '確定上傳目前資料至 Google Drive？', () => {
                performBackup();
            });
        }
    };
    // 2. 雲端還原 (含防循環邏輯)
const handleManualRestore = async (url, pwd, isAutoCheck = false) => {
        if (!url) {
            if (!isAutoCheck) showAlert('提示', '請先設定 URL');
            return;
        }

        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ op: 'restore', password: pwd })
            });
            
            const text = await res.text();

            let result;
            try { result = JSON.parse(text); } catch(e) {
                if (!isAutoCheck) showAlert('錯誤', '伺服器回應格式錯誤，請確認 GAS 腳本設定。');
                return;
            }

            // 相容多種 GAS 回傳格式
            // 1. { status:'success', data:{...} }  2. { success:true, data:{...} }
            // 3. 直接回傳資料物件 { transactions:[...], ... }
            // 4. data 欄位為 JSON 字串 (GAS 雙重編碼)
            let cloudData = null;
            if (result.data) {
                cloudData = typeof result.data === 'string' ? JSON.parse(result.data) : result.data;
            } else if (result.transactions || result.accounts) {
                cloudData = result;
            }

            if (!cloudData) {
                // 無法識別格式，顯示原始回應供除錯
                const msg = result.message || result.error || result.status || JSON.stringify(result).substring(0, 200);
                if (!isAutoCheck) showAlert('還原失敗', `伺服器回應：${msg}`);
                return;
            }

            // cloudData 已確認有效，進入時間比對
            {
                // 時間比對邏輯
                const cloudTimeStr = cloudData.lastBackup || cloudData.timestamp;
                const cloudTime = cloudTimeStr ? new Date(cloudTimeStr).getTime() : 0;
                const localSyncStr = localStorage.getItem('mm_last_sync_time');
                const localTime = localSyncStr ? new Date(localSyncStr).getTime() : 0;

                if (isAutoCheck && (!cloudTime || cloudTime <= localTime + 2000)) {
                    return;
                }

                // 時間上雲端較新，再比對實際內容是否有差異
                if (isAutoCheck) {
                    const localTheme = localStorage.getItem('mm_theme') || '';
                    const cloudTheme = (cloudData.preferences && cloudData.preferences.theme) || '';
                    const localFontSize = localStorage.getItem('mm_font_size') || 'sm';
                    const cloudFontSize = (cloudData.preferences && cloudData.preferences.fontSize) || 'sm';
                    const dataMatches =
                        (cloudData.transactions || []).length === transactions.length &&
                        (cloudData.accounts || []).length === accounts.length &&
                        localTheme === cloudTheme &&
                        localFontSize === cloudFontSize;
                    if (dataMatches) {
                        // 資料相同，靜默更新同步時間，不打擾使用者
                        if (cloudTimeStr) localStorage.setItem('mm_last_sync_time', cloudTimeStr);
                        return;
                    }
                }

                const backupTimeDisplay = cloudTimeStr ? new Date(cloudTimeStr).toLocaleString() : '未知時間';
                
                showConfirm(
                    isAutoCheck ? '雲端同步通知' : '雲端還原', 
                    `發現新版雲端備份！\n備份時間：${backupTimeDisplay}\n\n是否下載並覆蓋本機資料？`, 
                    () => {
                        const currentCloudSettings = {
                            url: url,
                            password: pwd,
                            autoCheck: cloudSettings.autoCheck,
                            autoBackup: cloudSettings.autoBackup
                        };

                        ['mm_transactions','mm_accounts','mm_categories','mm_recurring','mm_templates',
                         'mm_cloud_settings','mm_last_sync_time','mm_theme','mm_privacy','mm_budget',
                         'mm_currency','mm_quick_templates',
                         'mm_savings_goals','mm_custom_tags','mm_split_contacts','mm_debts','mm_projects','mm_nw_history'].forEach(k => localStorage.removeItem(k));

                        if(cloudData.transactions) localStorage.setItem('mm_transactions', JSON.stringify(cloudData.transactions));
                        if(cloudData.accounts) localStorage.setItem('mm_accounts', JSON.stringify(cloudData.accounts));
                        if(cloudData.categories) localStorage.setItem('mm_categories', JSON.stringify(cloudData.categories));
                        if(cloudData.recurringItems) localStorage.setItem('mm_recurring', JSON.stringify(cloudData.recurringItems));
                        if(cloudData.quickTemplates) localStorage.setItem('mm_templates', JSON.stringify(cloudData.quickTemplates));
                        if(cloudData.savingsGoals) localStorage.setItem('mm_savings_goals', JSON.stringify(cloudData.savingsGoals));
                        if(cloudData.customTags) localStorage.setItem('mm_custom_tags', JSON.stringify(cloudData.customTags));
                        if(cloudData.splitContacts) localStorage.setItem('mm_split_contacts', JSON.stringify(cloudData.splitContacts));
                        if(cloudData.debts) localStorage.setItem('mm_debts', JSON.stringify(cloudData.debts));
                        if(cloudData.projects) localStorage.setItem('mm_projects', JSON.stringify(cloudData.projects));
                        if(cloudData.netWorthHistory) localStorage.setItem('mm_nw_history', JSON.stringify(cloudData.netWorthHistory));
                        
                        localStorage.setItem('mm_cloud_settings', JSON.stringify(currentCloudSettings));

                        const newSyncTime = cloudTimeStr || new Date().toISOString();
                        localStorage.setItem('mm_last_sync_time', newSyncTime);

                        if (cloudData.preferences) {
                            const validThemes = ['t-haze','t-sage','t-blush','t-violet','t-roasted','t-cement'];
                            if (validThemes.includes(cloudData.preferences.theme)) {
                                localStorage.setItem('mm_theme', cloudData.preferences.theme);
                            }
                            if (cloudData.preferences.privacy !== undefined) {
                                localStorage.setItem('mm_privacy', cloudData.preferences.privacy ? 'true' : 'false');
                            }
                            if (cloudData.preferences.fontSize) {
                                localStorage.setItem('mm_font_size', cloudData.preferences.fontSize);
                            }
                        }

                        sessionStorage.setItem('mm_just_restored', 'true');
                        window.location.reload();
                    },
                    () => {
                        if (isAutoCheck && cloudTimeStr) {
                            localStorage.setItem('mm_last_sync_time', cloudTimeStr);
                        }
                    }
                );
            }
        } catch (e) {
            if (!isAutoCheck) showAlert('錯誤', '連線失敗，請檢查 URL 與網路狀態。');
        }
    };
    // 3. ★ 新增：自動備份監聽器 (Debounce 5秒)
    useEffect(() => {
        // 只有當設定開啟，且 URL 存在時才執行
        if (cloudSettings.autoBackup && cloudSettings.url) {
            // 設定一個計時器，5秒後執行備份
            const timer = setTimeout(() => {
                handleCloudBackup(true); // true = 靜默模式，不跳 alert
            }, 5000);

            // 如果 5秒內資料又變動，清除上一個計時器 (重新計時)
            return () => clearTimeout(timer);
        }
    }, [
        // 監聽所有資料變動（含外觀設定）
        transactions, accounts, categories, recurringItems, quickTemplates,
        appTheme, fontSize,
        cloudSettings.autoBackup, // 監聽開關
        cloudSettings.url         // M15修：URL 變更時立即以新網址備份
    ]);

    // 4. 啟動時自動檢查 (保持原本邏輯)
    const hasCheckedCloud = useRef(false);
    
    useEffect(() => {
        // ★ 新增：檢查是否剛還原完
        // sessionStorage 的特性是：頁面重整還在，但關閉分頁就會消失
        // 這非常適合用來判斷「是否剛經歷過重整」
        const justRestored = sessionStorage.getItem('mm_just_restored');

        if (justRestored) {
            // 清除旗標，下次重開 App (非重整) 時才會正常檢查
            sessionStorage.removeItem('mm_just_restored');
            // 標記為已檢查，避免後續邏輯觸發
            hasCheckedCloud.current = true;
            return;
        }

        // 原本的檢查邏輯
        if (!hasCheckedCloud.current && cloudSettings.url && cloudSettings.autoCheck) {
            hasCheckedCloud.current = true;
            setTimeout(() => {
                // true = 靜默模式
                handleManualRestore(cloudSettings.url, cloudSettings.password, true);
            }, 1000);
        }
    }, [cloudSettings.url, cloudSettings.autoCheck]);

    // M14修：加 try-catch 及陣列型別驗證，雲端格式異常不污染 state
    const applyCloudData = (data) => {
        try {
            const finalData = data.transactions ? data : (data.data || data);
            if (!Array.isArray(finalData.transactions)) {
                showAlert('還原失敗', '雲端資料格式有誤（transactions 非陣列），請確認備份內容。');
                return;
            }
            setTransactions(finalData.transactions);
            setAccounts(Array.isArray(finalData.accounts) ? finalData.accounts : []);
            setCategories(finalData.categories && typeof finalData.categories === 'object' ? finalData.categories : {});
            setQuickTemplates(Array.isArray(finalData.quickTemplates) ? finalData.quickTemplates : []);
            setRecurringItems(Array.isArray(finalData.recurringItems) ? finalData.recurringItems : []);
            if (Array.isArray(finalData.splitContacts)) setSplitContacts(finalData.splitContacts);
            if (Array.isArray(finalData.debts)) setDebts(finalData.debts);
            if (Array.isArray(finalData.projects)) setProjects(finalData.projects);
            if (Array.isArray(finalData.savingsGoals)) setSavingsGoals(finalData.savingsGoals);
            if (Array.isArray(finalData.customTags)) setCustomTags(finalData.customTags);
            if (Array.isArray(finalData.netWorthHistory)) setNetWorthHistory(finalData.netWorthHistory);
            setLastSyncTime(finalData.backupDate || new Date().toISOString());
            if (!data.silent) showAlert('完成', '資料已同步！');
        } catch (e) {
            showAlert('還原失敗', `解析錯誤：${e.message}`);
        }
    };

    // ==========================================
    // D. 對外公開的資料 (Context Value)

    const categoryMap = useMemo(() => {

    const value = {

        fontSize, setFontSize,
        quickAmounts, setQuickAmounts,
        setTransactions, setAccounts, setCategories, setQuickTemplates, setRecurringItems, setCloudSettings,
        totalAssets: useMemo(() => accounts.reduce((sum, acc) => sum + acc.balance, 0), [accounts]),
        categoryMap, accountMap,
        
        // 動作
        handleSaveTransaction, handleSaveTriParty, handleDeleteTransaction, handleSaveAccount, handleReorderAccounts,
        handleSettleSplit, handleMergeAndDeleteCategory,
        handleExportData, handleExportCSV, handleImportData, handleDeleteAccount, hasCheckedCloud,
        handleCloudBackup, handleManualRestore, applyCloudData,

        // F4 儲蓄目標
        savingsGoals, handleSaveSavingsGoal, handleDeleteSavingsGoal,

        customTags, handleSaveCustomTag, handleDeleteCustomTag,

        debts, handleSaveDebtEntry, handleDeleteDebtEntry,

    return (

            {isSaving && <div className="fixed inset-0 z-[1300] bg-black/50 flex items-center justify-center animate-fade-in"><div className="bg-white px-6 py-4 rounded-lg shadow-xl flex items-center gap-3"><div className="w-4 h-4 border-2 border-gray-200 border-t-[#333] rounded-full animate-spin"></div><span className="text-sm font-medium text-[#333]">處理中...</span></div></div>}
        </DataContext.Provider>
    );
};

// ReportsView — 月份報表 + 年度報表
// ==========================================
const ReportsView = ({ onBack }) => {
    const { transactions, categories, showAlert, netWorthHistory, accounts } = React.useContext(DataContext);
    const [tab, setTab] = useState('monthly');

    // 月份選擇器（預設：上月）
    const [selectedMonth, setSelectedMonth] = useState(() => {
        const d = new Date(); d.setMonth(d.getMonth() - 1);
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    });
    // 年度選擇器（預設：今年）
    const [selectedYear, setSelectedYear] = useState(new Date().getFullYear());
    // F1: 標籤統計（期間切換 + 聚焦標籤）
    const [tagRange, setTagRange] = useState('6m'); // 'month' | '6m' | 'year'
    const [focusTag, setFocusTag] = useState(null);

    // 淨資產模擬（純前端試算，記住上次輸入值）
    const [showSim, setShowSim] = useState(false);
    const [simTargetAmount, setSimTargetAmount] = useState(() => { try { return (JSON.parse(localStorage.getItem('mm_sim_goal'))?.targetAmount ?? '').toString(); } catch { return ''; } });
    const [simTargetDate, setSimTargetDate] = useState(() => { try { return JSON.parse(localStorage.getItem('mm_sim_goal'))?.targetDate || ''; } catch { return ''; } });
    const [simOverrideNet, setSimOverrideNet] = useState(''); // 空＝採用自動帶入的月結餘
    useEffect(() => {
        try { localStorage.setItem('mm_sim_goal', JSON.stringify({ targetAmount: simTargetAmount, targetDate: simTargetDate })); } catch {}
    }, [simTargetAmount, simTargetDate]);

    const { BarChart: RB, Bar, XAxis: RX, YAxis: RY, CartesianGrid: RCG, Tooltip: RT, ResponsiveContainer: RC } = window.Recharts || {};

    const getAmt = (t) => t.splitMyShare !== undefined ? t.splitMyShare :
        ((t.payer === 'me' || (t.tags||[]).includes('#分帳')) ? Math.round(t.amount/2) : t.amount);

    // 月份報表資料
    const monthlyReport = useMemo(() => {
        const [yr, mo] = selectedMonth.split('-').map(Number);
        const txs = transactions.filter(t => t.date.startsWith(selectedMonth) && !(t.tags||[]).includes('#代購'));
        const expense = txs.filter(t=>t.type==='expense').reduce((s,t)=>s+getAmt(t), 0);
        const income = txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount, 0);
        const catMap = {};
        txs.filter(t=>t.type==='expense').forEach(t => {
            const cat = categories.expense.find(c=>c.id===t.categoryId);
            catMap[cat?.name||'其他'] = (catMap[cat?.name||'其他']||0) + getAmt(t);
        });
        const topCats = Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
        const daysInMonth = new Date(yr, mo, 0).getDate();
        const avgDaily = daysInMonth > 0 ? Math.round(expense / daysInMonth) : 0;
        const expenseCount = txs.filter(t=>t.type==='expense').length;
        const savingsRate = income > 0 ? Math.round((income-expense)/income*100) : null;
        const prevMo = mo===1?12:mo-1; const prevYr = mo===1?yr-1:yr;
        const prevYm = `${prevYr}-${String(prevMo).padStart(2,'0')}`;
        const prevTxs = transactions.filter(t => t.date.startsWith(prevYm) && !(t.tags||[]).includes('#代購'));
        const prevExpense = prevTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+getAmt(t), 0);
        const expenseDiff = prevExpense > 0 ? Math.round((expense-prevExpense)/prevExpense*100) : null;

        // 收入差異（與前月，沿用同一 prevTxs）
        const prevIncome = prevTxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount, 0);
        const incomeDiff = prevIncome > 0 ? Math.round((income-prevIncome)/prevIncome*100) : null;

        // 近期淨資產增減（最近兩筆快照差額，不足 2 筆回 null）
        const sortedNW = [...netWorthHistory].sort((a,b)=>new Date(a.date)-new Date(b.date));
        const netWorthDiff = sortedNW.length >= 2 ? sortedNW[sortedNW.length-1].value - sortedNW[sortedNW.length-2].value : null;

        // 平均每筆消費（expenseCount 為 0 回 null，避免除以 0）
        const avgPerExpense = expenseCount > 0 ? Math.round(expense / expenseCount) : null;

        // 最大單筆支出（以個人份額排序，沿用 getAmt 份額公式）
        const expenseTxs = txs.filter(t=>t.type==='expense');
        const expenseWithShare = expenseTxs.map(t => ({ ...t, shareAmount: getAmt(t) }));
        const maxExpenseTx = expenseWithShare.length > 0 ? expenseWithShare.reduce((max, t) => t.shareAmount > max.shareAmount ? t : max) : null;
        const maxExpenseCat = maxExpenseTx ? (categories.expense.find(c=>c.id===maxExpenseTx.categoryId)?.name || '其他') : null;

        return { expense, income, net: income-expense, topCats, avgDaily, expenseCount,
                 savingsRate, expenseDiff, prevExpense, label: `${yr}/${mo}月`,
                 incomeDiff, netWorthDiff, avgPerExpense, maxExpenseTx, maxExpenseCat };
    }, [transactions, categories, selectedMonth, netWorthHistory]);

    // 年度報表資料
    const yearData = useMemo(() => {
        const now = new Date();
        const currentYm = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
        const months = Array.from({length:12}, (_,i) => {
            const m = i+1;
            const ym = `${selectedYear}-${String(m).padStart(2,'0')}`;
            return { ym, month: m, income: 0, expense: 0, isFuture: ym > currentYm };
        });
        transactions.filter(t => t.date.startsWith(`${selectedYear}-`) && !(t.tags||[]).includes('#代購'))
            .forEach(t => {
                const idx = months.findIndex(m => m.ym === t.date.slice(0,7));
                if (idx < 0) return;
                if (t.type === 'income') months[idx].income += t.amount;
                if (t.type === 'expense') months[idx].expense += getAmt(t);
            });
        const past = months.filter(m => !m.isFuture);
        const totalIncome = past.reduce((s,m)=>s+m.income, 0);
        const totalExpense = past.reduce((s,m)=>s+m.expense, 0);
        const avgMonthlyExpense = past.length > 0 ? Math.round(totalExpense/past.length) : 0;
        const savingsRate = totalIncome > 0 ? Math.round((totalIncome-totalExpense)/totalIncome*100) : null;
        const withExp = past.filter(m=>m.expense>0);
        const minExpenseMonth = withExp.length > 0 ? withExp.reduce((a,b)=>a.expense<b.expense?a:b) : null;
        const maxExpenseMonth = withExp.length > 0 ? withExp.reduce((a,b)=>a.expense>b.expense?a:b) : null;
        const avgMonthlyIncome = past.length > 0 ? Math.round(totalIncome/past.length) : 0;
        const netThis = totalIncome - totalExpense; // 年度累積結餘（帶正負號＝實際存下 / 透支）

        // 今年 vs 去年同期（以本年已過月份數 N，對比去年同 1..N 月，較公平）
        const N = past.length;
        let prevIncome = 0, prevExpense = 0;
        transactions.filter(t => t.date.startsWith(`${selectedYear-1}-`) && !(t.tags||[]).includes('#代購'))
            .forEach(t => {
                const mo = Number(t.date.slice(5,7));
                if (mo > N) return;
                if (t.type === 'income') prevIncome += t.amount;
                else if (t.type === 'expense') prevExpense += getAmt(t);
            });
        const prevNet = prevIncome - prevExpense;
        const hasPrevYear = prevIncome > 0 || prevExpense > 0;
        const incomeYoY = prevIncome > 0 ? Math.round((totalIncome-prevIncome)/prevIncome*100) : null;
        const expenseYoY = prevExpense > 0 ? Math.round((totalExpense-prevExpense)/prevExpense*100) : null;

        const catMap = {};
        transactions.filter(t => t.date.startsWith(`${selectedYear}-`) && t.type==='expense' && !(t.tags||[]).includes('#代購'))
            .forEach(t => { const cat = categories.expense.find(c=>c.id===t.categoryId); catMap[cat?.name||'其他'] = (catMap[cat?.name||'其他']||0) + getAmt(t); });
        const topCats = Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,10);
        return { months, totalIncome, totalExpense, avgMonthlyExpense, savingsRate, minExpenseMonth, topCats,
                 maxExpenseMonth, avgMonthlyIncome, netThis, prevIncome, prevExpense, prevNet, hasPrevYear, incomeYoY, expenseYoY, compareMonths: N };
    }, [transactions, categories, selectedYear]);

    const chartData = yearData.months.map(m => ({
        name: `${m.month}月`,
        支出: m.isFuture ? undefined : m.expense,
        收入: m.isFuture ? undefined : m.income,
    }));

    // 財務體檢資料（近 6 個月收支/儲蓄率 + 淨資產成長 + 綜合健康分數）
    const healthData = useMemo(() => {
        const now = new Date();
        const months = [];
        for (let i = 5; i >= 0; i--) {
            const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
            months.push({ ym: `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`, mo: d.getMonth()+1, income: 0, expense: 0 });
        }
        transactions.filter(t => !(t.tags||[]).includes('#代購')).forEach(t => {
            const m = months.find(x => x.ym === t.date.slice(0,7));
            if (!m) return;
            if (t.type === 'income') m.income += t.amount;
            else if (t.type === 'expense') m.expense += getAmt(t);
        });
        months.forEach(m => {
            m.net = m.income - m.expense;
            m.savingsRate = m.income > 0 ? Math.round((m.income - m.expense)/m.income*100) : null;
            m.hasData = m.income > 0 || m.expense > 0;
        });
        const active = months.filter(m => m.hasData);
        const maxAbsNet = Math.max(1, ...months.map(m => Math.abs(m.net)));

        // 儲蓄率分（近 6 個月平均，30% 視為滿分）
        const srMonths = months.filter(m => m.savingsRate !== null);
        const avgSavings = srMonths.length > 0 ? Math.round(srMonths.reduce((s,m)=>s+m.savingsRate,0)/srMonths.length) : null;
        const savingsScore = avgSavings === null ? null : Math.max(0, Math.min(1, avgSavings/30)) * 100;
        const savingsTrend = srMonths.length >= 2 ? srMonths[srMonths.length-1].savingsRate - srMonths[0].savingsRate : 0;

        // 結餘分（近 6 個月「有剩錢」的月份比例）
        const positiveMonths = active.filter(m => m.net >= 0).length;
        const surplusScore = active.length > 0 ? (positiveMonths/active.length)*100 : null;

        // 淨資產成長分（最早 vs 最新快照，±10% 對應 0~100，持平 50）
        const sortedNW = [...netWorthHistory].sort((a,b)=>new Date(a.date)-new Date(b.date));
        let netWorthScore = null, nwLatest = null, nwDiff = null;
        if (sortedNW.length >= 2) {
            nwLatest = sortedNW[sortedNW.length-1].value;
            const nwEarlier = sortedNW[0].value;
            nwDiff = nwLatest - nwEarlier;
            const ratio = nwEarlier !== 0 ? nwDiff/Math.abs(nwEarlier) : (nwDiff>0?0.1:nwDiff<0?-0.1:0);
            netWorthScore = Math.max(0, Math.min(100, 50 + ratio*500));
        }

        // 加權總分（儲蓄率 40 / 月月有剩 30 / 淨資產成長 30；缺項自動重新分配權重）
        const parts = [];
        if (savingsScore !== null) parts.push([savingsScore, 40]);
        if (surplusScore !== null) parts.push([surplusScore, 30]);
        if (netWorthScore !== null) parts.push([netWorthScore, 30]);
        const totalW = parts.reduce((s,p)=>s+p[1],0);
        const score = totalW > 0 ? Math.round(parts.reduce((s,p)=>s+p[0]*p[1],0)/totalW) : null;

        return { months, maxAbsNet, avgSavings, savingsScore, savingsTrend,
                 positiveMonths, activeCount: active.length, surplusScore,
                 nwCount: sortedNW.length, nwLatest, nwDiff, netWorthScore, score };
    }, [transactions, netWorthHistory]);

    // F1: 自訂標籤支出統計（排除系統標籤與 #代購；金額沿用份額公式 getAmt；一筆多標籤各計一次）
    const tagStats = useMemo(() => {
        const SYS = new Set(['#分帳','#代購','#應付','#代墊','#週期','#分期','#已結清','#調整','#全額','#借貸','#退款','#作廢']);
        const now = new Date();
        const curYm = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
        const last6 = [];
        for (let i = 5; i >= 0; i--) {
            const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
            last6.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
        }
        const inRange = (t) => {
            if (tagRange === 'month') return t.date.startsWith(curYm);
            if (tagRange === 'year') return t.date.startsWith(String(now.getFullYear()) + '-');
            return t.date.slice(0,7) >= last6[0];
        };
        const map = {};
        transactions.forEach(t => {
            if (t.type !== 'expense') return;
            const tags = t.tags || [];
            if (tags.includes('#代購') || !inRange(t)) return;
            tags.forEach(tag => {
                if (SYS.has(tag)) return;
                if (!map[tag]) map[tag] = { total: 0, count: 0 };
                map[tag].total += getAmt(t);
                map[tag].count += 1;
            });
        });
        const ranked = Object.entries(map).sort((a,b)=>b[1].total-a[1].total).slice(0,10);
        const grandTotal = ranked.reduce((s,pair)=>s+pair[1].total,0);
        // 趨勢：聚焦標籤（預設排行第一）固定看近 6 個月
        const trendTag = (focusTag && map[focusTag]) ? focusTag : (ranked[0] ? ranked[0][0] : null);
        let trend = [];
        if (trendTag) {
            trend = last6.map(ym => {
                const total = transactions.reduce((s,t) => {
                    if (t.type !== 'expense') return s;
                    const tags = t.tags || [];
                    if (tags.includes('#代購') || !tags.includes(trendTag) || !t.date.startsWith(ym)) return s;
                    return s + getAmt(t);
                }, 0);
                return { ym, mo: Number(ym.split('-')[1]), total };
            });
        }
        const maxTrend = Math.max(1, ...trend.map(x=>x.total));
        return { ranked, grandTotal, trendTag, trend, maxTrend };
    }, [transactions, tagRange, focusTag]);

    const healthRing = { R: 52, C: 2 * Math.PI * 52 };

                            {monthlyReport.expenseDiff !== null && (

                                        {monthlyReport.expenseDiff>0?'▲':'▼'} {Math.abs(monthlyReport.expenseDiff)}%
                                        <span className="text-gray-400 font-normal ml-1">(前月 ${formatMoney(monthlyReport.prevExpense)})</span>

                            )}
                            {monthlyReport.topCats.length > 0 && (
                                <div className="muji-card p-3 space-y-2">
                                    <div className="text-[10px] text-gray-400 uppercase tracking-widest">支出分類</div>
                                    {monthlyReport.topCats.map(([name,amt])=>{
                                        const pct = Math.round(amt/monthlyReport.expense*100);
                                        return (<div key={name}><div className="flex justify-between text-xs mb-0.5"><span className="text-[#333]">{name}</span><span className="text-gray-400">${formatMoney(amt)} ({pct}%)</span></div><div className="h-1 bg-gray-100 rounded-full overflow-hidden"><div className="h-full bg-[#5CB85C] rounded-full animate-grow" style={{width:`${pct}%`}}/></div></div>);
                                    })}

                            <button onClick={()=>{
                                const text = `📊 ${monthlyReport.label} 財務摘要\n支出：$${formatMoney(monthlyReport.expense)}\n收入：$${formatMoney(monthlyReport.income)}\n結餘：${monthlyReport.net>=0?'+':''}$${formatMoney(monthlyReport.net)}\n日均：$${formatMoney(monthlyReport.avgDaily)}\n儲蓄率：${monthlyReport.savingsRate!==null?monthlyReport.savingsRate+'%':'—'}\n筆數：${monthlyReport.expenseCount}筆`;
                                if(navigator.share) navigator.share({title:'財務報表',text}); else navigator.clipboard?.writeText(text).then(()=>showAlert('已複製','報表已複製到剪貼簿'));
                            }} className="w-full border border-gray-200 text-gray-500 py-2 rounded text-sm flex items-center justify-center gap-2 hover:bg-gray-50 transition">

                ) : tab === 'annual' ? (
                    <>
                        <div className="flex items-center justify-between">
                            <button onClick={()=>setSelectedYear(y=>y-1)} className="p-2 rounded-full hover:bg-gray-100 transition"><Icon name="back" size={20}/></button>
                            <span className="text-base font-medium text-[#333]">{selectedYear} 年</span>
                            <button onClick={()=>setSelectedYear(y=>Math.min(y+1,new Date().getFullYear()))} className="p-2 rounded-full hover:bg-gray-100 transition"><Icon name="chevronRight" size={20}/></button>
                        </div>
                        {yearData.totalIncome === 0 && yearData.totalExpense === 0 ? (
                            <div className="text-center py-12 text-gray-400 text-sm">此年份無資料</div>
                        ) : (<>
                            <div className="grid grid-cols-3 gap-2 text-center">
                                {[['年度收入',formatMoney(yearData.totalIncome),'text-[#5CB85C]'],['年度支出',formatMoney(yearData.totalExpense),'text-[#333]'],['年度結餘',formatMoney(Math.abs(yearData.totalIncome-yearData.totalExpense)),yearData.totalIncome>=yearData.totalExpense?'text-[#5CB85C]':'text-red-500']].map(([label,val,cls])=>(

                                ))}
                            </div>
                            <div className="grid grid-cols-3 gap-2 text-center">
                                {[['最高支出月', yearData.maxExpenseMonth?`${yearData.maxExpenseMonth.month}月`:'—','text-[#333]'],['月均收入','$'+formatMoney(yearData.avgMonthlyIncome),'text-[#5CB85C]'],['年度累積結餘', (yearData.netThis>=0?'存下 $':'透支 $')+formatMoney(Math.abs(yearData.netThis)), yearData.netThis>=0?'text-[#5CB85C]':'text-red-500']].map(([label,val,cls])=>(
