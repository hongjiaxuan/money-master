                                        <circle cx="70" cy="70" r={healthRing.R} fill="none" stroke={rating.color} strokeWidth="10" strokeLinecap="round"
                                            strokeDasharray={healthRing.C} strokeDashoffset={healthRing.C*(1-healthData.score/100)}
                                            transform="rotate(-90 70 70)" style={{transition:'stroke-dashoffset 0.6s ease'}}/>
                                    </svg>
                                    <div className="absolute inset-0 flex flex-col items-center justify-center">
                                        <div className="text-3xl font-medium tabular-nums" style={{color:rating.color}}>{healthData.score}</div>
                                        <div className="text-[11px]" style={{color:rating.color}}>{rating.label}</div>
                                    </div>
                                </div>
                                <div className="text-[11px] text-gray-400 text-center mt-2 px-2">{rating.tip}</div>
                            </div>

                            {/* 三項小分數 */}
                            <div className="grid grid-cols-3 gap-2 text-center">
                                {[['儲蓄率', healthData.savingsScore],['月月有剩', healthData.surplusScore],['淨資產成長', healthData.netWorthScore]].map(([label,sc])=>(
                                    <div key={label} className="muji-card p-2">
                                        <div className="text-[10px] text-gray-400 mb-0.5">{label}</div>
                                        <div className="text-sm font-medium text-[#333] tabular-nums">{sc==null?'—':Math.round(sc)+'分'}</div>
                                    </div>
                                ))}
                            </div>

                            {/* 淨資產成長 */}
                            <div className="muji-card p-3">
                                <div className="text-[10px] text-gray-400 uppercase tracking-widest mb-2">淨資產成長</div>
                                {healthData.nwCount < 2 ? (
                                    <div className="text-[11px] text-gray-400">資料累積中（需要至少 2 筆淨資產快照，APP 使用中會自動累積）</div>
                                ) : (
                                    <div className="flex items-center justify-between">
                                        <div>
                                            <div className="text-[10px] text-gray-400">目前淨資產</div>
                                            <div className="text-base font-medium text-[#333] tabular-nums">${formatMoney(healthData.nwLatest)}</div>
                                        </div>
                                        <div className="text-right">
                                            <div className="text-[10px] text-gray-400">累積變化</div>
                                            <div className={`text-base font-medium tabular-nums ${healthData.nwDiff>=0?'text-[#5CB85C]':'text-red-500'}`}>
                                                {healthData.nwDiff>=0?'▲ +$':'▼ -$'}{formatMoney(Math.abs(healthData.nwDiff))}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* 每月結餘趨勢 */}
                            <div className="muji-card p-3">
                                <div className="flex justify-between items-center mb-2">
                                    <div className="text-[10px] text-gray-400 uppercase tracking-widest">每月結餘趨勢</div>
                                    <div className="text-[10px] text-gray-400">近6月 {healthData.positiveMonths}/{healthData.activeCount} 個月有剩</div>
                                </div>
                                <div className="flex items-end justify-between gap-1" style={{height:70}}>
                                    {healthData.months.map(m=>{
                                        const h = Math.round(Math.abs(m.net)/healthData.maxAbsNet*50)+4;
                                        return (
                                            <div key={m.ym} className="flex-1 flex flex-col items-center justify-end gap-1" style={{height:'100%'}}>
                                                <div className="w-full rounded-t" style={{height:h, background:m.net>=0?'#5CB85C':'#EF4444', opacity:m.hasData?1:0.25}}/>
                                                <div className="text-[9px] text-gray-400">{m.mo}月</div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* 儲蓄率趨勢 */}
                            <div className="muji-card p-3">
                                <div className="flex justify-between items-center mb-2">
                                    <div className="text-[10px] text-gray-400 uppercase tracking-widest">儲蓄率趨勢</div>
                                    <div className={`text-[10px] font-medium ${healthData.savingsTrend>0?'text-[#5CB85C]':healthData.savingsTrend<0?'text-red-500':'text-gray-400'}`}>
                                        {healthData.savingsTrend>0?'▲ 上升':healthData.savingsTrend<0?'▼ 下降':'持平'}
                                    </div>
                                </div>
                                <div className="flex items-end justify-between gap-1" style={{height:78}}>
                                    {healthData.months.map(m=>{
                                        const sr = m.savingsRate;
                                        const h = sr==null?4:Math.max(4, Math.round(Math.max(0,Math.min(100,sr))/100*54)+4);
                                        return (
                                            <div key={m.ym} className="flex-1 flex flex-col items-center justify-end gap-0.5" style={{height:'100%'}}>
                                                <div className="text-[8px] text-gray-400">{sr==null?'':sr+'%'}</div>
                                                <div className="w-full rounded-t" style={{height:h, background:sr==null?'#DDDDDD':(sr>=0?'#5CB85C':'#EF4444'), opacity:sr==null?0.4:1}}/>
                                                <div className="text-[9px] text-gray-400">{m.mo}月</div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </>)}
                    </>
                ) : (
                    <>
                        {/* F1: 自訂標籤支出統計 */}
                        <div className="flex bg-[#F5F5F3] p-0.5 rounded-lg">
                            {[['month','本月'],['6m','近6月'],['year','本年']].map(([k,label])=>(
                                <button key={k} onClick={()=>setTagRange(k)} className={`flex-1 py-1 text-xs rounded transition ${tagRange===k?'bg-white shadow text-[#333] font-medium':'text-gray-400'}`}>{label}</button>
                            ))}
                        </div>
                        {tagStats.ranked.length === 0 ? (
                            <div className="text-center py-12 text-gray-400 text-sm">此期間無帶自訂標籤的支出<br/><span className="text-[11px]">記帳時在金額頁點選自訂標籤即可累積統計</span></div>
                        ) : (<>
                            <div className="muji-card p-3 space-y-2">
                                <div className="flex justify-between items-center">
                                    <div className="text-[10px] text-gray-400 uppercase tracking-widest">標籤支出排行</div>
                                    <div className="text-[9px] text-gray-300">同筆多標籤會分別計入</div>
                                </div>
                                {tagStats.ranked.map(([tag, v]) => {
                                    const pct = tagStats.grandTotal > 0 ? Math.round(v.total/tagStats.grandTotal*100) : 0;
                                    const active = tagStats.trendTag === tag;
                                    return (
                                        <div key={tag} onClick={()=>setFocusTag(tag)} className="cursor-pointer">
                                            <div className="flex justify-between text-xs mb-0.5">
                                                <span className={`text-[#333] ${active?'font-medium':''}`}>{tag}<span className="text-gray-300 ml-1 font-normal">×{v.count}</span></span>
                                                <span className="text-gray-400">${formatMoney(v.total)} ({pct}%)</span>
                                            </div>
                                            <div className="h-1 bg-gray-100 rounded-full overflow-hidden"><div className={`h-full rounded-full animate-grow ${active?'bg-[#5CB85C]':'bg-[#333]'}`} style={{width:`${pct}%`}}/></div>
                                        </div>
                                    );
                                })}
                            </div>
                            {tagStats.trendTag && (
                                <div className="muji-card p-3">
                                    <div className="flex justify-between items-center mb-2">
                                        <div className="text-[10px] text-gray-400 uppercase tracking-widest">{tagStats.trendTag} 近 6 個月</div>
                                        <div className="text-[9px] text-gray-300">點排行列可切換標籤</div>
                                    </div>
                                    <div className="flex items-end justify-between gap-1" style={{height:74}}>
                                        {tagStats.trend.map(m=>{
                                            const h = Math.round(m.total/tagStats.maxTrend*46)+4;
                                            return (
                                                <div key={m.ym} className="flex-1 flex flex-col items-center justify-end gap-0.5" style={{height:'100%'}}>
                                                    <div className="text-[8px] text-gray-400">{m.total>0?'$'+formatMoney(m.total):''}</div>
                                                    <div className="w-full rounded-t" style={{height:h, background:'#5CB85C', opacity:m.total>0?1:0.25}}/>
                                                    <div className="text-[9px] text-gray-400">{m.mo}月</div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                        </>)}
                    </>
                )}
            </div>
        </div>
    );
};

// ==========================================
// 3. MainLayout (負責 UI 顯示與導航) [修復連結版]
// ==========================================
const MainLayout = () => {
    const [activeTab, setActiveTab] = useState('home');
    const [showAddModal, setShowAddModal] = useState(false);
    const [showQuickSheet, setShowQuickSheet] = useState(false);
    const [showQuickEntry, setShowQuickEntry] = useState(null);
    const [editingTransaction, setEditingTransaction] = useState(null);
    const [selectedAccountId, setSelectedAccountId] = useState(null);
    const [selectedGoalId, setSelectedGoalId] = useState(null);
    const [selectedProjectId, setSelectedProjectId] = useState(null);
    const [editingAccount, setEditingAccount] = useState(null);
    const [showMonthRecap, setShowMonthRecap] = useState(false);
    const [recapData, setRecapData] = useState(null);
    const [showTriParty, setShowTriParty] = useState(false);
    const MAIN_TABS = ['home', 'split_manager', 'assets', 'settings'];

    const {
        transactions, accounts, categories, quickTemplates, recurringItems, totalAssets,
        handleSaveTransaction, handleSaveTriParty, handleDeleteTransaction, handleSaveAccount, handleReorderAccounts,
        handleDeleteAccount, splitContacts,
        handleExportData, handleImportData, handleManualRestore, handleCloudBackup,
        setCategories, setRecurringItems, setQuickTemplates, setCloudSettings,
        showAlert, showConfirm
    } = React.useContext(DataContext);
    const handleSwipeLeft = () => {
        const currentIndex = MAIN_TABS.indexOf(activeTab);
        if (currentIndex !== -1 && currentIndex < MAIN_TABS.length - 1) {
            setActiveTab(MAIN_TABS[currentIndex + 1]);
        }
    };

    const handleSwipeRight = () => {
        if (activeTab === 'categories' || activeTab === 'recurring' || activeTab === 'templates' || activeTab === 'projects') {
            setActiveTab('settings');
            return;
        }
        if (activeTab === 'project_detail') {
            setSelectedProjectId(null);
            setActiveTab('projects');
            return;
        }
        if (activeTab === 'account_detail') {
            setActiveTab('assets');
            setSelectedAccountId(null);
            return;
        }
        if (activeTab === 'debts' || activeTab === 'cashflow') {
            setActiveTab('assets');
            return;
        }
        const currentIndex = MAIN_TABS.indexOf(activeTab);
        if (currentIndex > 0) {
            setActiveTab(MAIN_TABS[currentIndex - 1]);
        }
    };

    const onDeleteAcc = (accId) => {
        handleDeleteAccount(accId);
        setEditingAccount(null);
    };

    const swipeHandlers = useSwipe({ onSwipeLeft: handleSwipeLeft, onSwipeRight: handleSwipeRight });

    const monthlyExpense = useMemo(() => {
        const now = new Date();
        const yearMonthPrefix = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
        return transactions.filter(t => t.type === 'expense' && t.date.startsWith(yearMonthPrefix)).reduce((sum, t) => sum + (t.splitMyShare !== undefined ? t.splitMyShare : ((t.payer === 'me' || (t.tags||[]).includes('#分帳')) ? Math.round(t.amount / 2) : t.amount)), 0);
    }, [transactions]);

    // A5: 月度總結卡片 — 新月份首次開啟（前 7 天內）自動彈出
    useEffect(() => {
        const now = new Date();
        if (now.getDate() > 7) return; // 只在月初前 7 天觸發
        const curYM = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
        const lastRecap = localStorage.getItem('mm_last_recap');
        if (lastRecap === curYM) return;
        // 計算上個月的資料
        const prevD = new Date(now.getFullYear(), now.getMonth() - 1, 1);
        const prevYM = `${prevD.getFullYear()}-${String(prevD.getMonth()+1).padStart(2,'0')}`;
        const prevTxs = transactions.filter(t => t.date.startsWith(prevYM) && !(t.tags||[]).includes('#代購'));
        if (prevTxs.length === 0) return; // 上月無資料，不顯示
        const getAmt = t => t.splitMyShare !== undefined ? t.splitMyShare : ((t.payer==='me' || (t.tags||[]).includes('#分帳')) ? Math.round(t.amount/2) : t.amount);
        const prevExp = prevTxs.filter(t => t.type==='expense').reduce((s,t) => s+getAmt(t), 0);
        const prevInc = prevTxs.filter(t => t.type==='income').reduce((s,t) => s+t.amount, 0);
        const savingsRate = prevInc > 0 ? Math.round((1 - prevExp/prevInc)*100) : 0;
        // 分類支出統計
        const catMap = {};
        prevTxs.filter(t => t.type==='expense').forEach(t => {
            const cat = categories.expense.find(c => c.id === t.categoryId);
            const name = cat ? cat.name : '其他';
            catMap[name] = (catMap[name]||0) + getAmt(t);
        });
        const topCat = Object.entries(catMap).sort((a,b) => b[1]-a[1])[0];
        // 上上月比較
        const prevPrevD = new Date(now.getFullYear(), now.getMonth() - 2, 1);
        const prevPrevYM = `${prevPrevD.getFullYear()}-${String(prevPrevD.getMonth()+1).padStart(2,'0')}`;
        const prevPrevExp = transactions.filter(t => t.date.startsWith(prevPrevYM) && t.type==='expense' && !(t.tags||[]).includes('#代購')).reduce((s,t) => s+getAmt(t), 0);
        const expChange = prevPrevExp > 0 ? Math.round((prevExp - prevPrevExp)/prevPrevExp*100) : 0;
        const encourage = savingsRate > 20 ? '太棒了，儲蓄率超過 20%！繼續保持 💪' :
                          savingsRate > 0 ? '不錯，有在存錢，繼續加油！' :
                          prevExp === 0 ? '上月無支出紀錄' : '本月試著減少非必要支出吧 🌱';
        setRecapData({ prevYM, prevExp, prevInc, savingsRate, topCat, expChange, encourage });
        setTimeout(() => setShowMonthRecap(true), 800);
    }, [transactions, categories]);

    const closeRecap = () => {
        const now = new Date();
        const curYM = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
        localStorage.setItem('mm_last_recap', curYM);
        setShowMonthRecap(false);
    };

    const onSaveTx = (tx) => {
        handleSaveTransaction(tx, editingTransaction ? editingTransaction.id : null);
        closeModal();
        if(showQuickEntry) setShowQuickEntry(null);
    };

    const onDeleteTx = (txId) => {
        handleDeleteTransaction(txId);
        closeModal();
    };

    const onSaveAcc = (accData) => {
        handleSaveAccount(accData);
        setEditingAccount(null);
    };    

    const openAddModal = () => { setEditingTransaction(null); setShowAddModal(true); };
    const openEditModal = (tx) => { setEditingTransaction(tx); setShowAddModal(true); };
    const closeModal = () => { setShowAddModal(false); setEditingTransaction(null); };

    const renderContent = () => {
        switch(activeTab) {
            case 'home':
                return <HomeView transactions={transactions} accounts={accounts} totalAssets={totalAssets} monthlyExpense={monthlyExpense} onEditTransaction={openEditModal} categories={categories} onNavigate={setActiveTab} />;
            case 'reports':
                return <ReportsView onBack={() => setActiveTab('home')} />;
            case 'assets':
                return <AssetsView
                    accounts={accounts}
                    onSelectAccount={(id) => {
                        setSelectedAccountId(id);
                        setActiveTab('account_detail');
                    }}
                    onSelectGoal={(id) => {
                        setSelectedGoalId(id);
                        setActiveTab('savings_goal_detail');
                    }}
                    onAddAccount={() => setEditingAccount({name:'', type:'cash', balance:0, initialBalance:0})}
                    onEditAccount={(acc) => setEditingAccount(acc)}
                    onReorderAccounts={handleReorderAccounts}
                    onOpenDebts={() => setActiveTab('debts')}
                    onOpenCashflow={() => setActiveTab('cashflow')}
                />;
            
            case 'account_detail':
                return <AccountDetailView
                    accountId={selectedAccountId}
                    transactions={transactions}
                    accounts={accounts}
                    categories={categories}
                    onBack={() => {
                        setSelectedAccountId(null);
                        setActiveTab('assets');
                    }}
                    onEditTransaction={openEditModal}
                />;

            case 'savings_goal_detail':
                return <SavingsGoalDetailView
                    goalId={selectedGoalId}
                    onBack={() => {
                        setSelectedGoalId(null);
                        setActiveTab('assets');
                    }}
                    onEditTransaction={openEditModal}
                />;

            
            // ★ 修正：這裡補上了正確的 props，解決點擊無效問題
            case 'settings': return <SettingsView onChangeTab={setActiveTab} />;
            case 'categories': return <CategoryManager onBack={() => setActiveTab('settings')} />;
            case 'recurring': return <RecurringManager onBack={() => setActiveTab('settings')} />;
            case 'templates': return <TemplateManager onBack={() => setActiveTab('settings')} />;
            case 'savings_goals': return <SavingsGoalManager onBack={() => setActiveTab('settings')} />;
            case 'custom_tags': return <CustomTagManager onBack={() => setActiveTab('settings')} />;
            case 'split_manager': return <SplitManager onTriParty={() => setShowTriParty(true)} />;
            case 'debts': return <DebtManager onBack={() => setActiveTab('assets')} />;
            case 'cashflow': return <CashflowView onBack={() => setActiveTab('assets')} />;
            case 'projects': return <ProjectManager onBack={() => setActiveTab('settings')} onOpenDetail={(id) => { setSelectedProjectId(id); setActiveTab('project_detail'); }} />;
            case 'project_detail': return <ProjectDetailView projectId={selectedProjectId} onBack={() => { setSelectedProjectId(null); setActiveTab('projects'); }} onEditTransaction={openEditModal} />;
            
            default: return <HomeView transactions={transactions} accounts={accounts} totalAssets={totalAssets} monthlyExpense={monthlyExpense} onEditTransaction={openEditModal} categories={categories} />;
        }
    };

    const anyModalOpen = showAddModal || showQuickEntry || showQuickSheet;

    return (
        <div
        {...(anyModalOpen ? {} : swipeHandlers)}
        className="h-full w-full max-w-md mx-auto border-x border-gray-200 bg-[#F5F5F3] relative flex flex-col overflow-hidden">
            <div className="flex-1 overflow-y-auto no-scrollbar pb-24 relative">{renderContent()}</div>
            
            {['home', 'assets', 'settings'].includes(activeTab) && (
                <div className="absolute bottom-32 right-5 z-[50]">
                    <button onClick={() => setShowQuickSheet(true)} className="w-12 h-12 bg-white rounded-full text-[#333] shadow-lg border border-gray-200 flex items-center justify-center hover:scale-105 active:scale-95 transition-all">
                        <Icon name="lightning" size={20} className="fill-current text-yellow-400" />
                    </button>
                </div>
            )}

            {['home', 'assets', 'split_manager', 'settings'].includes(activeTab) && (
                <div className="fixed bottom-0 w-full max-w-md bg-white border-t border-gray-200 px-6 h-[64px] flex justify-between items-center z-40 shadow-[0_-1px_3px_rgba(0,0,0,0.05)]">
                    <NavButton iconName="home" label="首頁" isActive={activeTab === 'home'} onClick={() => setActiveTab('home')} />
                    <NavButton iconName="split" label="分帳" isActive={activeTab === 'split_manager'} onClick={() => setActiveTab('split_manager')} />
                    <div className="relative -top-8">
                        <button onClick={openAddModal} className="w-16 h-16 bg-[#333] rounded-full flex items-center justify-center text-white shadow-xl hover:bg-[#000] transition-all transform active:scale-95 border-4 border-[#F5F5F3]"><Icon name="plus" size={32} /></button>
                    </div>
                    <NavButton iconName="wallet" label="資產" isActive={activeTab === 'assets' || activeTab === 'account_detail' || activeTab === 'debts' || activeTab === 'cashflow'} onClick={() => setActiveTab('assets')} />
                    <NavButton iconName="settings" label="設定" isActive={activeTab === 'settings' || activeTab === 'categories' || activeTab === 'templates'} onClick={() => setActiveTab('settings')} />
                </div>
            )}

            {showAddModal && <TransactionModal initialData={editingTransaction} onClose={closeModal} onSave={onSaveTx} onDelete={onDeleteTx} accounts={accounts} categories={categories} />}
            {showTriParty && (
                <TriPartyModal
                    contacts={splitContacts}
                    accounts={accounts}
                    categories={categories}
                    showAlert={showAlert}
                    onConfirm={(tx1, tx2) => {
                        handleSaveTriParty(tx1, tx2);
                        setShowTriParty(false);
                        showAlert('三方代墊已記錄', '兩筆分帳記錄已建立');
                    }}
                    onClose={() => setShowTriParty(false)}
                />
            )}
            {showQuickSheet && <QuickAddSheet templates={quickTemplates} accounts={accounts} categories={categories} onClose={() => setShowQuickSheet(false)} onSelect={(tpl) => {
                setShowQuickSheet(false);
                if (tpl.defaultAmount > 0) {
                    // E: 一鍵記帳 — 直接存帳，不顯示輸入畫面
                    handleSaveTransaction({
                        id: Date.now().toString(),
                        date: getLocalDateString(),
                        type: 'expense',
                        amount: tpl.defaultAmount,
                        accountId: tpl.accountId,
                        categoryId: tpl.categoryId,
                        subCategoryId: tpl.subCategoryId || null,
                        note: tpl.name,
                        payer: tpl.isSplit ? 'me' : 'none',
                        tags: tpl.isSplit ? ['#分帳'] : [],
                        createdAt: new Date().toISOString()
                    });
                    showAlert('已記帳 ✓', `${tpl.name}  $${tpl.defaultAmount}`);
                } else {
                    setShowQuickEntry(tpl);
                }
            }} onGoSettings={() => { setShowQuickSheet(false); setActiveTab('templates'); }} />}
            {showQuickEntry && <QuickEntryModal template={showQuickEntry} onClose={() => setShowQuickEntry(null)} onSave={onSaveTx} />}
            {editingAccount && <AccountModal initialData={editingAccount} onClose={() => setEditingAccount(null)} onSave={onSaveAcc} onDelete={onDeleteAcc}/>}
            <UndoToast />

            {/* A5: 月度總結卡片 */}
            {showMonthRecap && recapData && (
                <div className="fixed inset-0 bg-black/40 z-[300] flex items-end justify-center p-4 animate-fade-in">
                    <div className="bg-white dark:bg-[#36393F] rounded-2xl w-full max-w-sm shadow-2xl animate-slide-up overflow-hidden">
                        <div className="bg-[#333] dark:bg-[#2B2D30] px-5 py-4 flex items-center justify-between">
                            <div>
                                <div className="text-white/70 text-xs mb-0.5">{recapData.prevYM} 月度總結</div>
                                <div className="text-white text-lg font-medium">上個月花了多少？</div>
                            </div>
                            <button onClick={closeRecap} className="text-white/60 p-1"><Icon name="close" size={18}/></button>
                        </div>
                        <div className="px-5 py-4 space-y-3">
                            <div className="grid grid-cols-2 gap-3">
                                <div className="bg-gray-50 dark:bg-[#40444B] rounded-xl p-3">
                                    <div className="text-xs text-gray-400 mb-1">總支出</div>
                                    <div className="text-xl font-medium text-[#D9534F] tabular-nums">${recapData.prevExp.toLocaleString()}</div>
                                </div>
                                <div className="bg-gray-50 dark:bg-[#40444B] rounded-xl p-3">
                                    <div className="text-xs text-gray-400 mb-1">儲蓄率</div>
                                    <div className={`text-xl font-medium tabular-nums ${recapData.savingsRate > 0 ? 'text-[#5CB85C]' : 'text-gray-400'}`}>
                                        {recapData.savingsRate > 0 ? `${recapData.savingsRate}%` : '-'}
                                    </div>
                                </div>
                            </div>

const MoneyPetWidget = ({ externalMsg }) => {
    const { transactions, recurringItems, accounts, categories } = React.useContext(DataContext);
    const [message, setMessage] = useState('');
    const [isPoked, setIsPoked] = useState(false);
    const prevCountRef = useRef(transactions.length);

// 1. 計算本月支出與總預算
    const { monthlyExp, totalBudget } = useMemo(() => {
        const now = new Date();
        const yearMonthPrefix = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;

        // 本月支出 (★ 修正：小雞也要排除代購，避免誤判破產)
        const exp = transactions
            .filter(t => t.type === 'expense' && t.date.startsWith(yearMonthPrefix) && !(t.tags || []).includes('#代購') && !t.excludeFromBudget)
            .reduce((sum, t) => sum + (t.splitMyShare !== undefined ? t.splitMyShare : ((t.payer === 'me' || (t.tags||[]).includes('#分帳')) ? Math.round(t.amount / 2) : t.amount)), 0);
            
        // 總預算
        const budget = categories.expense.reduce((sum, c) => sum + (c.budget || 0), 0);
        return { monthlyExp: exp, totalBudget: budget };
    }, [transactions, categories]);

    // 2. 判斷是否超支 (有設定預算，且支出大於預算)
    const isOverBudget = totalBudget > 0 && monthlyExp > totalBudget;

    useEffect(() => {
        if (externalMsg) {
            setMessage(externalMsg);
            const timer = setTimeout(() => setMessage(''), 5000);
            return () => clearTimeout(timer);
        }
    }, [externalMsg]);

    useEffect(() => {
        if (transactions.length > prevCountRef.current) {
            setIsPoked(true); 
            setTimeout(() => setIsPoked(false), 300); 
            const feedMsgs = isOverBudget 
                ? ["雖然很好吃...但我們透支了😭", "吃土啦💸", "預算爆炸了💥"] 
                : ["嚼嚼...謝謝款待！😋", "好耶！又吃到一筆帳了！✨", "變強了！💪"];
            setMessage(feedMsgs[Math.floor(Math.random() * feedMsgs.length)]);
            setTimeout(() => setMessage(''), 3000);
        }
        prevCountRef.current = transactions.length;
    }, [transactions.length, isOverBudget]);

    // 3. 電子雞狀態判斷
    const petStats = useMemo(() => {
        let stage = 'egg';
        let icon = '🥚';
        const count = transactions.length;
        if (count >= 100) { stage = 'king'; icon = '👑🐔'; }
        else if (count >= 50) { stage = 'adult'; icon = '🐔'; }
        else if (count >= 10) { stage = 'baby'; icon = '🐣'; }

        let status = 'normal'; 
        let daysDiff = 0;
        
        if (transactions.length > 0) {
            const lastDate = new Date(transactions[0].date);
            const today = new Date();
            lastDate.setHours(0,0,0,0);
            today.setHours(0,0,0,0);
            daysDiff = Math.floor((today - lastDate) / (1000 * 60 * 60 * 24));
            if (daysDiff === 0) status = 'happy';
            else if (daysDiff >= 3) status = 'sick';
        } else {
            status = 'sick';
        }

        // ★ 超支時強制變成破產狀態
        if (isOverBudget) {
            status = 'broke';
            icon = stage === 'egg' ? '💸' : '😭'; // 破產圖示
        } else if (status === 'sick' && stage !== 'egg') {
            icon = '🤒';
        }
        return { stage, icon, status };
    }, [transactions, isOverBudget]);

    const handlePoke = () => {
        setIsPoked(true);
        setTimeout(() => setIsPoked(false), 300);
        let msgs = [];
        
        // ★ 優先顯示超支警告
        if (isOverBudget) {
            msgs = [
                `超支 $${(monthlyExp - totalBudget).toLocaleString()} 啦！`, 
                "主人，我們沒錢買飼料了...", 
                "快停止花錢！💸"
            ];
        } else if (petStats.status === 'sick') { 
            msgs = ["咳咳...好餓...", "救命...", "飯飯..."]; 
        } else if (petStats.status === 'happy') { 
            msgs = ["開心！", "哇！吃得好飽！", "預算控制得不錯喔！"]; 
        } else { 
            msgs = ["肚子空空", "等你的紀錄"]; 
        }

        // 繳費提醒邏輯
        const today = new Date().getDate();
        recurringItems.forEach(item => {
            if (item.active !== false && item.type === 'expense' && item.day >= today && item.day <= today + 3) {
                const diff = item.day - today;
                msgs.push(`主人！${diff === 0 ? "今天" : diff + "天後"}是「${item.name}」扣款日喔！`);
            }
        });

        setMessage(msgs[Math.floor(Math.random() * msgs.length)]);
        setTimeout(() => setMessage(''), 3000);
    };

    return (
        <div className="flex flex-col items-center justify-center relative z-10 pointer-events-auto">
            <div className={`speech-bubble bg-[#333] text-white text-[10px] px-2 py-1 rounded mb-1 shadow-md transition-opacity duration-300 absolute -top-8 whitespace-nowrap ${message ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
                {message}
            </div>
            <button onClick={handlePoke} className={`text-4xl transition-transform cursor-pointer select-none filter drop-shadow-sm ${petStats.status === 'happy' ? 'animate-bounce-slow' : ''} ${isPoked ? 'scale-90' : 'scale-100'}`} style={{ transformOrigin: 'bottom center' }}>
                {petStats.icon}
            </button>
            <div className="mt-1">
                {petStats.status === 'broke' ? (
                    <span className="text-[9px] bg-red-100 text-red-600 px-1.5 py-0.5 rounded-full animate-pulse border border-red-200">⚠️ 超支</span>
                ) : petStats.status === 'sick' ? (
                    <span className="text-[9px] bg-red-100 text-red-500 px-1.5 py-0.5 rounded-full animate-pulse">餓</span>
                ) : (
                    <span className="text-[9px] bg-white/60 border border-gray-200 px-1.5 py-0.5 rounded-full text-gray-400 backdrop-blur-sm">
                        {petStats.stage === 'egg' ? '幼年期' : petStats.stage === 'king' ? '國王' : '成長期'}
                    </span>
                )}
            </div>
        </div>
    );
};

        const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
        const firstDayOfWeek = new Date(currentYear, currentMonth - 1, 1).getDay();
        const days = [];
        for (let i = 0; i < firstDayOfWeek; i++) days.push(null);
        for (let i = 1; i <= daysInMonth; i++) {
            const dateStr = `${currentYear}-${String(currentMonth).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
            const dailyTx = transactions.filter(t => t.date === dateStr);
            // M17修：套用分帳公式 + 排除 #代購，與月總覽/統計頁一致
            const getMyShare = t => t.splitMyShare !== undefined ? t.splitMyShare
                : (t.payer === 'me' || (t.tags||[]).includes('#分帳')) ? Math.round(t.amount / 2) : t.amount;
            const dailyExp = dailyTx
                .filter(t => t.type === 'expense' && !(t.tags||[]).includes('#代購'))
                .reduce((s,t) => s + getMyShare(t), 0);
            const dailyInc = dailyTx.filter(t => t.type === 'income').reduce((s,t) => s + t.amount, 0);
            days.push({ day: i, dateStr, expense: dailyExp, income: dailyInc, hasData: dailyTx.length > 0 });
        }
        return days;
    }, [currentYear, currentMonth, transactions]);

    const [selectedDate, setSelectedDate] = useState(null);

    // N3: 財務摘要（比對當前選月的前一個月）
    const lastMonthSummary = useMemo(() => {
        const reportMonth = currentMonth === 1 ? 12 : currentMonth - 1;
        const reportYear = currentMonth === 1 ? currentYear - 1 : currentYear;
        const ym = `${reportYear}-${String(reportMonth).padStart(2,'0')}`;
        const txs = transactions.filter(t => t.date.startsWith(ym) && !(t.tags||[]).includes('#代購'));
        const expense = txs.filter(t=>t.type==='expense').reduce((s,t)=>s+(t.splitMyShare !== undefined ? t.splitMyShare : ((t.payer === 'me' || (t.tags||[]).includes('#分帳')) ? Math.round(t.amount / 2) : t.amount)),0);
        const income = txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
        const catMap = {};
        txs.filter(t=>t.type==='expense').forEach(t=>{
            const cat = categories.expense.find(c=>c.id===t.categoryId);
            const name = cat?.name||'其他';
            catMap[name] = (catMap[name]||0) + (t.splitMyShare !== undefined ? t.splitMyShare : ((t.payer === 'me' || (t.tags||[]).includes('#分帳')) ? Math.round(t.amount / 2) : t.amount));
        });
        const sortedCats = Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
        const topCat = sortedCats[0];
        const topCats = sortedCats.slice(0, 4);

        // 消費筆數 & 平均每日
        const expenseTxs = txs.filter(t=>t.type==='expense');
        const expenseCount = expenseTxs.length;
        const daysInReportMonth = new Date(reportYear, reportMonth, 0).getDate();
        const avgDaily = daysInReportMonth > 0 ? Math.round(expense / daysInReportMonth) : 0;

        // 儲蓄率
        const savingsRate = income > 0 ? Math.round((income - expense) / income * 100) : null;

        // 比對再前一個月
        const prevMonth = reportMonth === 1 ? 12 : reportMonth - 1;
        const prevYear = reportMonth === 1 ? reportYear - 1 : reportYear;
        const prevYm = `${prevYear}-${String(prevMonth).padStart(2,'0')}`;
        const prevTxs = transactions.filter(t => t.date.startsWith(prevYm) && !(t.tags||[]).includes('#代購'));
        const prevExpense = prevTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+(t.splitMyShare !== undefined ? t.splitMyShare : ((t.payer === 'me' || (t.tags||[]).includes('#分帳')) ? Math.round(t.amount / 2) : t.amount)),0);
        const expenseDiff = prevExpense > 0 ? Math.round((expense - prevExpense) / prevExpense * 100) : null;

        return { ym, label: `${reportYear}/${reportMonth}月`, expense, income, net: income-expense,
                 topCat, topCats, expenseCount, avgDaily, savingsRate, expenseDiff, prevExpense };
    }, [transactions, categories, currentYear, currentMonth]);
    const [showSummary, setShowSummary] = useState(false);
    useEffect(() => { setShowSummary(false); }, [currentYear, currentMonth]);

return (
        <div className="h-full flex flex-col pt-6 px-6 pb-0 animate-fade-in relative">

                            </button>

                        </div>

                    {/* 中間：電子雞 */}

                        <MoneyPetWidget />

                    {/* 右側：總支出 */}

                        </div>

                        </div>

                {dailyBurnInfo && !isPrivacyMode && (

                {/* 搜尋與篩選 */}

const SavingsGoalDetailView = ({ goalId, onBack, onEditTransaction }) => {
    const { savingsGoals, transactions, accounts, categories } = React.useContext(DataContext);
    const goal = savingsGoals.find(g => g.id === goalId);
    const [year, setYear] = useState(new Date().getFullYear());
    const [month, setMonth] = useState(new Date().getMonth() + 1);

    const filteredTx = useMemo(() =>{
        return transactions.filter(t => {
            if (t.linkedGoalId !== goalId) return false;
            const d = new Date(t.date);
            return d.getFullYear() === year && (d.getMonth() + 1) === month;
        }).sort((a, b) => new Date(b.date) - new Date(a.date));
    }, [transactions, goalId, year, month]);

    if (!goal) return null;
    const pct = Math.min(100, Math.round((goal.currentAmount / goal.targetAmount) * 100));
    const remaining = goal.targetAmount - (goal.currentAmount || 0);
    const monthTotal = filteredTx.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);

    return (
        <div className="h-full bg-[#F5F5F3] dark:bg-[#2B2D30] flex flex-col animate-slide-up z-30 fixed inset-0">
            <div className="bg-white dark:bg-[#36393F] px-5 pt-12 pb-4 border-b border-gray-200 dark:border-gray-700">
                <div className="flex items-center gap-4 mb-4">
                    <button onClick={onBack} className="p-1 -ml-2 text-gray-500 hover:text-black dark:text-gray-300 dark:hover:text-white">
                        <Icon name="back" size={24}/>
                    </button>
                    <h2 className="text-xl font-medium text-[#333] dark:text-white">{goal.name}</h2>
                </div>
                {/* 進度條 */}
                <div className="mb-3">
                    <div className="flex justify-between items-end mb-1.5">
                        <span className="text-lg font-medium" style={{color: goal.color || '#5CB85C'}}>${formatMoney(goal.currentAmount || 0)}</span>
                        <span className="text-xs text-gray-400">目標 ${formatMoney(goal.targetAmount)}</span>
                    </div>
                    <div className="h-2.5 bg-gray-100 dark:bg-gray-700 rounded-full overflow-hidden">
                        <div className="h-full rounded-full transition-all duration-700" style={{width:`${pct}%`, backgroundColor: goal.color || '#5CB85C'}}/>
                    </div>
                    <div className="flex justify-between text-xs text-gray-400 mt-1.5">
                        <span>{pct}% 完成</span>
                        <span>還差 ${formatMoney(remaining)}</span>
                    </div>
                </div>
                {goal.deadline && <div className="text-xs text-gray-400 mb-3">截止日期：{goal.deadline}</div>}
                {/* 年月篩選 + 本月存入 */}
                <div className="flex items-center justify-between mt-3">
                    <div className="flex gap-2">
                        <select value={year} onChange={e => setYear(Number(e.target.value))} className="bg-[#F5F5F3] dark:bg-[#2B2D30] text-sm px-2 py-1 rounded outline-none text-[#333] dark:text-white">
                            {Array.from({ length: 5 }, (_, i) => new Date().getFullYear() - 2 + i).map(y => <option key={y} value={y}>{y}年</option>)}
                        </select>
                        <select value={month} onChange={e => setMonth(Number(e.target.value))} className="bg-[#F5F5F3] dark:bg-[#2B2D30] text-sm px-2 py-1 rounded outline-none text-[#333] dark:text-white">
                            {Array.from({length: 12}, (_, i) => i + 1).map(m => <option key={m} value={m}>{m}月</option>)}
                        </select>
                    </div>
                    {monthTotal > 0 && <span className="text-xs text-gray-400">本月存入 <span className="font-medium text-[#5CB85C]">${formatMoney(monthTotal)}</span></span>}
                </div>
            </div>
            <div className="flex-1 overflow-y-auto p-4 space-y-3 pb-24">
                {filteredTx.length > 0 ? (
                    filteredTx.map(t => (
                        <TransactionCard key={t.id} transaction={t} accounts={accounts} categories={categories} onClick={() => onEditTransaction(t)} showDate={true} />
                    ))
                ) : (
                    <div className="text-center py-20 text-gray-400 text-sm">
                        <Icon name="circleDollar" size={40} className="mx-auto mb-3 text-gray-200"/>

                        <span className="text-[11px]">記帳時選擇此儲蓄目標即可關聯</span>
                    </div>
                )}
            </div>
        </div>
    );
};

// 專案/事件記帳：共用工具 — 計算某專案的收支彙總（沿用全檔統計慣例：splitMyShare 份額、排除 #代購）
// ==========================================
const calcProjectSummary = (transactions, projectId) => {
    let expense = 0, income = 0, count = 0;
    transactions.forEach(t => {
        if (t.projectId !== projectId) return;
        count++;
        if (t.type === 'expense' && !(t.tags||[]).includes('#代購')) {
            const share = t.splitMyShare !== undefined
                ? t.splitMyShare
                : ((t.payer === 'me' || (t.tags||[]).includes('#分帳')) ? Math.round(t.amount/2) : t.amount);
            expense += share;
        } else if (t.type === 'income') {
            income += t.amount;
        }
    });
    return { expense, income, net: income - expense, count };
};

const ProjectDetailView = ({ projectId, onBack, onEditTransaction }) => {
    const { projects, transactions, accounts, categories } = React.useContext(DataContext);
    const project = projects.find(p => p.id === projectId);

    const projectTx = useMemo(() =>
        transactions.filter(t => t.projectId === projectId)
            .sort((a, b) => new Date(b.date) - new Date(a.date)),
    [transactions, projectId]);

    const summary = useMemo(() => calcProjectSummary(transactions, projectId), [transactions, projectId]);

    // 分類佔比（支出，依 splitMyShare 份額）
    const catBreakdown = useMemo(() => {
        const map = {};
        const expCats = categories?.expense || [];
        projectTx.forEach(t => {
            if (t.type !== 'expense' || (t.tags||[]).includes('#代購')) return;
            const share = t.splitMyShare !== undefined
                ? t.splitMyShare
                : ((t.payer === 'me' || (t.tags||[]).includes('#分帳')) ? Math.round(t.amount/2) : t.amount);
            map[t.categoryId] = (map[t.categoryId] || 0) + share;
        });
        return Object.keys(map).map(cid => {
            const cat = expCats.find(c => c.id === cid);
            return { name: cat?.name || '其他', color: cat?.color || '#999', amount: map[cid] };
        }).sort((a, b) => b.amount - a.amount);
    }, [projectTx, categories]);

    if (!project) return null;
    const budgetPct = project.budget > 0 ? Math.min(100, Math.round((summary.expense / project.budget) * 100)) : 0;

    return (
        <div className="h-full bg-[#F5F5F3] flex flex-col animate-slide-up z-30 fixed inset-0">
            <div className="bg-white px-5 pt-12 pb-4 border-b border-gray-200">

                    <h2 className="text-xl font-medium text-[#333] flex items-center gap-2">
                        <span className="w-3 h-3 rounded-full" style={{backgroundColor:project.color||'#5CB85C'}}/>{project.name}

                </div>
                <div className="grid grid-cols-3 gap-2 mb-1">
                    <div className="text-center"><div className="text-xs text-gray-400 mb-0.5">總支出</div><div className="text-base font-bold text-[#333]">${formatMoney(summary.expense)}</div></div>
                    <div className="text-center"><div className="text-xs text-gray-400 mb-0.5">總收入</div><div className="text-base font-bold text-[#5CB85C]">${formatMoney(summary.income)}</div></div>
                    <div className="text-center"><div className="text-xs text-gray-400 mb-0.5">淨額</div><div className={`text-base font-bold ${summary.net>=0?'text-[#333]':'text-red-500'}`}>${formatMoney(summary.net)}</div></div>
                </div>
                {project.budget > 0 && (
                    <div className="mt-3">
                        <div className="h-2 bg-gray-100 rounded-full overflow-hidden">
                            <div className="h-full rounded-full transition-all" style={{width:`${budgetPct}%`,backgroundColor: budgetPct>=100?'#D9534F':(project.color||'#5CB85C')}}/>
                        </div>
                        <div className="flex justify-between text-xs text-gray-400 mt-1"><span>預算已用 {budgetPct}%</span><span>預算 ${formatMoney(project.budget)}</span></div>
                    </div>
                )}
                {(project.startDate || project.endDate) && <div className="text-xs text-gray-400 mt-2">期間：{project.startDate||'—'} ~ {project.endDate||'—'}</div>}
            </div>
            <div className="flex-1 overflow-y-auto p-4 space-y-3 pb-24">
                {catBreakdown.length > 0 && (
                    <div className="muji-card p-4">
                        <div className="text-xs text-gray-400 mb-3 uppercase tracking-widest">支出分類佔比</div>
                        <div className="space-y-2">
                            {catBreakdown.map(c => {
                                const cpct = summary.expense > 0 ? Math.round((c.amount / summary.expense) * 100) : 0;
                                return (
                                    <div key={c.name}>
                                        <div className="flex justify-between text-xs mb-1"><span className="text-[#333]">{c.name}</span><span className="text-gray-400">${formatMoney(c.amount)} ({cpct}%)</span></div>

                                    </div>
                                );
                            })}

                    </div>
                )}
                {projectTx.length > 0 ? (
                    projectTx.map(t => (
                        <TransactionCard key={t.id} transaction={t} accounts={accounts} categories={categories} onClick={() => onEditTransaction(t)} showDate={true} />
                    ))

};

                        <div className="relative w-full h-[420px] bg-white rounded-t-[40px] shadow-2xl animate-slide-up overflow-hidden z-10 flex flex-col items-center pt-6">
                            
                            {step === 1 && renderTypeTabs()}

                            <div className="w-full mt-1 mb-2 h-6 relative flex justify-center items-center">
                                <h3 className="text-sm font-bold text-gray-400 tracking-widest uppercase">{menuPage > 0 ? `${title} (第 ${menuPage + 1} 頁)` : title}</h3>
                            </div>
                            <div className="absolute bottom-8 left-1/2 -translate-x-1/2 z-20">
                                <button onClick={handleBackClick} className="w-14 h-14 rounded-full bg-gray-100 text-gray-500 flex items-center justify-center shadow-sm active:scale-90 transition border border-gray-200"><Icon name={(menuPage > 0 || onBackAction) ? "back" : "close"} size={24} /></button>
                            </div>
                            <div className="absolute bottom-[80px] left-1/2 w-0 h-0 z-10">
                                {displayItems.map((item, index) => {
                                    const angleDeg = totalSlots === 1 ? -90 : startAngle + (index * stepAngle);
                                    const angleRad = angleDeg * (Math.PI / 180);
                                    const x = radius * Math.cos(angleRad);
                                    const y = radius * Math.sin(angleRad);
                                    return (
                                        <button key={item.id} onClick={() => onSelect(item.id)} className="absolute w-16 h-16 -ml-8 -mt-8 rounded-full bg-white shadow-[0_4px_12px_rgba(0,0,0,0.08)] border border-gray-100 flex flex-col items-center justify-center gap-0.5 active:scale-95 transition-all hover:-translate-y-1" style={{ transform: `translate(${x}px, ${y}px)`, animation: `fan-out 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) ${index * 0.05}s backwards` }}>
                                            {item.icon}
                                            <span className="text-[10px] font-medium text-gray-600 leading-none scale-90 truncate w-12 text-center">{item.label}</span>
                                        </button>
                                    );
                                })}
                                {showMore && (() => {
                                    const index = displayItems.length;
                                    const angleDeg = startAngle + (index * stepAngle);
                                    const angleRad = angleDeg * (Math.PI / 180);
                                    const x = radius * Math.cos(angleRad);
                                    const y = radius * Math.sin(angleRad);
                                    return (
                                        <button onClick={() => setMenuPage(prev => prev + 1)} className="absolute w-16 h-16 -ml-8 -mt-8 rounded-full bg-gray-50 shadow-sm border border-gray-200 flex flex-col items-center justify-center gap-0.5 active:scale-95 transition-all" style={{ transform: `translate(${x}px, ${y}px)`, animation: `fan-out 0.4s ${index * 0.05}s backwards` }}><Icon name="grid" size={20} className="text-[#333]" /><span className="text-[10px] font-medium text-gray-600">更多</span></button>
                                    );
                                })()}
                            </div>
                        </div>
                    </div>
                );
            };

            // --- 流程控制 ---

            // Step 1: 選擇分類 (或轉出帳戶)
            if (step === 1) { 
                let items = [];
                let title = "選擇分類";
                let onSelect = (id) => {};

                if (type === 'transfer') {
                    title = "選擇轉出帳戶";
                    // ★ 修改 3：改用 sortedAccounts (智慧排序)
                    items = sortedAccounts.map(acc => ({ 
                        id: acc.id, label: acc.name, 
                        icon: <Icon name={acc.type === 'cash' ? 'banknote' : acc.type === 'liability' ? 'creditCard' : 'wallet'} size={24} className="text-gray-600"/> 
                    }));
                    onSelect = (id) => { setSelectedAcc(id); setStep(2); };
                } else {
                    const activeCategories = type === 'expense' ? sortedCategories.expense : sortedCategories.income;
                    items = activeCategories.map(cat => ({
                        id: cat.id, label: cat.name, 
                        icon: <Icon name={cat.iconKey || 'more'} size={24} className="text-gray-600"/> 
                    }));
                    onSelect = (id) => { 
                        setSelectedCatId(id); 
                        const cat = activeCategories.find(c => c.id === id);
                        if (cat && cat.subCategories && cat.subCategories.length > 0) { setStep(1.5); } 
                        else { setSelectedSubCatId(null); setStep(2); } 
                    };
                }
                return renderFanMenu(items, onSelect, title, null);
            }

            // Step 1.5: 細項
            if (step === 1.5 && type !== 'transfer') {
                const currentCat = (type === 'expense' ? categories.expense : categories.income).find(c => c.id === selectedCatId) || {};
                const items = (currentCat.subCategories || []).map(sub => ({ id: sub.id, label: sub.name, icon: <span className="text-sm font-bold text-gray-500">{sub.name[0]}</span> }));
                const onSelect = (id) => { setSelectedSubCatId(id); setStep(2); };
                return renderFanMenu(items, onSelect, `${currentCat.name} - 細項`, () => setStep(1));
            }

            // Step 2: 付款人(支出)/轉入/存入帳戶(收入)
            if (step === 2) { 
                if (type === 'transfer') {
                    const title = "選擇轉入帳戶";
                    // ★ 修改 4：改用 sortedAccounts 並過濾
                    const targetOptions = sortedAccounts.filter(a => a.id !== selectedAcc);
                    const items = targetOptions.map(acc => ({ id: acc.id, label: acc.name, icon: <Icon name={acc.type === 'cash' ? 'banknote' : acc.type === 'liability' ? 'creditCard' : 'wallet'} size={24} className="text-gray-600"/> }));
                    const onSelect = (id) => { setTargetAcc(id); setStep(4); };
                    return renderFanMenu(items, onSelect, title, () => setStep(1));
                } else if (type === 'income') {
                    const title = "選擇存入帳戶";
                    // ★ 修改 5：改用 sortedAccounts
                    const items = sortedAccounts.map(acc => ({ id: acc.id, label: acc.name, icon: <Icon name={acc.type === 'cash' ? 'banknote' : acc.type === 'liability' ? 'creditCard' : 'wallet'} size={24} className="text-gray-600"/> }));
                    const onSelect = (id) => { setSelectedAcc(id); setStep(4); }; 
                    const onBack = () => {
                        const cat = categories.income.find(c => c.id === selectedCatId);
                        setStep(cat && cat.subCategories && cat.subCategories.length > 0 ? 1.5 : 1);
                    };
                    return renderFanMenu(items, onSelect, title, onBack);
                } else {
                    // 支出流程：選擇付款人
                    const items = [
                        { id: 'other', label: '對方墊付', icon: <Icon name="userCheck" size={24} className="text-[#333]"/> },
                        { id: 'none', label: '個人支出', icon: <Icon name="users" size={24} className="text-gray-400"/> }, 
                        { id: 'me', label: '一起分攤', icon: <Icon name="split" size={24} className="text-[#333]"/> },
                        { id: 'advance', label: '幫人代購', icon: <Icon name="shoppingBag" size={24} className="text-[#5CB85C]"/> },
                    ];
                    const onSelect = (id) => { 
                        setSplitMode(id);
                        if (id === 'other') setStep(4);
                        else setStep(3);
                    };
                    const onBack = () => {
                        const cat = categories.expense.find(c => c.id === selectedCatId);
                        setStep(cat && cat.subCategories && cat.subCategories.length > 0 ? 1.5 : 1);
                    };
                    return renderFanMenu(items, onSelect, "付款人 / 分帳", onBack);
                }
            }
            
            // Step 3: 選擇扣款帳戶 (僅支出出現)
            if (step === 3 && type === 'expense') { 
                const title = "選擇扣款帳戶";
                // ★ 修改 6：改用 sortedAccounts
                const items = sortedAccounts.map(acc => ({ id: acc.id, label: acc.name, icon: <Icon name={acc.type === 'cash' ? 'banknote' : acc.type === 'liability' ? 'creditCard' : 'wallet'} size={24} className="text-gray-600"/> }));
                const onSelect = (id) => { setSelectedAcc(id); setStep(4); };
                const onBack = () => setStep(2); 
                return renderFanMenu(items, onSelect, title, onBack);
            }

            // Step 4: 輸入金額 (保持不變)
            const currentCat = type !== 'transfer' ? ((type === 'expense' ? categories.expense : categories.income).find(c => c.id === selectedCatId) || {}) : {};
            const currentAccData = accounts.find(a => a.id === selectedAcc) || {};
            const targetAccData = accounts.find(a => a.id === targetAcc) || {};
            
            // 返回鍵邏輯
            const handleBackFromAmount = () => {
                if (type === 'transfer') setStep(2);
                else if (type === 'income') setStep(2); 
                else if (splitMode === 'other') setStep(2); 
                else setStep(3); 
            };

            return (
                <div className="fixed z-[200] bg-white flex flex-col animate-slide-up modal-curve-top overflow-hidden left-0 right-0 bottom-0" style={{maxHeight: '90vh'}}>
                    <div className="flex justify-between items-center px-6 pt-6 pb-2 bg-[#F5F5F3]">
                        {initialData ? <button onClick={(e) => {e.stopPropagation(); onClose();}} className="p-2 -ml-2 text-gray-400"><Icon name="close" /></button> : <button onClick={(e) => {e.stopPropagation(); handleBackFromAmount();}} className="p-2 -ml-2 text-gray-400"><Icon name="back" /></button>}
                        <div className="flex items-center gap-2">
                             {type === 'transfer' ? (
                                <><span className="text-xs text-gray-500 bg-white border border-gray-200 px-2 py-1 rounded-full">{currentAccData.name}</span><Icon name="chevronRight" size={12} className="text-gray-400"/><span className="text-xs text-[#333] bg-white border border-[#333] px-2 py-1 rounded-full">{targetAccData.name}</span></>
                             ) : (
                                <>
                                    <button onClick={() => setStep(1)} className="flex items-center gap-1 px-3 py-1 bg-white border border-gray-200 rounded-full text-xs text-gray-600 shadow-sm active:scale-95 transition"><Icon name={currentCat.iconKey||'more'} size={14}/> {currentCat.name}</button>
                                    {type === 'expense' && (
                                        splitMode === 'other' ? (
                                            <button onClick={() => setStep(2)} className="flex items-center gap-1 px-3 py-1 bg-gray-200 border border-gray-300 rounded-full text-xs text-gray-500 shadow-inner">對方墊付</button>
                                        ) : (
                                            <button onClick={() => setStep(3)} className="flex items-center gap-1 px-3 py-1 bg-white border border-gray-200 rounded-full text-xs text-gray-600 shadow-sm active:scale-95 transition">{currentAccData.name}</button>
                                        )
                                    )}
                                    {type === 'income' && (
                                        <button onClick={() => setStep(2)} className="flex items-center gap-1 px-3 py-1 bg-white border border-gray-200 rounded-full text-xs text-gray-600 shadow-sm active:scale-95 transition">{currentAccData.name}</button>
                                    )}
                                </>
                             )}
                        </div>
                        {initialData ? <button onClick={() => onDelete(initialData.id)} className="text-[#D9534F] p-2 -mr-2"><Icon name="trash" /></button> : <div className="w-8"></div>}
                    </div>
                    <div className="px-6 py-4 bg-[#F5F5F3] text-right flex flex-col justify-end">
                        {categoryBudgetInfo && (
                            <div className="flex justify-end mb-1 animate-fade-in">
                                <div className={`text-[10px] px-2 py-0.5 rounded-full border flex items-center gap-1 transition-colors
                                    ${categoryBudgetInfo.finalRemaining < 0 
                                        ? 'bg-red-50 text-red-500 border-red-100 dark:bg-red-900/20 dark:border-red-900' 
                                        : 'bg-green-50 text-green-600 border-green-100 dark:bg-green-900/20 dark:border-green-900'}`
                                }>
                                    <span>{categoryBudgetInfo.finalRemaining < 0 ? '⚠️ 超支' : '剩餘'}</span>
                                    <span className="font-medium">${categoryBudgetInfo.finalRemaining.toLocaleString()}</span>
                                    <span className="text-gray-400">/ 預算 ${categoryBudgetInfo.budget.toLocaleString()}</span>
                                </div>
                            </div>
                        )}
                        <div className="text-gray-400 text-xs mb-2 flex justify-end gap-3 items-center">
                            {type === 'expense' && (
                                <button onClick={() => setExcludeFromBudget(v => !v)} className={`px-2.5 py-1 rounded-full text-[10px] border shadow-sm flex items-center gap-1 transition active:scale-95 ${excludeFromBudget ? 'bg-[#333] text-white border-[#333]' : 'bg-white text-gray-400 border-gray-200'}`}>
                                    <Icon name="noEntry" size={11}/> 不計預算
                                </button>
                            )}
                            <div className="bg-white px-3 py-1 rounded-full text-[10px] border border-gray-200 shadow-sm flex items-center gap-1"><Icon name="calendar" size={12}/> <input type="date" value={date} onChange={e => setDate(e.target.value)} className="outline-none bg-transparent text-gray-600 font-medium font-sans h-full" required/></div>
                        </div>
                        
                        {fxCurrency ? (
                            <div className="text-right">
                                <div className={`font-light tracking-tighter overflow-hidden whitespace-nowrap ${type === 'expense' ? 'text-[#333] tx-expense' : 'text-[#5CB85C]'}`} style={{fontSize:`${Math.max(1.5,Math.min(3.0,3.0*9/Math.max(9,(FX_SYMBOLS[fxCurrency]||'').length+fxAmountStr.length)))}rem`}}>{FX_SYMBOLS[fxCurrency]||fxCurrency} {fxAmountStr}</div>
                                <div className="text-xs text-gray-400 mt-0.5">{Number(fxRateStr) > 0 ? `≈ NT$${formatMoney(Math.round(Number(fxAmountStr||0) * Number(fxRateStr)))}（以此入帳）` : (fxLoading ? '匯率載入中…' : '請輸入匯率')}</div>
                            </div>
                        ) : (
                            <div className={`font-light tracking-tighter text-right overflow-hidden whitespace-nowrap ${type === 'transfer' ? 'text-gray-600' : type === 'expense' ? 'text-[#333] tx-expense' : 'text-[#5CB85C]'}`} style={{fontSize:`${Math.max(1.5,Math.min(3.75,3.75*8/Math.max(8,amountStr.length)))}rem`}}>{amountStr}</div>
                        )}
                    </div>
                    
                    <div className="px-5 py-3 bg-white flex flex-col gap-3 relative z-10 overflow-y-auto" style={{boxShadow: '0 -10px 20px rgba(0,0,0,0.03)'}}>
                        {/* 多幣別：選幣別（TWD 預設＝行為不變）；外幣金額用下方數字鍵盤輸入，匯率自動抓、可點改 */}
                        {(type === 'expense' || type === 'income') && !isInstallment && (
                            <div className="flex items-center justify-between bg-gray-50 rounded-lg px-4 py-2 border border-gray-100">
                                <div className="flex items-center gap-2">
                                    <Icon name="wallet" size={14} className="text-gray-500"/>
                                    <span className="text-xs font-medium text-gray-600">外幣</span>
                                    {fxCurrency && (
                                        <span className="text-[10px] text-gray-400 ml-1 flex items-center gap-1">
                                            匯率
                                            <input type="text" inputMode="decimal" value={fxRateStr} onChange={e => setFxRateStr(e.target.value.replace(/[^0-9.]/g,''))} placeholder="0.00" className="w-16 text-right bg-white border border-gray-200 rounded px-1.5 py-0.5 outline-none text-[#333]" />
                                            {fxLoading && <span className="text-gray-300">…</span>}
                                        </span>
                                    )}
                                </div>
                                <select value={fxCurrency || ''} onChange={e => handleSelectFxCurrency(e.target.value)} className="text-xs bg-white border border-gray-200 rounded px-2 py-1 outline-none text-[#333] shadow-sm">
                                    <option value="">TWD（台幣）</option>
                                    {FX_CURRENCIES.map(c => <option key={c} value={c}>{c} {FX_SYMBOLS[c]}</option>)}
                                </select>
                            </div>
                        )}
                        {/* ★ 新增：無縫分期選項 (只在支出且選用信用卡時出現) */}
                        {currentAccData?.type === 'liability' && type === 'expense' && !initialData && (
                            <div className="flex flex-col gap-2 bg-gray-50 rounded-lg px-4 py-2.5 border border-gray-100">
                                <div className="flex items-center justify-between">
                                    <div className="flex items-center gap-2">
                                        <Icon name="calendar" size={14} className="text-gray-500"/>
                                        <span className="text-xs font-medium text-gray-600">刷卡分期</span>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        {isInstallment && (
                                            <select value={installPeriods} onChange={(e) => setInstallPeriods(Number(e.target.value))} className="text-xs bg-white border border-gray-200 rounded px-2 py-1 outline-none text-[#333] shadow-sm">
                                                {[3, 6, 12, 24, 30].map(p => <option key={p} value={p}>{p} 期</option>)}
                                            </select>
                                        )}
                                        <div onClick={() => { if (!isInstallment) setFxCurrency(null); setIsInstallment(!isInstallment); }} className={`w-9 h-5 rounded-full relative cursor-pointer transition-colors duration-300 ${isInstallment ? 'bg-[#333]' : 'bg-gray-300'}`}>
                                            <div className={`w-3.5 h-3.5 bg-white rounded-full absolute top-0.5 shadow-sm transition-transform duration-300 ${isInstallment ? 'left-5' : 'left-0.5'}`}></div>
                                        </div>
                                    </div>
                                </div>
                                
                                {/* ★ 銀行級進階分期設定面板 */}
                                {isInstallment && (
                                    <div className="pt-2 mt-1 border-t border-gray-200 flex flex-col gap-2 animate-fade-in">
                                        <div className="flex items-center justify-between">
                                            <span className="text-[10px] text-gray-500">自訂每期金額 (空白則自動均分)</span>
                                            {/* ★ 修正：將 amount 改為 currentParsedAmount，徹底解決崩潰 */}
                                            <input type="number" value={customPeriodAmount} onChange={e => setCustomPeriodAmount(e.target.value)} placeholder={Math.round(currentParsedAmount / installPeriods) || 0} className="text-xs bg-white border border-gray-200 rounded px-2 py-1 outline-none text-[#333] w-20 text-right shadow-sm" />
                                        </div>
                                        <div className="flex items-center justify-between">
                                            <span className="text-[10px] text-gray-500">除不盡之餘額調整</span>
                                            <select value={remainderAdjust} onChange={e => setRemainderAdjust(e.target.value)} className="text-xs bg-white border border-gray-200 rounded px-2 py-1 outline-none text-[#333] shadow-sm">
                                                <option value="last">併入最後一期</option>
                                                <option value="first">併入第一期</option>
                                            </select>
                                        </div>
                                    </div>
                                )}
                            </div>
                         )}
                         <div className="flex gap-3">
                            {type === 'expense' && (
                                <button onClick={() => setStep(2)} className={`flex-1 rounded-lg px-3 py-3 flex flex-col items-center justify-center gap-1 transition border ${splitMode !== 'none' ? 'bg-[#333] text-white border-[#333]' : 'bg-white text-gray-400 border-gray-200'}`}>
                                    <Icon name={splitMode === 'other' ? 'userCheck' : 'split'} size={16} />
                                    <span className="text-xs font-medium">{splitMode === 'none' ? '分帳' : (splitMode === 'me' ? '我墊' : splitMode === 'advance' ? '代購' : '他墊')}</span>                                </button>
                            )}
                            
                            {/* ★ 修改：備註輸入框與智慧標籤容器 */}
                            <div className="flex-[3] flex flex-col gap-1.5 min-w-0">
                                <div className="bg-[#F9F9F9] rounded-lg px-3 py-3 flex items-center gap-3">
                                    <Icon name="fileText" size={16} className="text-gray-400 shrink-0"/>
                                    <input type="text" placeholder="新增備註..." className="bg-transparent w-full text-sm outline-none text-gray-700 placeholder-gray-400" value={note} onChange={e => setNote(e.target.value)} />
                                </div>
                                
                                {/* 顯示智慧記憶標籤 */}
                                {suggestedNotes.length > 0 && (
                                    <div className="flex gap-1.5 overflow-x-auto no-scrollbar">
                                        {suggestedNotes.map(sn => (
                                            <button
                                                key={sn}
                                                onClick={() => { setNote(sn); if(triggerHaptic) triggerHaptic(10); }}
                                                className="shrink-0 bg-white border border-gray-200 text-gray-500 text-[10px] px-2.5 py-1 rounded-full shadow-sm hover:bg-gray-50 transition active:scale-95 whitespace-nowrap"
                                            >{sn}</button>
                                        ))}
                                    </div>
                                )}
                                {/* F5: 自訂標籤（真實 tag，可切換選取） */}
                                {customTags && customTags.length > 0 && (
                                    <div className="flex gap-1.5 overflow-x-auto no-scrollbar">
                                        {customTags.map(tag => {
                                            const active = extraTags.includes(tag);
                                            return (
                                                <button key={tag} onClick={() => toggleExtraTag(tag)}
                                                    className={`shrink-0 text-[10px] px-2.5 py-1 rounded-full border transition active:scale-95 whitespace-nowrap ${active ? 'bg-[#333] text-white border-[#333]' : 'bg-white text-gray-400 border-gray-200'}`}>
                                                    {tag}
                                                </button>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        </div>
                        {/* 墊付人 / 委託人快選（他墊 & 代購模式才顯示） */}
                        {type === 'expense' && (splitMode === 'other' || splitMode === 'advance') && (
                            <div className="flex items-center gap-2 bg-[#F9F9F9] rounded-lg px-3 py-2">
                                <Icon name="userCheck" size={14} className="text-gray-400 shrink-0"/>
                                <span className="text-xs text-gray-400 shrink-0">{splitMode === 'advance' ? '委託人' : '墊付人'}</span>
                                <div className="flex gap-1.5 flex-1 overflow-x-auto no-scrollbar">
                                    {(splitContacts || []).map(name => (
                                        <button key={name} type="button" onClick={() => setPayerName(payerName === name ? '' : name)}
                                            className={`shrink-0 text-[10px] px-2.5 py-0.5 rounded-full border transition active:scale-95 whitespace-nowrap ${payerName === name ? 'bg-[#333] text-white border-[#333]' : 'bg-white text-gray-400 border-gray-200'}`}>
                                            {name}
                                        </button>
                                    ))}
                                    {payerName && !(splitContacts || []).includes(payerName) && (
                                        <span className="shrink-0 text-[10px] px-2.5 py-0.5 rounded-full bg-[#333] text-white border border-[#333]">{payerName}</span>
                                    )}
                                </div>
                                {payerName && <button type="button" onClick={() => setPayerName('')} className="text-gray-300 text-sm leading-none shrink-0">×</button>}
                            </div>
                        )}
                        {/* 他墊：全額償還切換（開＝我全額償還，關＝對半分攤） */}
                        {type === 'expense' && splitMode === 'other' && (
                            <div className="flex items-center justify-between bg-[#F9F9F9] rounded-lg px-3 py-2">
                                <div className="flex items-center gap-2">
                                    <Icon name="userCheck" size={14} className="text-gray-400 shrink-0"/>
                                    <span className="text-xs text-gray-500">全額償還{!isFullRepay && <span className="text-gray-300 ml-1">（關閉＝對半分攤）</span>}</span>
                                </div>
                                <div onClick={() => setIsFullRepay(!isFullRepay)} className={`w-10 h-5 rounded-full relative cursor-pointer transition shrink-0 ${isFullRepay ? 'bg-[#333]' : 'bg-gray-300'}`}>
                                    <div className={`w-3 h-3 bg-white rounded-full absolute top-1 transition-all ${isFullRepay ? 'left-6' : 'left-1'}`}></div>
                                </div>
                            </div>
                        )}
                        {/* F4: 儲蓄目標連動選擇器（僅收入/轉帳顯示，支出不適用） */}
                        {(type === 'income' || type === 'transfer') && savingsGoals && savingsGoals.length > 0 && (
                            <div className="flex items-center gap-2 bg-[#F9F9F9] rounded-lg px-3 py-2">
                                <Icon name="heart" size={14} className="text-gray-400 shrink-0"/>
                                <select value={linkedGoalId||''} onChange={e=>setLinkedGoalId(e.target.value||null)}

            );
        };

// ==========================================
// ★ 補回遺失元件 1: QuickAddSheet (快速記帳選單)
// ==========================================
const QuickAddSheet = ({ templates, accounts, categories, onClose, onSelect, onGoSettings }) => {
    const { triggerHaptic } = React.useContext(DataContext);
    const [page, setPage] = useState(0);
    
    // 扇形參數
    const radius = 130;
    const startAngle = -170;
    const endAngle = -10;
    const itemsPerPage = 5;

    // 分頁計算邏輯
    let displayTemplates = [];
    let showMore = false;

    if (templates.length <= 6) {
        displayTemplates = templates;
    } else {
        const totalPages = Math.ceil(templates.length / itemsPerPage);
        const isLastPage = page >= totalPages - 1;
        const startIndex = page * itemsPerPage;

        if (isLastPage) {
            displayTemplates = templates.slice(startIndex);
        } else {
            displayTemplates = templates.slice(startIndex, startIndex + itemsPerPage);
            showMore = true;
        }
    }

    const totalSlots = displayTemplates.length + (showMore ? 1 : 0);
    const step = totalSlots > 1 ? (endAngle - startAngle) / (totalSlots - 1) : 0;

    const handleCenterClick = (e) => {
        e.stopPropagation(); // 防止誤觸背景
        if (page > 0) {
            setPage(prev => prev - 1);
        } else {
            onClose();
        }
    };

    return (
        <div className="fixed inset-0 z-[1000] flex flex-col justify-end animate-fade-in">
            {/* 背景層：點擊這裡才會關閉 */}
            <div className="absolute inset-0 bg-black/30 backdrop-blur-[2px]" onClick={onClose}></div>
            
            <div className="relative w-full h-[320px] bg-white rounded-t-[40px] shadow-2xl animate-slide-up overflow-hidden z-10 flex flex-col items-center" onClick={(e) => e.stopPropagation()}>
                <div className="w-full text-center mt-6 mb-2">
                    <h3 className="text-sm font-bold text-gray-400 tracking-widest uppercase">
                        {page > 0 ? `快速記帳 (第 ${page + 1} 頁)` : '快速記帳'}
                    </h3>
                </div>
                
                <div className="absolute bottom-[-60px] left-1/2 -translate-x-1/2 w-[350px] h-[350px] rounded-full border border-dashed border-gray-200 pointer-events-none"></div>
                
                {/* 中央按鈕 */}
                <div className="absolute bottom-6 left-1/2 -translate-x-1/2 z-20 flex flex-col gap-2 items-center">
                    {templates.length === 0 ? (
                        <button onClick={onGoSettings} className="px-6 py-3 bg-[#333] text-white rounded-full text-sm shadow-lg">建立模板</button>
                    ) : (
                        <button onClick={handleCenterClick} className="w-16 h-16 rounded-full bg-[#333] text-white flex items-center justify-center shadow-lg active:scale-90 transition border-4 border-white">
                            <Icon name={page > 0 ? "back" : "close"} size={24} />
                        </button>
                    )}
                </div>

                {/* 扇形按鈕群 */}
                <div className="absolute bottom-[60px] left-1/2 w-0 h-0 z-10">
                    {displayTemplates.map((t, index) => {
                        const angleDeg = totalSlots === 1 ? -90 : startAngle + (index * step);
                        const angleRad = angleDeg * (Math.PI / 180);
                        const x = radius * Math.cos(angleRad);
