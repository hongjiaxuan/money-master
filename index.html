                        const y = radius * Math.sin(angleRad);
                        const accName = accounts.find(a => a.id === t.accountId)?.name || '未知';

                        return (
                            <button 
                                key={t.id} 
                                // ★ 關鍵：傳遞完整的 t (模板物件)，而不是 t.id
                                onClick={(e) => { e.stopPropagation(); if(triggerHaptic) triggerHaptic(); onSelect(t); }}
                                className="absolute w-16 h-16 -ml-8 -mt-8 rounded-full bg-white shadow-md border border-gray-100 flex flex-col items-center justify-center gap-0.5 active:scale-95 transition-all hover:bg-gray-50 hover:border-[#333] group z-50"
                                style={{ 
                                    transform: `translate(${x}px, ${y}px)`,
                                    animation: `fan-out 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) ${index * 0.05}s backwards`
                                }}
                            >
                                <div className="text-[#333]"><Icon name={t.iconKey || 'template'} size={20}/></div>
                                <span className="text-[9px] font-medium text-gray-600 truncate max-w-[50px]">{t.name}</span>
                                {t.defaultAmount > 0 && <span className="text-[8px] text-amber-500 font-medium leading-none">${t.defaultAmount}</span>}
                                <div className="absolute -bottom-8 left-1/2 -translate-x-1/2 whitespace-nowrap bg-gray-800 text-white text-[9px] px-1.5 py-0.5 rounded opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-30 shadow-sm">
                                    {accName} {t.isSplit && '· 分帳'}
                                </div>
                                {t.isSplit && <div className="absolute top-0 right-0 w-2.5 h-2.5 bg-[#333] rounded-full border border-white"></div>}
                            </button>
                        );
                    })}

                    {showMore && (() => {
                        const index = displayTemplates.length;
                        const angleDeg = startAngle + (index * step);
                        const angleRad = angleDeg * (Math.PI / 180);
                        const x = radius * Math.cos(angleRad);
                        const y = radius * Math.sin(angleRad);
                        
                        return (
                            <button 
                                onClick={(e) => { e.stopPropagation(); setPage(prev => prev + 1); }} 
                                className="absolute w-16 h-16 -ml-8 -mt-8 rounded-full bg-gray-50 shadow-sm border border-gray-200 flex flex-col items-center justify-center gap-0.5 active:scale-95 transition-all hover:bg-gray-100 z-50"
                                style={{ 
                                    transform: `translate(${x}px, ${y}px)`,
                                    animation: `fan-out 0.4s ${index * 0.05}s backwards` 
                                }}
                            >
                                <Icon name="grid" size={20} className="text-[#333]" />
                                <span className="text-[10px] font-medium text-gray-600">更多</span>
                            </button>
                        );
                    })()}
                </div>
                
                <button onClick={onGoSettings} className="absolute bottom-4 right-6 text-[10px] text-gray-400 flex items-center gap-1 hover:text-[#333] transition z-30">
                    管理模板 <Icon name="settings" size={10}/>
                </button>
            </div>
        </div>
    );
};

// ==========================================
// ★ 修正版：QuickEntryModal (支援小數點與計算功能)
// ==========================================
const QuickEntryModal = ({ template, onClose, onSave }) => {
    // 引入震動
    const { triggerHaptic, quickAmounts } = React.useContext(DataContext);
    const [amountStr, setAmountStr] = useState('0');
    const todayStr = getLocalDateString();
    const yesterdayStr = (() => {
        const d = new Date(); d.setDate(d.getDate() - 1);
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    })();
    const [date, setDate] = useState(todayStr);

    if (!template) return null;

    const handleNumPad = (val) => {
        if(triggerHaptic) triggerHaptic();

        if (val === 'AC') {
            setAmountStr('0');
        } else if (val === 'back') { 
            setAmountStr(prev => prev.length > 1 ? prev.slice(0, -1) : '0'); 
        } else if (val === 'OK') {
            // ★ 加入計算邏輯 (支援 50+20)
            let amount = 0;
            try {
                let evalStr = amountStr;
                if (['+','-','*','/'].includes(evalStr.slice(-1))) evalStr = evalStr.slice(0, -1);
                amount = safeMathEval(evalStr);
            } catch (e) { amount = 0; }

            if (amount > 0) {
                onSave({
                    id: Date.now().toString(),
                    date,
                    amount,
                    type: 'expense',
                    categoryId: template.categoryId,
                    subCategoryId: template.subCategoryId,
                    accountId: template.accountId,
                    note: template.name,
                    tags: template.isSplit ? ['#分帳'] : [],
                    createdAt: new Date().toISOString()
                });
                onClose();
            }
        } else { 
            // 防止連續運算符號
            if (['+','-','*','/'].includes(val) && ['+','-','*','/'].includes(amountStr.slice(-1))) return;
            setAmountStr(prev => (prev === '0' && !['+','-','*','/','.'].includes(val)) ? val : prev + val); 
        }
    };

    return (
        <div className="fixed inset-0 z-[1100] bg-black/60 flex items-end justify-center animate-fade-in">
            <div className="absolute inset-0" onClick={onClose}></div>

            <div className="bg-white w-full max-w-md rounded-t-xl animate-slide-up overflow-hidden relative z-10">
                <div className="bg-[#F5F5F3] p-4 flex justify-between items-center border-b border-gray-200">
                    <div className="flex items-center gap-2">
                        <div className="p-1.5 bg-white rounded-full border border-gray-200">
                            <Icon name={template.iconKey || 'template'} size={16}/>
                        </div>
                        <span className="text-sm font-medium text-[#333]">{template.name}</span>
                    </div>
                    <button onClick={onClose} className="p-1">
                        <Icon name="close" size={20} className="text-gray-400"/>
                    </button>
                </div>
                <div className="py-4 px-6 text-right bg-[#F5F5F3]">
                    <div className="font-light text-[#333] tracking-tighter overflow-hidden whitespace-nowrap" style={{fontSize:`${Math.max(1.25,Math.min(2.25,2.25*8/Math.max(8,amountStr.length)))}rem`}}>${amountStr}</div>
                </div>

                {/* B: 日期切換 */}
                <div className="flex gap-2 px-4 pt-2 pb-1 bg-[#F5F5F3]">
                    {[{label: '今天', val: todayStr}, {label: '昨天', val: yesterdayStr}].map(opt => (
                        <button key={opt.val} onClick={() => setDate(opt.val)}
                            className={`flex-1 py-1.5 text-sm rounded-full border transition ${date === opt.val ? 'bg-[#333] text-white border-[#333]' : 'bg-white text-gray-500 border-gray-200'}`}>
                            {opt.label}
                        </button>
                    ))}
                </div>

                {/* A: 金額快捷 Chip */}
                <div className="flex gap-2 px-4 py-2 bg-[#F5F5F3] border-b border-gray-100">
                    {(quickAmounts || [50, 100, 150, 200]).map(amt => (
                        <button key={amt} onClick={() => { if(triggerHaptic) triggerHaptic(); setAmountStr(String(amt)); }}
                            className="flex-1 py-1 text-sm rounded-full bg-white text-gray-600 border border-gray-200 active:scale-95 transition">
                            {amt}
                        </button>
                    ))}
                </div>

                {/* ★ 修改：改為 4 欄佈局，加入 +, -, . */}
                <div className="bg-white grid grid-cols-4 p-2 gap-2 border-t border-gray-100">
                    {['7','8','9','AC','4','5','6','+','1','2','3','-','.','0','back','OK'].map(key => (
                        <button 
                            key={key} 
                            onClick={() => handleNumPad(key)} 
                            className={`h-14 rounded-lg text-xl font-light flex items-center justify-center transition active:bg-gray-100 numpad-key
                                ${key === 'OK' ? 'bg-[#333] text-white shadow-md active:bg-black' : ['+','-','AC','back'].includes(key) ? 'bg-[#F9F9F9] text-gray-500' : 'text-[#333]'}`
                            }
                        >
                            {key === 'back' ? <Icon name="back" size={20}/> : key}
                        </button>
                    ))}
                </div>
            </div>
        </div>
    );
};

// ==========================================
// 三方代墊 Modal — 一次建立「我欠代墊人全額」＋「分攤對象欠我一半」兩筆關聯記錄
// onConfirm(tx1, tx2) 由父層 (MainLayout) 呼叫 handleSaveTriParty
// ==========================================
const TriPartyModal = ({ contacts, accounts, categories, showAlert, onConfirm, onClose }) => {
    const list = contacts || [];
    const [payerContact, setPayerContact] = useState(list[0] || '');            // 代墊人
    const [splitContact, setSplitContact] = useState(list[1] || list[0] || ''); // 分攤對象
    const [amount, setAmount] = useState('');
    const [selectedCategoryId, setSelectedCategoryId] = useState('');
    const [note, setNote] = useState('');

    const expenseCats = (categories && categories.expense) || [];
    // 三方代墊＝他墊（代墊人先付現金），使用者帳戶當下不動用，故不提供帳戶選擇；
    // 比照現有「對方墊付」慣例存 accounts[0]，餘額待分帳結清（付款/收款）時才變動
    const defaultAccountId = accounts[0] ? accounts[0].id : '';

    const handleSubmit = () => {
        const amt = Number(amount);
        // 防呆 1：代墊人與分攤對象不可相同
        if (!payerContact || !splitContact || payerContact === splitContact) {
            showAlert('提示', '代墊人與分攤對象不可相同');
            return;
        }
        // 防呆 2：金額必須為正數
        if (!amt || isNaN(amt) || amt <= 0) {
            showAlert('提示', '請輸入有效金額');
            return;
        }
        const groupId = 'grp_' + Date.now();
        // tx1：我欠代墊人全額（#應付，payer:'other'，不扣款）
        // splitMyShare:0 — 消費份額已由 tx2($amt/2) 代表，此筆純債務追蹤，不重複計入個人支出統計
        const tx1 = {
            id: generateId(), date: getLocalDateString(), type: 'expense',
            amount: amt, accountId: defaultAccountId,
            categoryId: selectedCategoryId || null,
            note: note || `三方代墊－${payerContact}`,
            tags: ['#應付'], payer: 'other', payerName: payerContact,
            splitMyShare: 0,
            groupId, createdAt: Date.now()
        };
        // tx2：分攤對象欠我一半（#分帳，payer:'me'，存全額，智慧AA自動算一半）
        const tx2 = {
            id: generateId(), date: getLocalDateString(), type: 'expense',
            amount: amt, accountId: defaultAccountId,
            categoryId: selectedCategoryId || null,
            note: note || `三方代墊－${payerContact}`,
            tags: ['#分帳'], payer: 'me', payerName: splitContact,
            groupId, createdAt: Date.now()
        };
        onConfirm(tx1, tx2);
    };

    return (
        <div className="fixed inset-0 z-[200] bg-black/40 flex items-end justify-center animate-fade-in" onClick={onClose}>
            <div className="w-full max-w-md bg-white flex flex-col animate-slide-up modal-curve-top overflow-hidden" style={{maxHeight: '90vh'}} onClick={(e) => e.stopPropagation()}>
                {/* 頁首 */}
                <div className="flex justify-between items-center px-6 pt-6 pb-3 bg-[#F5F5F3]">
                    <button onClick={onClose} className="p-2 -ml-2 text-gray-400"><Icon name="close" /></button>
                    <span className="text-base font-medium text-[#333]">三方代墊</span>
                    <div className="w-8" />
                </div>

                <div className="flex-1 overflow-y-auto no-scrollbar px-6 py-4 space-y-4">
                    {list.length < 2 && (
                        <div className="muji-card p-3 text-xs text-orange-500 bg-orange-50 border-orange-100">
                            分帳對象不足 2 人，請先到分帳頁「管理」新增聯絡人。
                        </div>
                    )}

                    {/* 代墊人 */}
                    <div>
                        <label className="text-xs text-gray-400 mb-1.5 block">代墊人（先付錢的人）</label>
                        <div className="flex flex-wrap gap-2">
                            {list.map(c => (
                                <button key={c} onClick={() => setPayerContact(c)}
                                    className={`px-3 py-1.5 rounded-full text-sm border transition ${payerContact === c ? 'bg-[#333] text-white border-[#333]' : 'bg-white text-gray-600 border-gray-200 hover:bg-gray-50'}`}>
                                    {c}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* 分攤對象 */}
                    <div>
                        <label className="text-xs text-gray-400 mb-1.5 block">分攤對象（和我對半分的人）</label>
                        <div className="flex flex-wrap gap-2">
                            {list.map(c => (
                                <button key={c} onClick={() => setSplitContact(c)}
                                    className={`px-3 py-1.5 rounded-full text-sm border transition ${splitContact === c ? 'bg-[#333] text-white border-[#333]' : 'bg-white text-gray-600 border-gray-200 hover:bg-gray-50'}`}>
                                    {c}
                                </button>
                            ))}
                        </div>
                        {payerContact && splitContact && payerContact === splitContact && (
                            <p className="text-[11px] text-red-500 mt-1.5">代墊人與分攤對象不可相同</p>
                        )}
                    </div>

                    {/* 金額 */}
                    <div>
                        <label className="text-xs text-gray-400 mb-1.5 block">金額</label>
                        <input type="number" inputMode="numeric" value={amount} onChange={(e) => setAmount(e.target.value)}
                            placeholder="0"
                            className="w-full px-3 py-2.5 border border-gray-200 rounded text-right text-lg font-medium text-[#333] focus:outline-none focus:border-[#333]" />
                    </div>

                    {/* 代墊說明：他墊不扣款，餘額待結清時才變動 */}
                    <div className="muji-card p-3 text-xs text-gray-500 bg-gray-50 border-gray-100 leading-relaxed">
                        代墊人先付現金，你的帳戶當下不扣款。餘額待「分帳」頁結清時才變動：向代墊人<span className="text-[#333] font-medium">付款（全額）</span>、向分攤對象<span className="text-[#333] font-medium">收款（一半）</span>。
                    </div>

                    {/* 分類（選填） */}
                    <div>
                        <label className="text-xs text-gray-400 mb-1.5 block">分類（選填）</label>
                        <div className="flex flex-wrap gap-2">
                            {expenseCats.map(c => (
                                <button key={c.id} onClick={() => setSelectedCategoryId(selectedCategoryId === c.id ? '' : c.id)}
                                    className={`flex items-center gap-1 px-3 py-1.5 rounded-full text-sm border transition ${selectedCategoryId === c.id ? 'bg-[#333] text-white border-[#333]' : 'bg-white text-gray-600 border-gray-200 hover:bg-gray-50'}`}>
                                    <Icon name={c.iconKey || 'more'} size={14} /> {c.name}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* 備註（選填） */}
                    <div>
                        <label className="text-xs text-gray-400 mb-1.5 block">備註（選填）</label>
                        <input type="text" value={note} onChange={(e) => setNote(e.target.value)}
                            placeholder="例如：媽媽買鞋－Nike"
                            className="w-full px-3 py-2.5 border border-gray-200 rounded text-sm text-[#333] focus:outline-none focus:border-[#333]" />
                    </div>
                </div>

                {/* 底部按鈕 */}
                <div className="px-6 py-4 bg-white border-t border-gray-100 flex gap-3">
                    <Btn variant="ghost" onClick={onClose} className="flex-1">取消</Btn>
                    <Btn variant="primary" onClick={handleSubmit} className="flex-1">建立兩筆記錄</Btn>
                </div>
            </div>
        </div>
    );
};

// ==========================================
// 修正版 SplitManager (實作支出拆分與代墊邏輯)
// ==========================================
const SplitManager = ({ onTriParty }) => {
    const { transactions, accounts, categories, handleSettleSplit: onSettle, showAlert: onAlert, triggerHaptic,
            splitContacts, handleSaveSplitContact, handleDeleteSplitContact, showConfirm } = React.useContext(DataContext);
    const [selectedIds, setSelectedIds] = useState([]);
    const [isSettleModalOpen, setIsSettleModalOpen] = useState(false);
    const [activeContact, setActiveContact] = useState(null);
    const [showContactMgr, setShowContactMgr] = useState(false);
    const [contactInput, setContactInput] = useState('');
    const [collectItem, setCollectItem] = useState(null); // 分次收款：目前正在收款的項目

    // 全部待結清的分帳交易
    const splitItems = useMemo(() => transactions.filter(t => t.type === 'expense' && t.tags && (t.tags.includes('#分帳') || t.tags.includes('#應付') || t.tags.includes('#代購'))), [transactions]);

    // 每筆交易歸屬的聯絡人（無 payerName → 預設第一個聯絡人）
    const getContactForItem = useCallback((t) => t.payerName || (splitContacts[0] || '另一半'), [splitContacts]);

    // 有待結清交易的聯絡人 tabs（依 splitContacts 順序，再補未在名單裡的）
    const activeTabs = useMemo(() => {
        const usedNames = new Set(splitItems.map(t => getContactForItem(t)));
        const ordered = splitContacts.filter(c => usedNames.has(c));
        usedNames.forEach(c => { if (!splitContacts.includes(c)) ordered.push(c); });
        return ordered;
    }, [splitItems, splitContacts, getContactForItem]);

    // 目前 tab 顯示的交易
    const currentTab = (activeContact && activeTabs.includes(activeContact)) ? activeContact : (activeTabs[0] || null);
    const tabItems = useMemo(() =>
        splitItems.filter(t => getContactForItem(t) === currentTab),
        [splitItems, currentTab, getContactForItem]
    );

    const toggleSelect = (id) => setSelectedIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
    const toggleAll = () => selectedIds.length === tabItems.length ? setSelectedIds([]) : setSelectedIds(tabItems.map(t => t.id));
    const switchTab = (c) => { setActiveContact(c); setSelectedIds([]); };

    // 分次收款：每筆「我墊／代購」項目別人應還我的總額（代購全額、我墊一半）
    // ★ 需在 netAmount/suggestedHalfAmount 之前定義（下方會用到）
    const expectedCollectible = (t) => {
        if (t.tags.includes('#代購')) return t.amount;
        if (t.tags.includes('#分帳')) return Math.round(t.amount / 2);
        return t.amount;
    };

    // 淨額計算（只看目前 tab 選取的）
    // ★ 已用「分次收款」收回的金額（collectedAmount）需先扣除，避免全選結算時把已收回部分重複計入
    const netAmount = useMemo(() => {
        return tabItems.filter(t => selectedIds.includes(t.id)).reduce((sum, t) => {
            if (t.tags.includes('#分帳') || t.tags.includes('#代購')) return sum + Math.max(0, t.amount - (t.collectedAmount || 0));
            if (t.tags.includes('#應付')) return sum - t.amount;
            return sum;
        }, 0);
    }, [tabItems, selectedIds]);

    // 智慧 AA 計算
    // ★ 已用「分次收款」收回的金額需先扣除（以 expectedCollectible 為基準），避免全選結算時重複計入
    const suggestedHalfAmount = useMemo(() => {
        return tabItems.filter(t => selectedIds.includes(t.id)).reduce((sum, t) => {
            if (t.tags.includes('#代購') || t.tags.includes('#分帳')) return sum + Math.max(0, expectedCollectible(t) - (t.collectedAmount || 0));
            // 三方代墊(groupId)的 #應付：欠代墊人全額（拆帳對象是第三人，不是代墊人），AA 模式也算全額，避免少付
            if (t.tags.includes('#應付')) return sum - ((t.tags.includes('#全額') || t.groupId) ? t.amount : t.amount / 2);
            return sum;
        }, 0);
    }, [tabItems, selectedIds]);

    const handleExportImage = () => {
        if (selectedIds.length === 0) return;
        const itemsToDraw = tabItems.filter(t => selectedIds.includes(t.id)).map(t => {
            const cat = categories.expense.find(c => c.id === t.categoryId);
            return {
                name: t.note || cat?.name || '項目',
                amount: t.amount,
                isOtherPaid: t.tags.includes('#應付'),
                isFullAmount: t.tags.includes('#全額'),
                isPurchased: t.tags.includes('#代購')
            };
        });
        drawReceipt(itemsToDraw, netAmount).then(blob => { 
            const file = new File([blob], `bill_${getLocalDateString()}.jpg`, { type: 'image/jpeg' }); 
            if (navigator.share && navigator.canShare({ files: [file] })) { 
                navigator.share({ files: [file], title: '分帳明細' }).catch(console.error); 
            } else { 
                const link = document.createElement('a'); 
                link.download = file.name; 
                link.href = URL.createObjectURL(blob); 
                document.body.appendChild(link); 
                link.click(); 
            } 
        }); 
    };

    // ★ 核心修正邏輯
    const handleConfirmSettle = (finalAmount, targetAccountId, mode) => {
        if (finalAmount === 0) {
            onAlert('提示', '結算金額為 0，無需產生交易');
            setIsSettleModalOpen(false);
            return;
        }
        let newTransactions = [...transactions];
        let newAccounts = [...accounts];

        // 1. 產生結算交易 (收款/付款)
        // ★ 修正：類型改為 transfer (轉帳)，避免計入收入/支出報表
        const isIncome = finalAmount > 0;
        const settleTx = {
            id: Date.now().toString(),
            createdAt: Date.now(),
            date: getLocalDateString(),
            amount: Math.abs(finalAmount),
            type: 'transfer', 
            categoryId: 'reimbursement',
            accountId: isIncome ? 'external_payer' : targetAccountId, // 收款時來源是外部，付款時來源是自己
            targetAccountId: isIncome ? targetAccountId : 'external_receiver', // 收款時存入自己，付款時轉給外部
            note: `分帳結清 (收回代墊)`,
            tags: ['#已結清']
        };
        newTransactions = [settleTx, ...newTransactions];
        
        // 2. 更新帳戶餘額 (現金流增加/減少)
        newAccounts = newAccounts.map(a => a.id === targetAccountId ? { ...a, balance: a.balance + finalAmount } : a);

        // 3. 標記原始交易已結清，並記錄我的分攤額（不更動實際付款金額）
        if (mode === 'half' || mode === 'full') {
            selectedIds.forEach(id => {
                const originalTx = transactions.find(t => t.id === id);
                if (!originalTx) return;

                if (originalTx.tags.includes('#分帳') || originalTx.tags.includes('#代購')) {
                    const originalAmount = originalTx.amount;
                    // 計算我的實際分攤額，用於統計顯示（付款金額不動）
                    let myShare;
                    if (mode === 'half') {
                        myShare = originalTx.tags.includes('#代購') ? 0 : Math.round(originalAmount / 2);
                    } else {
                        myShare = 0; // full：對方全額承擔
                    }

                    // ★ 保留原始 amount（信用卡實際付款金額），以 splitMyShare 記錄我的分攤額供統計用
                    newTransactions = newTransactions.map(t => {
                        if (t.id === id) {
                            return {
                                ...t,
                                splitMyShare: myShare,
                                tags: [...t.tags.filter(tag => tag !== '#分帳' && tag !== '#代購'), '#已結清']
                            };
                        }
                        return t;
                    });
                } else {
                    // #應付：對方已墊付，我付清欠款後標記結清，並記錄我的實際負擔額供統計用
                    // 三方代墊(groupId)的 #應付 為純債務追蹤，消費份額由 #分帳 那筆代表，結清時維持 0 不重複計入
                    const myShare = originalTx.groupId
                        ? 0
                        : mode === 'half'
                        ? (originalTx.tags.includes('#全額') ? originalTx.amount : Math.round(originalTx.amount / 2))
                        : originalTx.amount;
                    newTransactions = newTransactions.map(t =>
                        t.id === id ? { ...t, splitMyShare: myShare, tags: [...t.tags.filter(tag => tag !== '#應付'), '#已結清'] } : t
                    );
                }
            });
        } else {
            // 自訂金額模式：按比例計算各筆分攤額後標記已結清
            const totalSelectedAmount = selectedIds.reduce((sum, id) => {
                const tx = transactions.find(t => t.id === id);
                return sum + (tx ? tx.amount : 0);
            }, 0);
            const reimbursedRatio = totalSelectedAmount > 0 ? Math.abs(finalAmount) / totalSelectedAmount : 0;

            selectedIds.forEach(id => {
                const originalTx = transactions.find(t => t.id === id);
                if (!originalTx) return;
                const filterTag = originalTx.tags.includes('#代購') ? '#代購' : (originalTx.tags.includes('#分帳') ? '#分帳' : '#應付');
                // 計算我實際負擔的金額 = 總額 - 對方報銷比例
                // 三方代墊(groupId)的 #應付 為純債務追蹤，維持 0 不重複計入
                const myShare = (originalTx.groupId && originalTx.tags.includes('#應付'))
                    ? 0
                    : Math.round(originalTx.amount * (1 - reimbursedRatio));
                newTransactions = newTransactions.map(t =>
                    t.id === id ? { ...t, splitMyShare: myShare, tags: [...t.tags.filter(tag => tag !== filterTag), '#已結清'] } : t
                );
            });
        }

        onSettle(newTransactions, newAccounts);
        setIsSettleModalOpen(false);
        setSelectedIds([]);
        onAlert('成功', '已完成結清，報銷款項已存入帳戶');
    };

    // 分次收款：收到一筆款項，累加 collectedAmount；收滿應收總額才自動結清
    const handlePartialCollect = (item, rawAmount, targetAccountId) => {
        const amount = Math.round(Number(rawAmount) || 0);
        if (amount <= 0) { onAlert('提示', '請輸入大於 0 的金額'); return; }

        const prevCollected = item.collectedAmount || 0;
        const newCollected = prevCollected + amount;
        const expected = expectedCollectible(item);
        const fullyCollected = newCollected >= expected;

        // 1. 產生收款交易（轉帳，從外部存入帳戶，不計入收入報表）
        const itemName = item.note || (categories.expense.find(c => c.id === item.categoryId) || {}).name || '代墊';
        const settleTx = {
            id: Date.now().toString(),
            createdAt: Date.now(),
            date: getLocalDateString(),
            amount: amount,
            type: 'transfer',
            categoryId: 'reimbursement',
            accountId: 'external_payer',
            targetAccountId: targetAccountId,
            note: `分帳收款（${itemName}）`,
            tags: ['#已結清']
        };
        let newTransactions = [settleTx, ...transactions];

        // 2. 帳戶收到現金
        let newAccounts = accounts.map(a => a.id === targetAccountId ? { ...a, balance: a.balance + amount } : a);

        // 3. 更新原始項目：累加已收金額；收滿才標記結清並記錄我的實際負擔
        newTransactions = newTransactions.map(t => {
            if (t.id !== item.id) return t;
            if (fullyCollected) {
                return {
                    ...t,
                    collectedAmount: newCollected,
                    splitMyShare: Math.max(0, t.amount - newCollected),
                    tags: [...t.tags.filter(tag => tag !== '#分帳' && tag !== '#代購'), '#已結清']
                };
            }
            return { ...t, collectedAmount: newCollected };
        });

        onSettle(newTransactions, newAccounts);
        setCollectItem(null);
        onAlert('成功', fullyCollected ? '已收滿，該筆自動結清' : `已收款 $${formatMoney(amount)}，尚餘 $${formatMoney(Math.max(0, expected - newCollected))}`);
    };

    return (
        <div className="h-full flex flex-col pt-10 px-6 pb-0 animate-fade-in">
            {/* 頁首 */}
            <div className="shrink-0 flex justify-between items-center mb-3">
                <h2 className="text-xl font-medium text-[#333] tracking-wide">分帳管理</h2>
                <div className="flex items-center gap-2">
                    <button onClick={() => { if(triggerHaptic) triggerHaptic(); onTriParty && onTriParty(); }} title="三方代墊" className="text-xs text-white bg-[#333] px-2.5 py-1 rounded hover:bg-black transition flex items-center gap-1"><Icon name="users" size={13}/> 代墊</button>
                    <button onClick={() => setShowContactMgr(true)} className="text-xs text-gray-400 px-2 py-1 border border-gray-200 rounded hover:bg-gray-50 transition">管理</button>
                    {tabItems.length > 0 && (
                        <button onClick={() => { if(triggerHaptic) triggerHaptic(); toggleAll(); }} className="text-xs text-gray-500 font-medium px-2 py-1 bg-white border border-gray-200 rounded hover:bg-gray-50 transition">
                            {selectedIds.length === tabItems.length ? '取消全選' : '全選'}
                        </button>
                    )}
                </div>
            </div>

            {/* Tab 頁籤列 */}
            {activeTabs.length > 0 && (
                <div className="flex overflow-x-auto no-scrollbar gap-1.5 mb-3 shrink-0">
                    {activeTabs.map(c => (
                        <button key={c} onClick={() => switchTab(c)}
                            className={`shrink-0 px-3 py-1 rounded-full text-xs font-medium transition whitespace-nowrap ${currentTab === c ? 'bg-[#333] text-white' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}>
                            {c}
                        </button>
                    ))}
                </div>
            )}

            {/* 交易清單 */}
            <div className="flex-1 overflow-y-auto no-scrollbar space-y-3 pb-48">
                {splitItems.length === 0 ? (
                    <div className="text-center py-20 text-gray-400"><Icon name="check" size={48} className="mx-auto mb-4 text-gray-200"/><p>目前無未結清項目</p></div>
                ) : tabItems.length === 0 ? (
                    <div className="text-center py-12 text-gray-400 text-sm">此對象無待結清項目</div>
                ) : (
                    tabItems.map(t => {
                        const cat = categories.expense.find(c => c.id === t.categoryId) || {};
                        const isAdvance = t.tags.includes('#代購');
                        const isSplit = t.tags.includes('#分帳');
                        const isMyPay = isAdvance || isSplit;
                        const SYSTEM_SPLIT_TAGS = new Set(['#分帳','#代購','#應付','#已結清','#代墊','#週期','#分期','#調整','#全額']);
                        const isFullRepayItem = t.tags.includes('#全額');
                        const isTriParty = !!t.groupId;
                        const extraItemTags = (t.tags||[]).filter(tag => !SYSTEM_SPLIT_TAGS.has(tag));
                        const expected = expectedCollectible(t);
                        const collected = t.collectedAmount || 0;
                        return (
                            <div key={t.id} className={`bg-white px-3 py-2.5 rounded border transition ${selectedIds.includes(t.id) ? 'border-[#333] shadow-md' : 'border-transparent shadow-sm hover:shadow-md'}`}>
                                <div onClick={() => { if(triggerHaptic) triggerHaptic(); toggleSelect(t.id); }} className="flex items-center gap-2.5 cursor-pointer">
                                    <div className={`w-4 h-4 rounded-full border flex items-center justify-center shrink-0 transition ${selectedIds.includes(t.id) ? 'bg-[#333] border-[#333]' : 'border-gray-300'}`}>
                                        {selectedIds.includes(t.id) && <Icon name="check" size={9} className="text-white"/>}
                                    </div>
                                    <span className={`text-[10px] px-1.5 py-0.5 rounded font-medium shrink-0 ${isAdvance ? 'bg-green-50 text-green-600' : isSplit ? 'bg-gray-100 text-gray-500' : 'bg-red-50 text-red-500'}`}>
                                        {isAdvance ? '代購' : isSplit ? '我墊' : '他墊'}
                                    </span>
                                    {!isMyPay && isFullRepayItem && (
                                        <span className="text-[10px] px-1.5 py-0.5 rounded font-medium shrink-0 bg-red-100 text-red-600">全額</span>
                                    )}
                                    {isTriParty && (
                                        <span className="text-[10px] px-1.5 py-0.5 rounded font-medium shrink-0 bg-gray-100 text-gray-400">三方</span>
                                    )}
                                    <span className="text-sm text-[#333] truncate">{cat.name}{t.note ? <span className="text-gray-400 font-normal"> · {t.note}</span> : null}</span>
                                    {extraItemTags.map(tag => (
                                        <span key={tag} className="text-[10px] px-1.5 py-0.5 bg-blue-50 text-blue-500 rounded shrink-0">{tag}</span>
                                    ))}
                                    <div className="flex-1"/>
                                    <span className="text-[10px] text-gray-400 shrink-0">{t.date.slice(5)}</span>
                                    <div className="flex flex-col items-end shrink-0">
                                        <span className={`text-sm font-medium ${isMyPay ? 'text-[#333]' : 'text-red-500'}`}>
                                            {isMyPay ? '' : '-'}${formatMoney(t.amount)}
                                        </span>
                                        {isAdvance && <span className="text-[9px] text-orange-400 leading-tight">不計統計</span>}
                                        {isFullRepayItem && isMyPay && <span className="text-[9px] text-purple-400 leading-tight">全額</span>}
                                    </div>
                                    {/* 分次收款：內嵌小鈕（僅「我墊／代購」可分次收回） */}
                                    {isMyPay && (
                                        <button onClick={(e) => { e.stopPropagation(); if(triggerHaptic) triggerHaptic(); setCollectItem(t); }} className="text-[10px] px-2 py-0.5 bg-[#333] text-white rounded-full font-medium active:scale-95 transition shrink-0">收款</button>
                                    )}
                                </div>
                                {/* 收款中才顯示的極輕量提示 */}
                                {isMyPay && collected > 0 && (
                                    <div className="text-right text-[10px] text-gray-400 mt-0.5">剩 <span className="text-[#333] font-medium">${formatMoney(Math.max(0, expected - collected))}</span></div>
                                )}
                            </div>
                        );
                    })
                )}
            </div>

            {/* 底部結算列 */}
            {selectedIds.length > 0 && (
                <div className="fixed bottom-[96px] left-0 right-0 max-w-md mx-auto px-4 py-2.5 bg-white/95 backdrop-blur border border-gray-200 rounded-xl shadow-lg z-[45] flex flex-col gap-2">
                    <div className="flex justify-between items-start">
                        <div>
                            <span className="text-xs text-gray-400 uppercase tracking-wider block">代墊淨額</span>
                            <span className="text-[10px] text-gray-400">選取 {selectedIds.length} 筆　結算對象：{currentTab || '-'}</span>
                        </div>
                        <div className="text-right">
                            <span className={`text-xl font-medium block ${netAmount >= 0 ? 'text-[#333]' : 'text-red-500'}`}>
                                {netAmount >= 0 ? '我多付 ' : '我少付 '}${Math.abs(netAmount).toLocaleString()}
                            </span>
                        </div>
                    </div>
                    <div className="flex gap-3">
                        <button onClick={() => { if(triggerHaptic) triggerHaptic(); handleExportImage(); }} className="flex-1 bg-gray-100 text-gray-600 py-2.5 rounded text-sm font-medium hover:bg-gray-200 transition flex items-center justify-center gap-2"><Icon name="image" size={16}/> 圖片</button>
                        <button onClick={() => { if(triggerHaptic) triggerHaptic(); setIsSettleModalOpen(true); }} className="flex-[1.5] bg-[#333] text-white py-2.5 rounded text-sm font-medium hover:bg-black transition">結算</button>
                    </div>
                </div>
            )}

            {/* 聯絡人管理 Modal */}
            {showContactMgr && (
                <div className="fixed inset-0 bg-black/50 z-[1300] flex items-end justify-center animate-fade-in">
                    <div className="bg-white w-full max-w-md rounded-t-2xl p-5 animate-slide-up">
                        <div className="flex justify-between items-center mb-4">
                            <div>
                                <h3 className="text-base font-medium text-[#333]">分帳對象管理</h3>
                                <p className="text-xs text-gray-400 mt-0.5">同時作為「他墊」的墊付人及「代購」的委託人</p>
                            </div>
                            <button onClick={() => { setShowContactMgr(false); setContactInput(''); }} className="p-1 text-gray-400 hover:text-gray-600"><Icon name="close" size={20}/></button>
                        </div>
                        <div className="flex gap-2 mb-4">
                            <input value={contactInput} onChange={e => setContactInput(e.target.value)}
                                onKeyDown={e => { if(e.key === 'Enter' && contactInput.trim()) { handleSaveSplitContact(contactInput); setContactInput(''); }}}
                                placeholder="新增聯絡人名稱" className="flex-1 border-b border-gray-300 py-2 text-sm outline-none bg-transparent"/>
                            <Btn variant="primary" onClick={() => { if(contactInput.trim()) { handleSaveSplitContact(contactInput); setContactInput(''); }}}>新增</Btn>
                        </div>
                        {splitContacts.length === 0 && <p className="text-sm text-gray-400 py-2">尚無分帳對象</p>}
                        <div className="flex flex-wrap gap-2 pb-4">
                            {splitContacts.map(c => (
                                <div key={c} className="flex items-center gap-1 text-xs px-3 py-1.5 bg-[#333] text-white rounded-full">
                                    {c}
                                    <button onClick={() => showConfirm('刪除聯絡人', `確定刪除「${c}」？`, () => handleDeleteSplitContact(c))} className="opacity-60 hover:opacity-100 ml-1 active:scale-90 transition"><Icon name="close" size={10}/></button>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            )}

            {isSettleModalOpen && <SettleModal netAmount={netAmount} suggestedHalfAmount={suggestedHalfAmount} accounts={accounts} onClose={() => setIsSettleModalOpen(false)} onConfirm={handleConfirmSettle} />}
            {collectItem && <CollectModal item={collectItem} expected={expectedCollectible(collectItem)} accounts={accounts} onClose={() => setCollectItem(null)} onConfirm={handlePartialCollect} />}
        </div>
    );
};
// ==========================================
// 分次收款 Modal（同一筆代墊可分多次收回）
// ==========================================
const CollectModal = ({ item, expected, accounts, onClose, onConfirm }) => {
    const prevCollected = item.collectedAmount || 0;
    const remaining = Math.max(0, expected - prevCollected);
    const [amount, setAmount] = useState(String(remaining));
    const [targetAcc, setTargetAcc] = useState(accounts[0]?.id);

    return (
        <div className="fixed inset-0 bg-black/50 z-[1300] flex items-center justify-center p-4 animate-fade-in">
            <div className="bg-white w-full max-w-sm rounded-xl p-6 animate-slide-up shadow-2xl relative">
                <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 p-2 active:scale-90 transition">
                    <Icon name="close" size={20}/>
                </button>

                <div className="text-center mb-5">
                    <h3 className="text-lg font-bold text-[#333]">收款</h3>
                    <p className="text-xs text-gray-400 mt-1 truncate">{item.note || '代墊項目'}</p>
                    <div className="mt-3 bg-gray-50 py-2 px-3 rounded text-xs">
                        <span className="text-gray-400">應收 ${formatMoney(expected)}　已收 ${formatMoney(prevCollected)}　</span>
                        <span className="text-[#333] font-medium">剩 ${formatMoney(remaining)}</span>
                    </div>
                </div>

                <div className="space-y-4 mb-6">
                    <div>
                        <label className="text-xs text-gray-400 uppercase block mb-1">本次收到金額</label>
                        <input
                            type="number"
                            value={amount}
                            onChange={e => setAmount(e.target.value)}
                            placeholder="0"
                            autoFocus
                            className="w-full text-right text-2xl font-bold text-[#333] outline-none border-b border-gray-300 focus:border-[#333] bg-transparent py-1"
                        />
                    </div>
                    <div>
                        <label className="text-xs text-gray-400 block mb-2 uppercase">收款存入帳戶</label>
                        <div className="bg-gray-50 border border-gray-200 rounded px-3 py-2 flex items-center gap-2">
                            <Icon name="wallet" size={16} className="text-gray-400"/>
                            <select className="bg-transparent w-full text-sm outline-none text-[#333]" value={targetAcc} onChange={e => setTargetAcc(e.target.value)}>
                                {accounts.map(a => <option key={a.id} value={a.id}>{a.name} (${a.balance})</option>)}
                            </select>
                        </div>
                    </div>
                </div>

                <div className="flex gap-3">
                    <button onClick={onClose} className="flex-1 py-3 text-gray-500 bg-gray-100 rounded-lg font-medium hover:bg-gray-200 transition">取消</button>
                    <button onClick={() => onConfirm(item, amount, targetAcc)} className="flex-[1.5] py-3 bg-[#333] text-white rounded-lg font-medium shadow-lg hover:bg-black transition">確認收款</button>
                </div>
            </div>
        </div>
    );
};
// ==========================================
// 退款/作廢 Modal（退貨沖銷）
// ==========================================
const RefundModal = ({ tx, accounts, onClose, onConfirm }) => {
    const already = tx.refundedAmount || 0;
    const remaining = tx.amount - already;
    const [amount, setAmount] = useState(String(remaining));
    const [isVoid, setIsVoid] = useState(false);
    // 退回帳戶預設為原扣款帳戶（若仍存在），否則第一個一般帳戶
    const usable = accounts.filter(a => a.type !== 'liability' && a.type !== 'loan');
    const defaultAcc = accounts.find(a => a.id === tx.accountId) ? tx.accountId : (usable[0] ? usable[0].id : '');
    const [accId, setAccId] = useState(defaultAcc);
    const effectiveAmt = isVoid ? remaining : Number(amount) || 0;

    return (
        <div className="fixed inset-0 bg-black/50 z-[1300] flex items-center justify-center p-4 animate-fade-in">
            <div className="bg-white w-full max-w-sm rounded-xl p-6 animate-slide-up shadow-2xl relative">
                <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 p-2 active:scale-90 transition"><Icon name="close" size={20}/></button>
                <div className="text-center mb-5">
                    <h3 className="text-lg font-bold text-[#333]">退款 / 作廢</h3>
                    <p className="text-xs text-gray-400 mt-1 truncate">{tx.note || '消費'}</p>
                    <div className="mt-3 bg-gray-50 py-2 px-3 rounded text-xs">
                        <span className="text-gray-400">原金額 ${formatMoney(tx.amount)}{already>0?`　已退 $${formatMoney(already)}`:''}　</span>
                        <span className="text-[#333] font-medium">可退 ${formatMoney(remaining)}</span>
                    </div>
                </div>
                <div className="space-y-4 mb-6">
                    <div>
                        <label className="text-xs text-gray-400 uppercase block mb-1">退款金額</label>
                        <input type="number" value={isVoid ? String(remaining) : amount} disabled={isVoid}
                            onChange={e => setAmount(e.target.value)} placeholder="0" autoFocus
                            className={`w-full text-right text-2xl font-bold outline-none border-b border-gray-300 focus:border-[#333] bg-transparent py-1 ${isVoid ? 'text-gray-300' : 'text-[#333]'}`}/>
                    </div>
                    <div>
                        <label className="text-xs text-gray-400 block mb-2 uppercase">退款存入帳戶</label>
                        <div className="bg-gray-50 border border-gray-200 rounded px-3 py-2 flex items-center gap-2">
                            <Icon name="wallet" size={16} className="text-gray-400"/>
                            <select className="bg-transparent w-full text-sm outline-none text-[#333]" value={accId} onChange={e => setAccId(e.target.value)}>
                                <option value="">不影響帳戶（純沖銷統計）</option>
                                {usable.map(a => <option key={a.id} value={a.id}>{a.name} (${a.balance})</option>)}
                            </select>
                        </div>
                    </div>
                    <div className="flex items-center justify-between pt-1">
                        <span className="text-xs text-gray-500">整筆作廢（退回全部剩餘、標記刪除線）</span>
                        <div onClick={() => setIsVoid(v => !v)} className={`w-10 h-5 rounded-full relative cursor-pointer transition shrink-0 ${isVoid ? 'bg-[#333]' : 'bg-gray-300'}`}>
                            <div className={`w-3 h-3 bg-white rounded-full absolute top-1 transition-all ${isVoid ? 'left-6' : 'left-1'}`}></div>
                        </div>
                    </div>
                </div>
                <div className="flex gap-3">
                    <button onClick={onClose} className="flex-1 py-3 text-gray-500 bg-gray-100 rounded-lg font-medium hover:bg-gray-200 transition">取消</button>
                    <button onClick={() => onConfirm(effectiveAmt, accId || null, isVoid)} className="flex-[1.5] py-3 bg-[#333] text-white rounded-lg font-medium shadow-lg hover:bg-black transition">確認{isVoid ? '作廢' : '退款'}</button>
                </div>
            </div>
        </div>
    );
};
// ==========================================
// 修正版 SettleModal (傳遞結算模式 mode)
// ==========================================
const SettleModal = ({ netAmount, suggestedHalfAmount, accounts, onClose, onConfirm }) => {
    const [mode, setMode] = useState('half'); // half = 智慧AA, full = 全額
    const [targetAcc, setTargetAcc] = useState(accounts[0]?.id);
    const [customAmount, setCustomAmount] = useState(''); 
    
    const finalAmount = useMemo(() => {
        if (mode === 'custom') return Number(customAmount) || 0;
        if (mode === 'full') return netAmount; // 100% 收回/支付
        return Math.round(suggestedHalfAmount); // ★ 修正：套用智慧 AA 金額
    }, [mode, netAmount, suggestedHalfAmount, customAmount]);

    const isReceiving = finalAmount > 0;

    return (
        <div className="fixed inset-0 bg-black/50 z-[1300] flex items-center justify-center p-4 animate-fade-in">
            <div className="bg-white w-full max-w-sm rounded-xl p-6 animate-slide-up shadow-2xl relative">
                
                <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 p-2 active:scale-90 transition">
                    <Icon name="close" size={20}/>
                </button>

                <div className="text-center mb-6">
                    <h3 className="text-lg font-bold text-[#333]">結算確認</h3>
                    <div className="mt-2 bg-gray-50 py-2 rounded">
                        <span className="text-xs text-gray-400 block mb-1">原始淨額</span>
                        <span className={`text-xl font-medium ${netAmount >= 0 ? 'text-[#333]' : 'text-red-500'}`}>
                            {netAmount >= 0 ? '我多付 ' : '我少付 '}${Math.abs(netAmount)}
                        </span>
                    </div>
                </div>
                
                <div className="space-y-3 mb-6">
                    <label className="text-xs text-gray-400 uppercase block mb-1">結算模式</label>
                    <div className="flex bg-gray-100 p-1 rounded-lg mb-3">
                        <button onClick={() => setMode('half')} className={`flex-1 py-2 text-xs font-medium rounded transition ${mode === 'half' ? 'bg-white text-[#333] shadow-sm' : 'text-gray-500'}`}>AA制 (/2)</button>
                        <button onClick={() => setMode('full')} className={`flex-1 py-2 text-xs font-medium rounded transition ${mode === 'full' ? 'bg-white text-[#333] shadow-sm' : 'text-gray-500'}`}>全額</button>
                        <button onClick={() => setMode('custom')} className={`flex-1 py-2 text-xs font-medium rounded transition ${mode === 'custom' ? 'bg-white text-[#333] shadow-sm' : 'text-gray-500'}`}>自訂</button>
                    </div>

                    <div className="w-full py-3 px-4 rounded border border-gray-200 flex justify-between items-center bg-white">
                        <div className="text-left">
                            <div className="text-sm font-medium text-[#333]">
                                {mode === 'half' ? '智慧 AA (代購全額, 墊付平分)' : mode === 'full' ? '全額結清' : '自訂金額'}
                            </div>
                            <div className="text-xs text-gray-400">
                                {mode === 'custom' ? '請輸入金額' : '系統自動計算'}
                            </div>
                        </div>
                        {mode === 'custom' ? (
                            <input 
                                type="number" 
                                value={customAmount} 
                                onChange={(e) => setCustomAmount(e.target.value)} 
                                placeholder="0"
                                className="w-24 text-right text-lg font-bold text-[#333] outline-none border-b border-gray-300 focus:border-[#333] bg-transparent"
                                autoFocus
                            />
                        ) : (
                            <div className={`text-lg font-bold ${finalAmount > 0 ? 'text-[#333]' : 'text-red-500'}`}>
                                {finalAmount > 0 ? '+' : ''}{Math.abs(finalAmount)}
                            </div>
                        )}
                    </div>

                    <div className="pt-2">
                        <label className="text-xs text-gray-400 block mb-2 uppercase">{isReceiving ? '收款存入帳戶' : '付款帳戶'}</label>
                        <div className="bg-gray-50 border border-gray-200 rounded px-3 py-2 flex items-center gap-2">
                            <Icon name="wallet" size={16} className="text-gray-400"/>
                            <select className="bg-transparent w-full text-sm outline-none text-[#333]" value={targetAcc} onChange={e => setTargetAcc(e.target.value)}>
                                {accounts.map(a => <option key={a.id} value={a.id}>{a.name} (${a.balance})</option>)}
                            </select>
                        </div>
                    </div>
                </div>

                <div className="flex gap-3 pt-2">
                    <button onClick={onClose} className="flex-1 py-3 text-gray-500 bg-gray-100 rounded-lg font-medium hover:bg-gray-200 transition">取消</button>
                    {/* ★ 修正：將 mode 一併傳出 */}
                    <button onClick={() => onConfirm(finalAmount, targetAcc, mode)} className="flex-[1.5] py-3 bg-[#333] text-white rounded-lg font-medium shadow-lg hover:bg-black transition">
                        確認{isReceiving ? '收款' : '支付'}
                    </button>
                </div>
            </div>
        </div>
    );
};
// ==========================================
// 借還款追蹤（私人借貸：對象、淨額、逐筆借還歷史）
// ==========================================
const DEBT_KIND_META = {
    lend:    { label: '借出', sign: 1,  desc: '我借錢給對方' },
    collect: { label: '收回', sign: -1, desc: '對方還我錢' },
    borrow:  { label: '借入', sign: -1, desc: '我向對方借錢' },
    repay:   { label: '還款', sign: 1,  desc: '我還錢給對方' },
};
// 淨額 > 0 對方欠我（應收）；< 0 我欠對方（應付）
const debtNet = (entries) => entries.reduce((s, d) => s + d.amount * ((DEBT_KIND_META[d.kind] || {}).sign || 0), 0);

const DebtEntryModal = ({ init, accounts, onClose, onConfirm }) => {
    const [kind, setKind] = useState(init.kind || 'lend');
    const [amount, setAmount] = useState(init.amount || '');
    const [date, setDate] = useState(getLocalDateString());
    const [note, setNote] = useState('');
    const usableAccounts = accounts.filter(a => a.type !== 'liability' && a.type !== 'loan');
    const [accId, setAccId] = useState(usableAccounts[0] ? usableAccounts[0].id : '');
    const meta = DEBT_KIND_META[kind];

    return (
        <div className="fixed inset-0 bg-black/50 z-[1300] flex items-center justify-center p-4 animate-fade-in">
            <div className="bg-white w-full max-w-sm rounded-xl p-6 animate-slide-up shadow-2xl relative">
                <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 p-2 active:scale-90 transition">
                    <Icon name="close" size={20}/>
                </button>
                <div className="text-center mb-5">
                    <h3 className="text-lg font-bold text-[#333]">{init.contact}</h3>
                    <p className="text-xs text-gray-400 mt-1">{meta.desc}</p>
                </div>
                <div className="space-y-4 mb-6">
                    <div className="flex bg-gray-100 p-1 rounded-lg">
                        {Object.keys(DEBT_KIND_META).map(k => (
                            <button key={k} onClick={() => setKind(k)} className={`flex-1 py-2 text-xs font-medium rounded transition ${kind === k ? 'bg-white text-[#333] shadow-sm' : 'text-gray-500'}`}>{DEBT_KIND_META[k].label}</button>
                        ))}
                    </div>
                    <div>
                        <label className="text-xs text-gray-400 uppercase block mb-1">金額</label>
                        <input type="number" value={amount} onChange={e => setAmount(e.target.value)} placeholder="0" autoFocus
                            className="w-full text-right text-2xl font-bold text-[#333] outline-none border-b border-gray-300 focus:border-[#333] bg-transparent py-1"/>
                    </div>
                    <div>
                        <label className="text-xs text-gray-400 uppercase block mb-1">日期</label>
                        <input type="date" value={date} onChange={e => setDate(e.target.value)}
                            className="w-full text-sm text-[#333] outline-none border-b border-gray-300 focus:border-[#333] bg-transparent py-1"/>
                    </div>
                    <div>
                        <label className="text-xs text-gray-400 block mb-2 uppercase">{(kind === 'lend' || kind === 'repay') ? '扣款帳戶' : '存入帳戶'}</label>
                        <div className="bg-gray-50 border border-gray-200 rounded px-3 py-2 flex items-center gap-2">
                            <Icon name="wallet" size={16} className="text-gray-400"/>
                            <select className="bg-transparent w-full text-sm outline-none text-[#333]" value={accId} onChange={e => setAccId(e.target.value)}>
                                <option value="">不影響帳戶（純追蹤）</option>
                                {usableAccounts.map(a => <option key={a.id} value={a.id}>{a.name} (${a.balance})</option>)}
                            </select>
                        </div>
                        <p className="text-[10px] text-gray-300 mt-1 pl-1">選擇帳戶會同步產生轉帳紀錄並更新餘額</p>
                    </div>
                    <div>
                        <label className="text-xs text-gray-400 uppercase block mb-1">備註（選填）</label>
                        <input value={note} onChange={e => setNote(e.target.value)} placeholder="例如：墊付旅費"
                            className="w-full text-sm text-[#333] outline-none border-b border-gray-300 focus:border-[#333] bg-transparent py-1"/>
                    </div>
                </div>
                <div className="flex gap-3">
                    <button onClick={onClose} className="flex-1 py-3 text-gray-500 bg-gray-100 rounded-lg font-medium hover:bg-gray-200 transition">取消</button>
                    <button onClick={() => onConfirm({ contact: init.contact, kind, amount, date, note, accountId: accId || null })}
                        className="flex-[1.5] py-3 bg-[#333] text-white rounded-lg font-medium shadow-lg hover:bg-black transition">確認</button>
                </div>
            </div>
        </div>
    );
};

const DebtManager = ({ onBack }) => {
    const { debts, handleSaveDebtEntry, handleDeleteDebtEntry, accounts,
        splitContacts, handleSaveSplitContact, handleDeleteSplitContact, showConfirm } = React.useContext(DataContext);
    const [selectedContact, setSelectedContact] = useState(null);
    const [entryModal, setEntryModal] = useState(null); // null | { contact, kind, amount }
    const [showContactMgr, setShowContactMgr] = useState(false);
    const [contactInput, setContactInput] = useState('');

    // 對象清單 = splitContacts 聯集 debts 中出現的名字（容錯：舊備份缺聯絡人也能顯示）
    const contactList = useMemo(() => {
        const names = [...splitContacts];
        debts.forEach(d => { if (d.contact && !names.includes(d.contact)) names.push(d.contact); });
        return names;
    }, [splitContacts, debts]);

    const byContact = useMemo(() => {
        const map = {};
        debts.forEach(d => { (map[d.contact] = map[d.contact] || []).push(d); });
        return map;
    }, [debts]);

    const summary = useMemo(() => {
        let receivable = 0, payable = 0;
        Object.keys(byContact).forEach(c => {
            const net = debtNet(byContact[c]);
            if (net > 0) receivable += net; else payable += -net;
        });
        return { receivable, payable };
    }, [byContact]);

    const openEntry = (contact, kind, amount) => setEntryModal({ contact, kind, amount: amount ? String(amount) : '' });

    const modals = (
        <React.Fragment>
            {showContactMgr && (
                <div className="fixed inset-0 bg-black/50 z-[1300] flex items-end justify-center animate-fade-in">
                    <div className="bg-white w-full max-w-md rounded-t-2xl p-5 animate-slide-up">
                        <div className="flex justify-between items-center mb-4">
                            <div>
                                <h3 className="text-base font-medium text-[#333]">借貸對象管理</h3>
                                <p className="text-xs text-gray-400 mt-0.5">與分帳功能共用同一份對象名單</p>
                            </div>
                            <button onClick={() => { setShowContactMgr(false); setContactInput(''); }} className="p-1 text-gray-400 hover:text-gray-600"><Icon name="close" size={20}/></button>
                        </div>
                        <div className="flex gap-2 mb-4">
                            <input value={contactInput} onChange={e => setContactInput(e.target.value)}
                                onKeyDown={e => { if(e.key === 'Enter' && contactInput.trim()) { handleSaveSplitContact(contactInput); setContactInput(''); }}}
                                placeholder="新增對象名稱（朋友、家人）" className="flex-1 border-b border-gray-300 py-2 text-sm outline-none bg-transparent"/>
                            <Btn variant="primary" onClick={() => { if(contactInput.trim()) { handleSaveSplitContact(contactInput); setContactInput(''); }}}>新增</Btn>
                        </div>
                        {splitContacts.length === 0 && <p className="text-sm text-gray-400 py-2">尚無對象</p>}
                        <div className="flex flex-wrap gap-2 pb-4">
                            {splitContacts.map(c => (
                                <div key={c} className="flex items-center gap-1 text-xs px-3 py-1.5 bg-[#333] text-white rounded-full">
                                    {c}
                                    <button onClick={() => showConfirm('刪除對象', `確定刪除「${c}」？借還款紀錄會保留。`, () => handleDeleteSplitContact(c))} className="opacity-60 hover:opacity-100 ml-1 active:scale-90 transition"><Icon name="close" size={10}/></button>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            )}
            {entryModal && <DebtEntryModal init={entryModal} accounts={accounts}
                onClose={() => setEntryModal(null)}
                onConfirm={(e) => { if (handleSaveDebtEntry(e)) setEntryModal(null); }} />}
        </React.Fragment>
    );

    // ---- 詳情層：某對象的借還歷史 ----
    if (selectedContact) {
        const entries = (byContact[selectedContact] || []).slice().sort((a, b) => {
            const d = new Date(b.date) - new Date(a.date);
            return d !== 0 ? d : (b.createdAt || 0) - (a.createdAt || 0);
        });
        const net = debtNet(entries);
        return (
            <div className="h-full flex flex-col pt-10 px-5 animate-fade-in">
                <div className="flex items-center gap-3 mb-4 shrink-0">
                    <button onClick={() => setSelectedContact(null)} className="p-2 hover:bg-gray-100 rounded-full"><Icon name="chevronLeft" size={22}/></button>
                    <h2 className="text-xl font-medium text-[#333]">{selectedContact}</h2>
                </div>
                <div className="muji-card p-4 mb-4 text-center shrink-0">
                    <span className="text-xs text-gray-400 block mb-1">目前淨額</span>
                    <span className={`text-2xl font-bold ${net > 0 ? 'text-[#5CB85C]' : net < 0 ? 'text-red-500' : 'text-gray-400'}`}>
                        {net === 0 ? '已結清' : (net > 0 ? `欠我 $${formatMoney(net)}` : `我欠 $${formatMoney(-net)}`)}
                    </span>
                    {net !== 0 && (
                        <button onClick={() => openEntry(selectedContact, net > 0 ? 'collect' : 'repay', Math.abs(net))}
                            className="mt-3 w-full py-2.5 bg-[#333] text-white rounded-lg text-sm font-medium hover:bg-black transition">
                            一鍵結清（{net > 0 ? '收回' : '還款'} ${formatMoney(Math.abs(net))}）
                        </button>
                    )}
                </div>
                <div className="grid grid-cols-4 gap-2 mb-4 shrink-0">
                    {Object.keys(DEBT_KIND_META).map(k => (
                        <button key={k} onClick={() => openEntry(selectedContact, k)}
                            className="py-2.5 bg-gray-100 rounded-lg text-xs font-medium text-[#333] hover:bg-gray-200 active:scale-95 transition">
                            {DEBT_KIND_META[k].label}
                        </button>
                    ))}
                </div>
                <div className="flex-1 overflow-y-auto no-scrollbar space-y-2 pb-20">
                    {entries.length === 0 && <div className="text-center py-16 text-gray-400 text-sm">尚無紀錄<br/>點上方按鈕新增借出或借入</div>}
                    {entries.map(d => {
                        const meta = DEBT_KIND_META[d.kind] || { label: d.kind, desc: '' };
                        const acc = d.accountId ? accounts.find(a => a.id === d.accountId) : null;
                        return (
                            <div key={d.id} className="muji-card p-3 flex items-center gap-3">
                                <span className={`text-xs px-2 py-1 rounded-full shrink-0 ${d.kind === 'lend' ? 'bg-green-50 text-[#5CB85C]' : d.kind === 'borrow' ? 'bg-red-50 text-red-500' : 'bg-gray-100 text-gray-500'}`}>{meta.label}</span>
                                <div className="flex-1 min-w-0">
                                    <div className="text-sm text-[#333] truncate">{d.note || meta.desc}</div>
                                    <div className="text-xs text-gray-400 mt-0.5">{d.date}{acc ? ` · ${acc.name}` : (d.accountId ? '' : ' · 未連動帳戶')}</div>
                                </div>
                                <span className="text-sm font-bold text-[#333] shrink-0">${formatMoney(d.amount)}</span>
                                <button onClick={() => showConfirm('刪除紀錄', d.txId ? '將同步刪除連動的轉帳交易並回復帳戶餘額。\n\n確定刪除？' : '確定刪除此筆紀錄？', () => handleDeleteDebtEntry(d.id))}
                                    className="text-gray-300 hover:text-red-400 p-1 shrink-0"><Icon name="trash" size={14}/></button>
                            </div>
                        );
                    })}
                </div>
                {modals}
            </div>
        );
    }

    // ---- 清單層：所有對象與淨額 ----
    return (
        <div className="h-full flex flex-col pt-10 px-5 animate-fade-in">
            <div className="flex items-center gap-3 mb-4 shrink-0">
                <button onClick={onBack} className="p-2 hover:bg-gray-100 rounded-full"><Icon name="chevronLeft" size={22}/></button>
                <h2 className="text-xl font-medium text-[#333]">借還款追蹤</h2>
                <button onClick={() => setShowContactMgr(true)} className="ml-auto text-xs text-gray-500 border border-gray-200 rounded-full px-3 py-1.5 hover:bg-gray-50 transition">管理對象</button>
            </div>
            {(summary.receivable > 0 || summary.payable > 0) && (
                <div className="flex gap-3 mb-4 shrink-0">
                    <div className="flex-1 muji-card p-3 text-center">
                        <span className="text-xs text-gray-400 block mb-0.5">應收（欠我）</span>
                        <span className="text-lg font-bold text-[#5CB85C]">${formatMoney(summary.receivable)}</span>
                    </div>
                    <div className="flex-1 muji-card p-3 text-center">
                        <span className="text-xs text-gray-400 block mb-0.5">應付（我欠）</span>
                        <span className="text-lg font-bold text-red-500">${formatMoney(summary.payable)}</span>
                    </div>
                </div>
            )}
            <div className="flex-1 overflow-y-auto no-scrollbar space-y-3 pb-20">
                {contactList.length === 0 && <div className="text-center py-20 text-gray-400 text-sm">尚無借貸對象<br/>點右上角「管理對象」新增朋友或家人</div>}
                {contactList.map(c => {
                    const entries = byContact[c] || [];
                    const net = debtNet(entries);
                    return (
                        <div key={c} className="muji-card p-4 cursor-pointer active:opacity-70 transition" onClick={() => setSelectedContact(c)}>
                            <div className="flex justify-between items-center">
                                <div>
                                    <div className="text-sm font-medium text-[#333]">{c}</div>
                                    <div className="text-xs text-gray-400 mt-0.5">{entries.length} 筆紀錄</div>
                                </div>
                                <div className="flex items-center gap-2">
                                    <span className={`text-sm font-bold ${net > 0 ? 'text-[#5CB85C]' : net < 0 ? 'text-red-500' : 'text-gray-300'}`}>
                                        {net === 0 ? (entries.length > 0 ? '已結清' : '—') : (net > 0 ? `欠我 $${formatMoney(net)}` : `我欠 $${formatMoney(-net)}`)}
                                    </span>
                                    <Icon name="chevronRight" size={12} className="text-gray-300"/>
                                </div>
                            </div>
                        </div>
                    );
                })}
            </div>
            {modals}
        </div>
    );
};
// ==========================================
// 現金流預測：投影未來 N 天的週期帳單/分期（純唯讀，不產生交易）
// 鏡射 checkRecurring 的入帳語義；CashflowView 與 AssetsView 入口卡共用此函式
// ==========================================
const computeCashflowProjection = (recurringItems, horizon) => {
    const today = new Date();
    const pad = (n) => String(n).padStart(2, '0');
    const todayStr = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
    const end = new Date(today.getFullYear(), today.getMonth(), today.getDate() + horizon);
    const endStr = `${end.getFullYear()}-${pad(end.getMonth()+1)}-${pad(end.getDate())}`;
    const events = [];
    (recurringItems || []).forEach(item => {
        if (item.active === false) return;
        let remaining = item.totalPeriods ? Math.max(0, item.totalPeriods - (item.executedPeriods || 0)) : Infinity;
        if (item.isRecurringAnnual) remaining = Infinity; // 常態續繳視為無限延續（估）
        if (remaining <= 0) return;
        let executed = item.executedPeriods || 0;
        for (let m = 0; m <= 2 && remaining > 0; m++) {
            const d = new Date(today.getFullYear(), today.getMonth() + m, 1);
            const monthKey = `${d.getFullYear()}-${pad(d.getMonth()+1)}`;
            if (item.startDate && item.startDate > monthKey) continue;
            if (item.lastGeneratedMonth === monthKey) continue;
            if (item.skipUntil === monthKey) continue;
            const daysInMonth = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
            const targetDay = Math.min(item.day, daysInMonth);
            const dateStr = `${monthKey}-${pad(targetDay)}`;
            // 只列今天之後：今天(含)以前的到期項目會在開啟 App 時由 checkRecurring 實際入帳
            if (dateStr <= todayStr) continue;
            if (dateStr > endStr) break;
            executed += 1;
            const isLast = item.totalPeriods && executed === item.totalPeriods && !item.isRecurringAnnual;
            const base = (isLast && item.lastPeriodAmount != null) ? Number(item.lastPeriodAmount) : Number(item.amount);
            events.push({
                date: dateStr, name: item.name,
                amount: base + Number(item.interest || 0),
                type: item.type || 'expense',
                accountId: item.accountId, targetAccountId: item.targetAccountId,
                period: item.totalPeriods ? `${executed}/${item.totalPeriods}` : null,
                annual: !!item.isRecurringAnnual
            });
            remaining -= 1;
        }
    });
    events.sort((a, b) => a.date < b.date ? -1 : a.date > b.date ? 1 : 0);
    const expense = events.filter(e => e.type === 'expense').reduce((s, e) => s + e.amount, 0);
    const income = events.filter(e => e.type === 'income').reduce((s, e) => s + e.amount, 0);
    const groups = [];
    events.forEach(e => {
        const last = groups[groups.length - 1];
        if (last && last.date === e.date) last.items.push(e);
        else groups.push({ date: e.date, items: [e] });
    });
    return { groups, count: events.length, expense, income, net: income - expense };
};
const CashflowView = ({ onBack }) => {
    const { recurringItems, accounts, transactions } = React.useContext(DataContext);
    const [horizon, setHorizon] = useState(30); // 30 | 60 天

    const projection = useMemo(() => computeCashflowProjection(recurringItems, horizon), [recurringItems, horizon]);

    // 信用卡應繳（參考）：dueDay 落在區間內者，金額用已出帳估算（同 repayModal 演算法）；繳費屬轉帳，不併入上方收支合計
    const cardDues = useMemo(() => {
        const today = new Date();
        const pad = (n) => String(n).padStart(2, '0');
        const list = [];
        (accounts || []).filter(a => a.type === 'liability' && a.dueDay && a.balance < 0).forEach(acc => {
            for (let m = 0; m <= 2; m++) {
                const d = new Date(today.getFullYear(), today.getMonth() + m, 1);
                const daysInMonth = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
                const dueDate = new Date(d.getFullYear(), d.getMonth(), Math.min(acc.dueDay, daysInMonth));
                const diffDays = Math.round((dueDate - today) / 86400000);
                if (diffDays <= 0) continue;
                if (diffDays > horizon) break;
                const totalDebt = Math.abs(acc.balance);
                let billed = totalDebt;
                if (acc.billDay) {
                    let billYear = today.getFullYear();
                    let billMonth = today.getMonth();
                    if (today.getDate() < acc.billDay) { billMonth -= 1; if (billMonth < 0) { billMonth = 11; billYear -= 1; } }
                    const lastBillDateStr = `${billYear}-${pad(billMonth+1)}-${pad(acc.billDay)}`;
                    let unbilled = transactions.filter(t => (t.accountId === acc.id || t.targetAccountId === acc.id) && t.date > lastBillDateStr).reduce((sum, t) => {
                        if (t.type === 'expense') return sum + t.amount;
                        if (t.type === 'income') return sum - t.amount;
                        if (t.type === 'transfer') {
                            if (t.accountId === acc.id) return sum + t.amount;
                            if (t.targetAccountId === acc.id) return sum - t.amount;
                        }
                        return sum;
                    }, 0);
                    if (unbilled < 0) unbilled = 0;
                    if (unbilled > totalDebt) unbilled = totalDebt;
                    billed = totalDebt - unbilled;
                }
                list.push({ name: acc.name, date: `${dueDate.getFullYear()}-${pad(dueDate.getMonth()+1)}-${pad(dueDate.getDate())}`, amount: billed > 0 ? billed : totalDebt });
                break;
            }
        });
        return list.sort((a, b) => a.date < b.date ? -1 : 1);
    }, [accounts, transactions, horizon]);

    const accName = (id) => { const a = accounts.find(x => x.id === id); return a ? a.name : '—'; };

    return (
        <div className="h-full flex flex-col pt-10 px-5 animate-fade-in">
            <div className="flex items-center gap-3 mb-4 shrink-0">
                <button onClick={onBack} className="p-2 hover:bg-gray-100 rounded-full"><Icon name="chevronLeft" size={22}/></button>
                <h2 className="text-xl font-medium text-[#333]">現金流預測</h2>
                <div className="ml-auto flex bg-gray-100 p-0.5 rounded-lg">
                    {[30, 60].map(dd => (
                        <button key={dd} onClick={() => setHorizon(dd)} className={`px-3 py-1 text-xs rounded transition ${horizon === dd ? 'bg-white shadow text-[#333] font-medium' : 'text-gray-400'}`}>{dd}天</button>
                    ))}
                </div>
            </div>
            <div className="grid grid-cols-3 gap-2 mb-2 shrink-0 text-center">
                <div className="muji-card p-3"><div className="text-[10px] text-gray-400 mb-0.5">預計支出</div><div className="text-sm font-bold text-[#333]">${formatMoney(projection.expense)}</div></div>
                <div className="muji-card p-3"><div className="text-[10px] text-gray-400 mb-0.5">預計收入</div><div className="text-sm font-bold text-[#5CB85C]">${formatMoney(projection.income)}</div></div>
                <div className="muji-card p-3"><div className="text-[10px] text-gray-400 mb-0.5">淨影響</div><div className={`text-sm font-bold ${projection.net >= 0 ? 'text-[#5CB85C]' : 'text-red-500'}`}>{projection.net >= 0 ? '+' : '-'}${formatMoney(Math.abs(projection.net))}</div></div>
            </div>
            <p className="text-[10px] text-gray-300 mb-3 shrink-0 pl-1">僅含已設定的週期帳單／分期；已到期未入帳者將於開啟 App 時自動入帳。轉帳與信用卡繳費不計入收支合計。</p>
            <div className="flex-1 overflow-y-auto no-scrollbar space-y-3 pb-20">
                {cardDues.length > 0 && (
                    <div className="muji-card p-3 space-y-1.5">
                        <div className="text-[10px] text-gray-400 uppercase tracking-widest mb-1">信用卡應繳（參考，未計入合計）</div>
                        {cardDues.map(c => (
                            <div key={c.name + c.date} className="flex justify-between items-center text-xs">
                                <span className="text-[#333]">{c.name}<span className="text-gray-300 ml-1.5">{c.date.slice(5)} 截止</span></span>
                                <span className="font-medium text-red-500">${formatMoney(c.amount)}</span>
                            </div>
                        ))}
                    </div>
                )}
                {projection.count === 0 && <div className="text-center py-16 text-gray-400 text-sm">未來 {horizon} 天沒有已排定的週期收支<br/><span className="text-[11px]">在「設定 → 週期帳單／分期」新增後即可預測</span></div>}
                {projection.groups.map(g => (
                    <div key={g.date}>
                        <div className="text-xs text-gray-400 font-medium mb-1.5 pl-1">{g.date.slice(5).replace('-', '/')}</div>
                        <div className="space-y-2">
                            {g.items.map((e, i) => (
                                <div key={g.date + i} className="muji-card p-3 flex items-center justify-between">
                                    <div className="min-w-0 flex-1">
                                        <div className="text-sm text-[#333] truncate">{e.name}{e.period && <span className="text-[10px] text-gray-400 ml-1.5">({e.period}期)</span>}{e.annual && <span className="text-[10px] text-gray-300 ml-1.5">估</span>}</div>
                                        <div className="text-xs text-gray-400 mt-0.5 truncate">{e.type === 'transfer' ? `${accName(e.accountId)} → ${accName(e.targetAccountId)}` : accName(e.accountId)}</div>
                                    </div>
                                    <span className={`text-sm font-bold shrink-0 ml-2 ${e.type === 'income' ? 'text-[#5CB85C]' : e.type === 'transfer' ? 'text-gray-400' : 'text-[#333]'}`}>
                                        {e.type === 'income' ? '+' : e.type === 'transfer' ? '' : '-'}${formatMoney(e.amount)}
                                    </span>
                                </div>
                            ))}
                        </div>
                    </div>
                ))}
            </div>
        </div>
    );
};
